 #领导人介绍
 train_baliu_desc:0 "帝国铁路8620型蒸汽机车首车8620专用铁路人偶。有着无愧于首车铁路人偶一职的能力、才智、教养、气度，堪称大和抚子的典范。在苏醒后，她却为性能的显著下降所苦，甚至暗自哭泣。可除双铁外，并没有人见到过八六如此落魄的样子。人前的八六，永远是利落果断自信满满，总是交出完美成果，是最优秀的铁路人偶。\n“公元1914年3月8日——在8620型首车竣工前一个月左右，我出厂了”"
 train_reina_desc:0 "御一夜铁路KiHa07S专用铁路人偶。在铁路人偶中也算偏小的个头、悠然的性格以及略有口齿不清是她令人印象深刻的特征。曾在矿山铁路大显身手，又亲眼目睹了其由盛而衰直至被废弃的过程，因而拥有相当丰富的人生阅历。对任何事物都抱有好感，不禁让人怀疑世上是否还有她不喜欢的东西，天生擅长撒娇。非常受动物和婴儿喜欢，和它们的沟通好到让人不时会觉得她是在和它们交谈。\n“呜呼呼，是3月26日哟刚好，和车身是同一天完工的啦”"
 
