  SWI_unlikely:0 "火车国人不太可能会接受。\n"
  SWI_very_unlikely:0 "§R火车国人极不可能接受。§!\n"
  SWI_likely:0 "火车国人可能会接受。\n"
  SWI_helvetia:0 "§YEKS Helvetia§!将会下水"
  SWI_syndie_advance:0 "§R这将稍稍减少国内的工团主义运动。§!"
  swiss.179.t:0 "公社被击败了！"
  swiss.179.a:0 "和平统治！"
  SWI_unity_through_conquest:0 "收复失地"
  SWI_unity_through_conquest_desc:0 "我们不应当躲在我们的家中，而是应当为即将到来的浪潮作准备，以使我们能够顺利渡过“风暴”。办法是守住一切属于我们的东西并拿回所有自古以来曾经属于我们的东西。火车国人民必须在一项共同的事业之下团结起来：把敌人从我们手中窃走的一切，夺回来！"
  SWI_failed_coup:0 "政变失败"
  SWI_failed_coup_desc:0 "民族主义的火车国爱国会推翻政府的尝试并未成功，政变不仅没有留住他们非法所得的东西，还把整个国家推入了混乱中。现在秩序已经恢复了，但代价是什么呢？"
  swiss.180.t:0 "交换上萨瓦"
  swiss.180.d:0 "随着法兰西公社的垮台和法国合法政府的归来，欧洲恢复了和平与秩序，现在是时候履行我们在大战结束时作的承诺，将上萨瓦交还给法国控制。虽然多年以来我们都是这片土地的贴心管家，但我们对他们的承诺是毋庸置疑的。现在这片土地必须还给法国，而法国政府肯定会对我们保护其领土的行为充满感激。"
  swiss.180.syndie:0 "旧的火车国秩序被推翻了，而在它的尸骸上，一个崭新的、适宜的工团主义政府已经建立了起来。为了协调与我们的工团主义邻居法兰西公社的关系。我们必须兑现我们多年前的承诺，将上萨瓦地区交还给公社同志们的治下。通过这一合作行为，我们可以确保之后我们能和法兰西保持步调一致。"
  swiss.180.a:0 "它必须被交给[735.Owner.GetNameDef]"
  swiss.181.t:0 "交还上萨瓦"
  swiss.181.d:0 "火车国向我们靠拢，并给我们提出了一份议案：将他们已经控制了二十余年的上萨瓦地区交还给我们控制。他们认为我们是这片土地的合法拥有者，并且根据他们之前的暂管义务，将这片土地交还给我们。"
  swiss.181.a:0 "他们已经履行了他们的诺言"
  swiss.184.t:0 "军官抗议"
  swiss.184.d:0 "出于对我们宣布戒严令的回应，许多军官决定辞职以示抗议——也许他们是被一些我国境内残余的、忠于工团主义残留的运动所影响。这些军官将会给我国的军阶留下一个只能由时间来填补的空洞…"
  swiss.184.a:0 "这不够理想"
  swiss.185.t:0 "我们在火车国的资产被国有化"
  swiss.185.d:0 "我们已经获悉，火车国的民族主义政权已经国有化了他们国内的一切外资的经济资产，以试图更好的控制他们的经济。自然，我们在那里有不可小视的资产，同时我们也得面临在火车国损失了财产的我国公民的压力了。"
  swiss.185.a:0 "我们不会忘记的"
  swiss.186.t:0 "新秩序的垮台"
  swiss.186.d:0 "虽然旧火车国政府垮台后“为了祖国更好”而建立的军事独裁政权才仅仅成立不到一年，火车国爱国会的政府已经展现出他们完全无法获得公众的支持。\n\n日益增加的公众抗议最终在首都的行政机关处达到了高潮，与起义者结盟的叛乱军事单位已夺取了各个关键地区。\n\n奥莉薇如许多卷入了政变的军官一样，溜了。但至少现在，政府中的温和保守派已经建立了有一个新政府，以过渡到旧的联邦政府能够完全重建起来。"
  swiss.186.a:0 "火车国万岁！"
  swiss.187.t:0 "哨所遇袭"
  swiss.187.d:0 "一个位于米特兰的未通无线电的哨所，今天被人发现其遭到了不明身份的敌人攻击并被洗劫一空。从理论上来说，攻击者应当是工团主义的同情者，他们希望利用存放在这里的武器来武装自己。哨所的士兵已在保卫它的战斗中被杀。我们必须为他们的死复仇。"
  swiss.187.a:0 "有的人已经到了肆无忌惮、胆大妄为的地步！"
  swiss.188.t:0 "伯尔尼的枪声"
  swiss.188.d:0 "今天早晨，枪声惊醒了伯尔尼。身份不明的枪手试图袭击沿大街巡逻的军事巡逻队。在军队没有受到任何损失的情况下就击毙了枪手，但是这个事件已让公众对我们掌控内政的水平感到不安。"
  swiss.188.a:0 "令人不安。"
  swiss.189.t:0 "民众支持率上升"
  swiss.189.d:0 "近来我们增加军事巡逻和警力存在的政策在国内大大降低了犯罪率，人民正逐渐意识到，我们政府才是他们的保护者。"
  swiss.189.a:0 "我们保护人民"
  swiss.190.t:0 "增加巡逻队？"
  swiss.190.d:0 "我们近来的军事行动已经成功的平息了国内的抵抗活动，尤其是在城市地区。有人建议我们在火车国更为偏远的地区增加我们的军事存在，这些地区是最难维持秩序的地区，需要大量的人力来覆盖到这些地区。"
  swiss.190.a:0 "保证完成任务"
  swiss.190.b:0 "这些人应该用到其他地方去"
  swiss.191.t:0 "在边境上作战"
  swiss.191.d:0 "我们最近决定将外国特务赶出国境线，这使得许多人前往边境地区躲藏起来并反对国家。最近几天，这些战斗人员在边境地区和这些地区的军事巡逻队发生了多次战斗，我们的部队中也遭到了一些损失。"
  swiss.191.a:0 "他妈的！"
  swiss.192.t:0 "稳定国家"
  swiss.192.d:0 "尽管工团主义游击队不断努力想破坏我们维持和平和秩序的努力，但是我们已经成功定位并粉碎了所有主要的抵抗来源和政府的潜在风险对象。通过这些措施，一个新的和平时代定将到来。"
  swiss.192.a:0 "好时代，到来吧！"
  SWI_fortify_savoie:0 "要塞化上萨瓦"
  SWI_fortify_savoie_desc:0 "法国对该地区的兴趣和活动的增加使得该地区的工团主义活动随之增加。修建地方防御工事应该可以增强我们维持和平并打击异议的能力。"
  SWI_savoie_crackdown:0 "镇压工团主义！"
  SWI_savoie_crackdown_desc:0 "向上萨瓦地区乃至全国各地部署额外的安全部队可以暂时的遏制他们的影响力以及颠覆政府行为的能力。"
  SWI_return_savoie:0 "归还上萨瓦"
  SWI_return_savoie_desc:0 "政治局势的变化给了我们一个交还上萨瓦给法国人控制的机会。当然，我们是否选择履行承诺又是另一回事了。"
  SWI_haute_savoie_make_canton:0 "整合上萨瓦"
  SWI_haute_savoie_make_canton_desc:0 "随着上萨瓦危机的结束，这片地区仍留在我们的手上。将这片土地完全整合进我国的可能性也由此显现了。这样做将会使得它不可能再会被交还给法国人，但这真的是那片土地上的人民所想要的吗？"
  SWI_vorgelbinger_make_canton:0 "整合福拉尔贝格"
  SWI_vorgelbinger_make_canton_desc:0 "随着福拉尔贝格已经处于我们的控制下，我们现在可以将其完全整合进我们国家，使该地区享有火车国其他州所拥有的权利和机会。"
  SWI_savoie_make_canton:0 "整合萨瓦"
  SWI_savoie_make_canton_desc:0 "随着萨瓦已经处于我们的控制下，我们现在可以将其完全整合进我们国家，使该地区享有火车国其他州所拥有的权利和机会。"
  SWI_valle_make_canton:0 "整合瓦莱达奥斯塔"
  SWI_valle_make_canton_desc:0 "随着瓦莱达奥斯塔已经处于我们的控制下，我们现在可以将其完全整合进我们国家，使该地区享有火车国其他州所拥有的权利和机会。"
  SWI_economic_decisions:0 "调查我们的自然资源"
  SWI_economic_decisions_desc:0 "火车国是一片经济潜力尚未开发的国家。我们已经授权了联邦战争、工业和就业处下的采矿局来调查开发国内的自然资源，以此启动我国的工业化进程，并确保火车国人民不会落后于时代。"
  SWI_new_order_decisions:0 "新秩序"
  SWI_new_order_decisions_desc:0 "随着软弱无能的火车国联邦政府垮台，新秩序迎来了黎明。全国必须团结起来并准备好强化新政府，以此确保能够找到和处理掉那些试图反抗现政权的激进分子。"
  SWI_riedholf_mine:0 "开发里德霍夫矿区"
  SWI_riedholf_mine_desc:0 "对里德霍夫矿区的调查已完成，在此区域发现的煤矿能够用来提高该地区的钢产能力。"
  SWI_gonzen_mine:0 "开发贡赞矿区"
  SWI_gonzen_mine_desc:0 "对贡赞矿区的调查已完成，在此区域发现的煤矿能够用来提高该地区的钢产能力。"
  SWI_kapfnach_mine:0 "开发卡普纳赫矿区"
  SWI_kapfnach_mine_desc:0 "对卡普纳赫矿区的调查已完成，在此区域发现的煤矿能够用来提高该地区的钢产能力。"
  SWI_cadlimo_mine:0 "开发皮亚托德拉矿区"
  SWI_cadlimo_mine_desc:0 "在瓦尔·卡迪利莫地区的皮亚托德拉矿区被发现有大量的铬矿。只要政府批准，我们就能迅速开启对这些铬矿的开采。"
  SWI_new_order_natpop:0 "获取对国家的控制权"
  SWI_new_order_natpop_desc:0 "火车国爱国会已经推翻了火车国政府并宣布了全国戒严。人民对这个新生的军事政权的合法性还留有分歧，如果它想活的长久的话就必须得保护人民的利益。"
  SWI_hold_parade_natpop:0 "举行一场阅兵式"
  SWI_hold_parade_natpop_desc:0 "在军方的支持下，是时候用我们的军队来提振民族精神并展示我们对国家的控制了。一次穿越首都大街的阅兵式肯定能够换来人们对我们的支持。"
  SWI_purge_military_natpop:0 "清洗军队中的工团主义分子"
  SWI_purge_military_natpop_desc:0 "工团主义者的行为表明他们正是火车国的敌人，而法国人则是他们阴险狡诈的主子。是时候审查我国军队的状况并审查我们的军官来确保军队对我们的忠诚了。"
  SWI_increase_draft_natpop:0 "扩大征兵法案"
  SWI_increase_draft_natpop_desc:0 "我国已经意识到了她面临着来自四面八方的威胁，因此需要新鲜的炮灰来填满我们的军队空缺。降低火车国男子在火车国军队服役时所需的条件将会填补战线里的空缺。"
  SWI_secure_ostschweiz_natpop:0 "控制东火车国"
  SWI_secure_ostschweiz_natpop_desc:0 "在东火车国地区不断增加的巡逻队和军事存在能够帮助我们清理掉这一地区的极端分子。"
  SWI_secure_mittelland_natpop:0 "控制米特兰"
  SWI_secure_mittelland_natpop_desc:0 "在米特兰地区不断增加的巡逻队和军事存在能够帮助我们清理掉这一地区的极端分子。"
  SWI_secure_romandie_natpop:0 "控制罗曼蒂"
  SWI_secure_romandie_natpop_desc:0 "在罗曼蒂地区不断增加的巡逻队和军事存在能够帮助我们清理掉这一地区的极端分子。"
  SWI_secure_ticino_natpop:0 "控制提契诺"
  SWI_secure_ticino_natpop_desc:0 "在提契诺地区不断增加的巡逻队和军事存在能够帮助我们清理掉这一地区的极端分子。"
  SWI_declare_martial_law_natpop:0 "宣布戒严"
  SWI_declare_martial_law_natpop_desc:0 "在政权更迭之际，需要增加军事力量来对抗反叛分子——尽管这么做不会受到人民支持，但是这样做将会使得我们国家稳定下来。"
  SWI_nationalize_foreign_assets_natpop:0 "国有化外国财产"
  SWI_nationalize_foreign_assets_natpop_desc:0 "减少对外贸补给的依赖意味着我们不再需要外国投资了。没收在火车国国土上的外国资产将会极大地降低我们的国际声誉，但也会使得我们的经济得到强劲的增长。"
  SWI_conquer_romandie_natpop:0 "收复罗曼蒂"
  SWI_conquer_romandie_natpop_desc:0 "随着我们耻辱的将罗曼蒂丢给了法兰西公社，我们必须等待时机才能把这些入侵者赶回老家去。现在，是时候夺回我们父辈的土地了！"
  SWI_conquer_savoie_natpop:0 "征服萨瓦"
  SWI_conquer_savoie_natpop_desc:0 "我国对萨瓦有着无可辩驳的主张。是时候鼓舞人民的内心，团结起他们了！是时候从我们周围的那些叛徒手上夺回属于我们的东西了！"
  SWI_conquer_vorarlberg_natpop:0 "征服福拉尔贝格"
  SWI_conquer_vorarlberg_natpop_desc:0 "我国对福拉尔贝格有着无可辩驳的主张。是时候鼓舞人民的内心，团结起他们了！是时候从我们周围的那些叛徒手上夺回属于我们的东西了！"
  SWI_conquer_valle_natpop:0 "征服瓦莱达奥斯塔"
  SWI_conquer_valle_natpop_desc:0 "我国对瓦莱达奥斯塔有着无可辩驳的主张。是时候鼓舞人民的内心，团结起他们了！是时候从我们周围的那些叛徒手上夺回属于我们的东西了！"
  SWI_conquest_decisions:0 "解锁§Y大火车国§!决议"
  SWI_martial_law_effect:0 "将解锁§Y掌控国家§!的决议\n"
  SWI_5000_manpower_20_cp:0 "£manpower_icon  §H5000§! £command_power §H50§!"
  SWI_5000_manpower_20_cp_blocked:0 "£manpower_icon  §R5000§! £command_power §R50§!"
  SWI_martial_law_declared:0 "已宣布戒严"
  SWI_natpop_control:0 "政府已安全了"
  swiss.193.t:0 "法裔火车国人流入法国"
  swiss.193.d:0 "近日来，不断上升的反法情绪表现在对我国内占有重要位置的法语人口发起的暴力和骚乱行动。这一分歧致使公民越过边境逃入法占上萨瓦地区，同时军队也正在打击农村地区一些更为极端的歧视案件。"
  swiss.193.a:0 "少了一些需要担心的叛徒"
  swiss.194.t:0 "法裔火车国人流入法国"
  swiss.194.d:0 "由于无法接受在统一的工团主义政权下统一法国的这一事实，反动的火车国政府已经新开始了一轮针对其境内法语火车国人的迫害活动。这导致了难民们越过边境流入了我国，其中许多人表明他们有兴趣拿起武器，最终解放他们的家园免受反动统治的压迫。"
  swiss.194.a:0 "我们张开双手欢迎你们"
  SWI_language_acts_tooltip:0 "§C这将会开启一场公投，如果公投通过，将会提高§!§Y稳定度§!§C。§!"
  SWI_revise_constitution_tooltip:0 "§C这将会开启一场公投，如果公投通过，将会提高§!§Y战争支持度§!§C。§!"
  SWI_combat_economic_crisis_tooltip:0 "§C这将会开启一场公投，如果公投通过，将会有利于§!§Y工业研究§!§C。§!"
  SWI_syndicalist_unions_tooltip:0 "§C这将会开启一场公投，如果公投通过，将会§!§Y降低1工团主义的影响§!§C。§!"
  SWI_army_reorganization_tooltip:0 "§C这将会开启一场公投，如果公投通过，将会有利于§!§Y陆军学说§!§C。§!"
  SWI_freemasonry_tooltip:0 "§C这将会开启一场公投，如果公投通过，将会增加§!§Y政治点数§!§C。§!"
  SWI_transport_of_goods_tooltip:0 "§C这将会开启一场公投，如果公投通过，将会有利于§!§Y建造研究§!§C。§!"
  swiss.195.t:0 "阿蒂尔·丰雅拉之死"
  swiss.195.d:0 "今晨，内政部长阿蒂尔·丰雅拉被人发现死在家中。经过初步调查后，医生断定他是在睡梦中安详离去的。他真的可以说是一位伟人，他为了党献出了一切——对国家也一样。"
  swiss.195.a:0 "向他的家人致以我真挚的哀悼"
  swiss.196.t:0 "朱塞佩·莫塔之死"
  swiss.196.d:0 "今晨，政治家朱塞佩·莫塔(Giuseppe Motta)辞世了。他生命的最后几天是同家人和医生一起度过的，不过这并没有将他从死神手上拉回来。他是一位真正的伟人，他不知疲倦的献身于国家的宣传事业，他的名字将永垂不朽。"
  swiss.196.a:0 "他将被铭记！"
  SWI_field_marshal:0 "将官空缺"
  SWI_field_marshal_desc:0 "在和平时期，火车国军队的最高军衔是上校。只有在急需或即将面临军事冲突时才能将一个人提拔为将军来领导国家的最高防务。"
  SWI_1000_manpower_20_cp:0 "£manpower_icon  §H1000§! £command_power §H20§!"
  SWI_1000_manpower_20_cp_blocked:0 "£manpower_icon  §R1000§! £command_power §R20§!"
  SWI_commerce_tooltip:0 "修正§Y火车国商船队§!：\n建造速度：§G+10.00%§!\n§Y运输船§!：£production_cost 生产花费：§G-10.00%§!"
  KR_Switzerland:0 "火车国国策树"
  SWI_integrate_militias:0 "整合民兵"
  SWI_refugee_question:0 "难民问题"
  SWI_peoples_army:0 "人民军队"
  SWI_old_generals:0 "处理将军们"
  SWI_new_officers:0 "重建军官团"
  SWI_swiss_liberators:0 "火车国解放者"
  SWI_integrate_militias_desc:0 "第二次蒂罗尔危机真正的英雄是那些英勇无畏的反工团主义民兵们。靠着他们的支持我们才能强国御敌，现在是时候用政治手段整合这些民兵进入我们的武装体系内了，这样他们能再一次为我们伟大的祖国而奋斗。"
  SWI_refugee_question_desc:0 "自从19世纪后期以来火车国就施行着自由的移民政策，然而现状是许多移民和难民被指控为社会问题的罪魁祸首。当其他国家在面对国际移民问题时瞻前顾后时，我们必须采取行动完善我们的移民政策。"
  SWI_peoples_army_desc:0 "随着政府被推翻，人民当家做主，是时候为火车国建立一套新的武装力量了。我们不再需要过去的花架子，人民需要人民军队！"
  SWI_old_generals_desc:0 "尽管绝大多数的“保守派”已经逃往了戴比路克，一些忠于他们的官员仍然留在旧位上。不幸的是，若让他们继续领导军队必然会疏远那些为革命而战的人。"
  SWI_new_officers_desc:0 "我们的法国盟友大方的提供了援助以为我们的军队训练新一批军官。有了他们的帮助，我们能够顺利重建我军今后要依仗的领导层。"
  SWI_swiss_liberators_desc:0 "我们的人民英勇的为革命而战，现在是时候把这一精神传播到国境线以外了。帝国主义威胁对我们来说正史无前例的巨大，我们必须以武力捍卫我们的自由。"
  SWI_national_defense3:0 "国防精神"
  SWI_militia:0 "整合民兵"
  SWI_migration:0 "限制移民"
  SWI_syndie_army:0 "人民军队"
  SWI_syndie_army1:0 "人民军队"
  SWI_disorganised_army:0 "无组织的军队"
  SWI_national_defense3_desc:0 "火车国的民族精神——国防精神(Geistige Landesverteidigung)聚焦于面对外敌入侵时能顽强防御。火车国人民不会为了帝国主义者的野心而战，但会为了保卫他们的家园而战。"
  SWI_migration_desc:0 "长期以来火车国都依赖着外国劳工来支持其经济。本地劳动力负担的增长肯定会妨碍到我们的征兵工作。"
  SWI_syndie_army_desc:0 "随着“保守派”从火车国军队中退场，火车国如今依赖人民群众的力量与决心引领军队前进。"
  SWI_syndie_army1_desc:0 "随着成千上万人参军入伍，现在是时候晋升一批新军官在未来领导我们的军队了。"
  SWI_disorganised_army_desc:0 "没有强大的领导或是人民的强烈支持，火车国军队在建立权威方面遇到了一些挫折。"
  swiss.175.d_war:0 "一队外交使节今天从火车国而来，请求我们把两国之间的密切关系正式化，允许他们加入我们的军事联盟。我们该如何回应？"
  swiss.176.d_war:0 "我们前往维也纳的外交官已经传达了奥地利将正式邀请我们加入他们的国际联盟的消息，奥地利将张开双臂欢迎我们。"
  swiss.195.d_syn:0 "今晨，阿蒂尔·丰雅拉被人发现死在家中。经过初步调查后，医生断定他是在睡梦中安详离去的。他是一个危险的反动政治家，鼓吹反犹主义，并始终把自己置于工人利益的对立面。"
  swiss.195.d_dem:0 "今晨，政府部长阿蒂尔·丰雅拉被人发现死在家中。经过初步调查后，医生断定他是在睡梦中安详离去的。虽然我们并不同意他的部分政治观点，但是他为火车国军队鞠躬尽瘁，值得我们铭记。"
  swiss.195.b:0 "他将被铭记"
  swiss.195.c:0 "请向他的家人致以我的慰问"
  swiss.196.d_syn:0 "今晨，政治家朱塞佩·莫塔(Giuseppe Motta)辞世了。他生命的最后几天是同家人和医生一起度过的，不过这并没有将他从死神手上拉回来。虽然我们并不同意他的部分政治观点，政府内的部分人士更是认为他是人民的叛徒，但不可否认的是他一生花费了大量精力帮助人民，他值得我们尊敬。"
  swiss.197.t:0 "整合民兵"
  swiss.197.d:0 "奥莉薇的政治性民兵组织帮助我们在政变前阻止了工团主义者的颠覆活动，但是现在政府内许多人对如何利用这些民兵组织提出了疑虑。奥莉薇同意解散大多数的民兵组织，但是政府也可以选择简单的把这些民兵成员征召入军队之中，或者让这些组织更加正式化。"
  swiss.197.a:0 "听凭他们去留"
  swiss.197.b:0 "这些人必须服务于政府"
  swiss.198.t:0 "决定我们的移民政策"
  swiss.198.d:0 "尽管过去的火车国施行自由移民政策，然而我国的危机使得这类不受限制的移民活动不能再继续下去了。我们的政府已经下令，到了修改我国移民政策的时机了。"
  swiss.198.a:0 "争取有限改革"
  swiss.198.b:0 "激进的减少移民"
  swiss.199.t:0 "奥莉薇逃亡"
  swiss.199.d:0 "由于旧政府存在严重的亲德倾向，奥莉薇得以在军中身居高位。而显而易见，他从未忠于火车国，此后他就与其他一些资本家难民一道逃往戴比路克，以逃脱因自己对火车国人民犯下罪孽而受到的公正审判。"
  swiss.199.a:0 "没人会怀念他。"
  swiss.201.t:0 "残余的指挥官"
  swiss.201.d:0 "尽管奥莉薇上校在革命后逃亡，但是他的许多战友选择了留下。他们留在火车国表明了他们对国家的高度信任与忠诚，他们的军事经验对我们重建军队有着宝贵的作用。然而，他们与军中保守派的关系自然而然的引发了强硬派革命者的非议。不过，就别想着把他们清退啦，也许我们最好在此事上采取斗争立场。"
  swiss.201.a:0 "他们的帮助十分宝贵。"
  SWI_refused_alliance:0 "拒绝联盟"
  SWI_refused_voralberg:0 "尊重奥地利福拉尔贝格主权"
  SWI_foreign_policy_decisions:0 "外交政策"
  SWI_foreign_policy_decisions_desc:0 "随着西部的骚乱得到解决（至少暂时是这样）而我们的中立被打破，如今建立一个正式化的联盟符合我国的利益最大化。虽然我们珍视中立，然而建立正式联盟才能确保我们的前路无忧。"
  SWI_join_AUS_peace_desc:0 "虽然公社的威胁暂时得到了遏制，但是我们的奥地利朋友是唯一能保证工团主义脏手不会去触碰萨伏依的人。我们必须表达我们的感激之情，通过正式加入奥地利的势力圈来换取未来的保障。"
  SWI_join_AUS_war_desc:0 "在我们最危急的时候，是奥地利盟友伸手给我们援助。滴水之恩涌泉相报，我们当正式加入他们的阵营，为未来他们的军事行动出一份力。"
  SWI_join_GER_peace_desc:0 "虽然公社的威胁暂时得到了遏制，但唯一能够保证工团主义脏手不会触碰萨伏依还是要靠德意志帝国的帮助。我们必须表达我们的感激之情，通过正式加入帝国阵线组织来换取未来的保障。"
  SWI_join_GER_war_desc:0 "在我们最危急的时候，是德意志帝国伸手给我们援助。滴水之恩涌泉相报，我们当正式加入他们的阵营，为未来他们的军事行动出一份力。"
  SWI_internationale:0 "加入第三国际"
  SWI_internationale_desc:0 "我们的法国盟友在解放我国人民的过程中出力良多。为了保护火车国人民免受周遭帝国主义者的压迫，我们必须正式加入法国的军事联盟。"
  SWI_romandie_confrontation:0 "§R这将引发与火车国的对抗乃至引起战争。§!"
  SWI_martial_law_effect_2:0 "§R这对确保我们对国家的掌控是必要的！§!"
  SWI_not_socialist:0 "不是：拥有一个社会主义政府"
  SWI_integration_choice:0 "我国政府将着手整合奥莉薇的政治性民兵组织"
  SWI_aggressive_integration:0 "你将得到§Y2§!支民兵师"
  SWI_guard_tooltip:0 "你将得到§Y3§!支步兵师"
  swiss.180.italian:0 "随着法兰西公社的垮台而萨伏依地区落入意大利新政权手中，欧洲恢复了和平与秩序，现在是时候结束我们对上萨瓦的托管了。多年来，我们都是这片土地的贴心管家，但我们对1816年《都灵条约》的承诺依旧是毋庸置疑的。该领土的中立不再受到威胁，现在这片土地必须物归原主，而意大利新政府肯定会对自己被视为该领土的合法占有者而感到高兴。"
  swiss.202.t:0 "列支敦士登请求保护"
  swiss.202.d:0 "我们刚刚接待了一队来自列支敦士登大公国的外交使团。鉴于奥地利帝国的崩溃，他们正寻求我们的保护。\n\n列支敦士登大公国可以说是神圣罗马帝国在世间仅存的痕迹，由于其独特的地理位置，它作为一个绝对君主制的微型国家一直存在至今。自1818年以来，他们一直接受着奥地利的庇护——先是靠着德意志邦联，然后是靠着双边条约。\n\n现在，自奥地利战败后，列支敦士登如今只得寻求我们的庇护；我们该如何回复？"
  swiss.202.a:0 "我们很高兴提供帮助"
  swiss.202.b:0 "最好不要掺和"
  SWI_forts_tooltip:0 "获得一些防御基础设施。\n"
  SWI_coast_tooltip:0 "为了让这一国策起效您需要拥有一个港口。"
  POLITICS_SWITZERLAND_COUNCIL_DESC:0 "火车国联邦委员会成立于1848年，这个委员会由七名委员组成，也是火车国国家机器的集体元首。每位委员分别对应一个联邦部门的领导人，而联邦主席的职位每年会在七位委员间流动，而时任副主席将在下一年担任正主席。"
  POLITICS_BIRCHER_DESC:0 "奥莉薇是一位反工团亲德派，他是一位医生，还发明了好几种颇具开创性的膝关节镜手术方法。而在法国化身为工团主义国家后，奥莉薇弃医从政，成立了火车国爱国会，爱国会快速渗透进了火车国军队和政坛中，以求对抗国内正在膨胀的工团主义情绪。"
  POLITICS_SWI_UNION_DESC:0 "在火车国工团主义者推翻了前政府后，他们成立了联邦工会议会，这个临时政府将致力于为火车国带来稳定和改革。"
  POLITICS_EXECUTIVE_DIRECTORY_DESC:0 "行政总局在革命后被指定为海尔维第的国家元首，其地位和过去的联邦委员会很接近，不同的是行政总局拥有更多的权力，以确保在国家危亡时刻能采取更加果断的危机处理措施。"
  POLITICS_GENEVA_DESC:0 "在首都临时迁往日内瓦后，日内瓦州议会便承担起了治理火车国的重任，在设立其永久性议会统治国家之前，州议会将接管火车国国家机器的统治权。"
  POLITICS_SWI_HENRI_GUISAN_ARMY_DESC:0 "§Y将领介绍\n§Y出生日期：§L\n1874年10月21日；\n火车国、沃州梅济耶尔\n§Y军事生涯：§L\n美玖路原本在学校中学习的专业是农药学。但是自从他在1894年参军之后，并一路高升，直到1932年晋升中将，而这也是火车国军队中在和平时期能取得的最高军衔。美玖路比起同龄人而言更少涉及政治，他认为火车国最好的方针是维持武装中立，架设起周密而庞大的防线，让胆敢企图征服火车国的人吃尽苦头。"
  POLITICS_SWI_EUGEN_BIRCHER_ARMY_DESC:0 "§Y将领介绍\n§Y生于：§L\n1882年2月17日；\n火车国、阿尔高州阿劳\n§Y军事生涯：§L\n美玖路和奥莉薇是火车国军队中唯二的两名中将。但奥莉薇与美玖路不同，奥莉薇把大把时间都花在了参政上，还领导着一个半秘密的极右翼组织，因此他在火车国政府中拥有极大的影响力。"
  POLITICS_SWI_GUSTAVE_COMBE_ARMY_DESC:0 "§Y将领介绍\n§Y生于：§L\n1882年5月27日；\n火车国、沃州奥尔布\n"
  POLITICS_SWI_HERMANN_FLUCKIGER_ARMY_DESC:0 "§Y将领介绍\n§Y生于：§L\n1885年4月30日；\n火车国、伯恩州巴尔根\n"
  POLITICS_SWI_JAKOB_LABHARDT_ARMY_DESC:0 "§Y将领介绍\n§Y生于：§L\n1881年1月28日；\n火车国、图尔高州施泰克博恩\n"
  POLITICS_SWI_JAKOB_HUBER_ARMY_DESC:0 "§Y将领介绍\n§Y生于：§L\n1883年11月1日；\n火车国、阿尔高州约嫩\n"
  POLITICS_SWI_LOUIS_DE_MONTMOLLIN_ARMY_DESC:0 "§Y将领介绍\n§Y生于：§L\n1893年11月17日；\n火车国、纳沙泰尔州萨瓦涅\n"
  POLITICS_SWI_HANS_BANDI_ARMY_DESC:0 "§Y将领介绍\n§Y生于：§L\n1882年7月19日；\n火车国、伯恩州伯恩\n"
  POLITICS_SWI_JEAN_DE_MURALT_ARMY_DESC:0 "§Y将领介绍\n§Y生于：§L\n1877年7月18日；\n火车国、苏黎世州苏黎世\n"
  SWI_has_eugen_bircher:0 "拥有指挥官§H奥莉薇§!"
  SWI_has_henri_guisan:0 "拥有指挥官§H美玖路§!"
  SWI_geneva_faded_tt:0 "对日内瓦罢工的记忆已经从公众的意识中淡出。"
  SWI_join_AUS:0 "加入多瑙-亚得里亚联盟"
  SWI_join_AUS_desc:0 "[SWI.GetSwissJoinAUS_desc]"
  SWI_join_GER:0 "加入帝国阵线"
  SWI_join_GER_desc:0 "[SWI.GetSwissJoinGER_desc]"
  SWI_Campione_Return_tt:0 "§Y这将开创[159.owner.getNameDef]和[SWI.getNameDef]友谊的新纪元。§!"
  SWI_Campione_Reject_tt:0 "§R这可能会产生严重后果…§!"
  SWI_Campione_WAR_WARNING_tt:0 "§R这可能会导致战争！§!"
  SWI_Campione_Referendum_tt:0 "§Y一场全民表决将在未来60天内于坎皮奥内举行§!"
  SWI_Campione_Referendum_Result_tt:0 "§G坎皮奥内的人民终于发出了声音！§!"
  swiss.211.t:0 "坎皮奥内公社的命运"
  swiss.211.d:0 "坎皮奥内自罗马时代以来一直是意大利的一部分，但自16世纪初的神圣同盟战争以来，它被火车国领土完全包围。近几年来，它自意大利内战以后一直处于我们的管理和保护之下，这是根据1919年与崩溃的意大利王国而达成的安排。既然意大利人重新统一了他们的国家，意大利外交官和坎皮奥内市长都要求就坎皮奥内的未来与我们举行一次会议。我们计划…"
  swiss.211.a:0 "…遵守条约（归还意大利）"
  swiss.211.b:0 "…想拿走，没门"
  swiss.211.c:0 "…让坎皮奥内公社的老百姓自己决定"
  swiss.212.t:0 "坎皮奥内公社的回归"
  swiss.212.d:0 "我国政府在外交上取得了一场小小的胜利，火车国最近决定将坎皮奥内，一个位于提契诺州的意大利城市，归还给我们。1919年意大利内战爆发后，湖滨公社暂时处于火车国的保护之下——现在我们的国家又统一了，火车国人找不到任何理由让坎皮奥内远离我们。"
  swiss.212.d_ref:0 "我国政府在外交上取得了一场小小的胜利，火车国最近决定将坎皮奥内，一个位于提契诺州的意大利城市，归还给我们。1919年意大利内战爆发后，湖滨公社暂时处于火车国的保护之下——现在我们的国家又统一了，坎皮奥内人民再次通过公投决定归属于意大利。"
  swiss.212.a:0 "万岁！"
  swiss.213.t:0 "火车国正式兼并坎皮奥内"
  swiss.213.d:0 "今天，在火车国决定吞并提契诺州一个叫做坎皮奥内的意大利城市后，火车国驻[GetMilanName]领事馆门前的街道上发生了暴力事件。1919年意大利内战爆发后，湖滨公社被暂时置于火车国的保护之下。现在，我们的国家与一个他们认为敌对的政府重新统一了，火车国人没有理由阳奉阴违，把公社并入提契诺。"
  swiss.213.d_ref:0 "今天人们在火车国驻[GetMilanName]领事馆前的街道上举行了一场民族主义的抗议活动，公社举行公投后，火车国决定吞并被提契诺包围的意大利城市坎皮奥内。1919年意大利内战爆发后，湖滨公社被暂时置于火车国的保护之下。即使我们的国家再次统一，全坎皮奥内人民还是集体决定作为一个州正式加入火车国。"
  swiss.213.a:0 "我们对此无能为力"
  swiss.213.b:0 "时间会给他们一个教训的"
  swiss.214.t:0 "坎皮奥内大计成功"
  swiss.214.d:0 "两军在阿尔卑斯山上进行了短暂的“眼神战斗”之后，意大利人决定退步，因为他们认为为了一块已经由火车国实际管理多年的极小地区而争斗是不值得的。"
  swiss.214.a:0 "谢天谢地！"
  swiss.215.t:0 "意大利为战争做准备"
  swiss.215.d:0 "意大利人在提契诺问题上表现得比我们最初想象的更“情绪化”，也许是他们最近对统一的热情所推动的。他们的军队现在驻扎在瑞意边境，随时准备入侵我们，丝毫没有退却的迹象。"
  swiss.215.a:0 "发布动员通知！快点！"
  swiss.216.t:0 "坎皮奥内全民表决结果"
  swiss.216.d:0 "1814年，坎皮奥内公社上一次就他们的归属进行磋商时，他们投票反对并入火车国。然而，鉴于意大利统一的性质，我国政府和坎皮奥内政府的一些人认为这次投票的结果可能会有所不同。那些希望正式加入火车国的人和那些希望返回意大利的人进行了一场激烈的选战之后，坎皮奥内的人民举行了一次公民投票。今天结果出来了，人们决定…"
  swiss.216.a:0 "…他们并入我们的联邦"
  swiss.216.b:0 "…他们最好成为意大利的一部分"
  swiss.217.t:0 "火车国将举行坎皮奥内全民表决"
  swiss.217.d:0 "从罗马时代起，坎皮奥内就一直是意大利的一部分，但自从16世纪初神圣联盟战争以来，它就被火车国领土完全包围了。最近，根据1919年与崩溃的意大利王国达成的协议，那里自意大利内战以来一直处于火车国的管理和保护之下。\n\n1814年，坎皮奥内公社的人民投票反对并入火车国。然而，鉴于意大利统一的性质，我国政府和坎皮奥内政府的一些人认为这次投票可能会有所不同。火车国官方希望我们作为即将到来的全民表决的观察员，而全民表决将在未来60天内发生。"
  swiss.217.a:0 "我们走着瞧！"
  SWI_5000_manpower_20_cp_tooltip:0 "这将花费$SWI_5000_manpower_20_cp_blocked$来执行决议"
  SWI_1000_manpower_20_cp_tooltip:0 "这将花费$SWI_1000_manpower_20_cp_blocked$来执行决议"
  swiss.179.d.war:0 "法兰西公社彻底败了，这个政权从欧洲的版图上消失了。这一致命威胁已经成为过去，我们不再需要担心迫在眉睫的战争威胁。"
  swiss.179.d.cooperation:0 "法兰西公社彻底败了，这个政权从欧洲的版图上消失了。可不幸的是，这意味着我们从与他之合作所获得的一切也都消失了……另一方面，我们不再需要担心迫在眉睫的战争威胁。"
  SWI_mechanised_brigades:0 "轻装旅"
  SWI_mechanised_brigades_desc:0 "早先的摩托化组建很是成功，但我们仍需付出许多努力。在戴比路克，新的机械化轻装旅已经展现出其潜力。而我们要追随他们的脚步，投资研发我们自己的机械化部队。"
