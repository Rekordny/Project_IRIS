 #界面简介
 TRB_GATHERING_STORM_DESC:0 "火车银行是火车帝国被推翻后所建立的新国家。\n\n在第三次圣杯战争后，圣杯王国将瑞士银行扶持起来，用以控制全世界的经济。在这个过程中，民主思想传入了火车帝国，本就对帝国现状极其不满的民众们在其策动下发动了西欧历史上最混乱的一次革命，推翻了火车帝国的统治。但也正是由于这次革命，瑞士银行成功介入并掌控了新政府的大部分权力，成为了火车银行事实上的统治者。\n\n在新政府成立后，由于各项法律的不完善，原先只能作为“工具”的铁路人偶们也能参与国家事务之中。而在这些铁路人偶之中，八六凭借其超高的人气，成为了火车银行民主党派的名誉主席。"
 
 
