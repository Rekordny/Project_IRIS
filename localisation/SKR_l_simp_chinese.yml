 SKR_Kaiyoumaru: "開陽丸"
 SKR_Oda_Nobunaga: "織田 信長"
 SKR_Oda_Nobunaga_desc: "§C正一位 征夷大将军 织田信长§!\n\n幼名吉法师，是前代将军织田信秀的嫡女。信长自少女时代起常有荒诞不羁的行为，在外人眼中极不检点，她厌恶官场的繁文缛节，喜着异装，常在外与平民子弟为伍，因而被京州的公家圈子嘲为“白痴公主”。\n\n信长自幼便痴迷于外来的机械、火器与早樱之外的世界。3053年，在父亲去世后，18岁的织田信长继任征夷大将军，她向全国贤士征求意见的举措轰动全国，也标志着一个激进改革时代的开始。为了达到“富国强兵、废除不平等条约”的目的，信长不择手段，无情冷酷地压制一切阻挠势力。世界大战期间，信长动员全国志士捍卫国家，也让她的声望达到了顶峰。\n\n然而，3086年的“黑沫夜”重创了她的改革成果，激化了社会矛盾。她试图力挽狂澜，却发现自己的道路已将自己逼成孤家寡人。除了亲手提拔、同样被视为异类的新选组，她已孑然一身。3090年，尽管她以铁腕维持着表面的平静，但早樱已然暗流汹涌。"
 SKR_Ootori_Keisuke: "大鳥 圭介"
 SKR_Ootori_Keisuke_desc: "§Y生于：§!§L3040年；早樱幕府、天领东云§!\n§Y派系：§!§t革新派§!"
 SKR_Ito_Kashitaro: "伊東 甲子太郎"
 SKR_Ito_Kashitaro_desc: "§Y生于：§!§L3042年；早樱幕府、天领平泽§!\n§Y派系：§!§C新选组-御陵卫士系§!\n§Y生涯：§!§L伊东出生于幕府天领-平泽地区的学者家庭，自幼便展现出惊人的才华。她不仅剑术高超，更精通国学、诗歌与历史。\n与近藤和土方的草莽出身不同，伊东的友人都是各藩的知识分子和偶像。在世界大战期间，她并没有直接参军，而是作为民间志士活跃在社交界。她认为，早樱的未来在于“尊王攘夷”——即尊崇神皇的神圣高洁，驱逐野蛮的外国习气（虽然她不排斥技术，但讨厌文化入侵）。\n3073年，近藤勇为了提升新选组队士的文化素养和政治地位，三顾茅庐邀请当时已有名气的伊东甲子太郎入队。 伊东抱着“从内部改造这个暴力组织，将其变为神皇的勤王之师”的理想加入了新选组。 然而，进来后她才发现新选组实际上是土方岁三的一言堂。土方的严酷管理和芹泽的流氓习气让自视清高的伊东感到窒息。她看不起近藤和土方的出身，认为她们“只有匹夫之勇，不懂国家大义”。\n对现状失望的伊东在队内拉拢了一批同样受过良好教育、对土方的高压统治不满的队士，形成了“御陵卫士系”。 她频繁地与北方的王政复古派及各地偶像接触，期盼着脱离幕府这艘旧船，成为神皇陛下真正的卫士的那一天。§!"
 SKR_Okita_Souji: "沖田 総司"
 SKR_Okita_Souji_desc: "§C正一位 征夷大将军 冲田总司§!\n\n新选组一番队队长、试卫馆出身、“天然理心流”、剑圣。\n\n冲田总司出生于音乃藩下的一个普通村庄。冲田家在战国时代曾是效力于某北方神官领主的下层武士家族，但在织田幕府推行改革后，家族很快沦落为普通农户。\n\n总司自幼体弱多病，父亲教她剑术本为强身，但她却展现出了惊人的天赋。3060年，父亲病逝，冲田家没有男嗣，只有总司和两位姐姐，两位姐姐已到婚龄，而幼妹总司体弱、不善农事却整日摆弄刀剑，前途尤为堪忧，在看重劳力的农村，这几乎意味着家境将迅速凋敝。\n\n转机以意想不到的方式展开，同年秋，京州的“试卫馆”馆长近藤周助偶然听闻村中有一位“会使祖传剑术的病弱少女”，对此深感好奇，前去探访。近藤周助认为总司是可塑之才，他提出：试卫馆接纳总司为 “内弟子” ，作为交换，总司需在学成后为试卫馆效力数年。对冲田家而言，这不仅是给体弱的小女儿找到了一条体面的出路，也能为家族减轻负担、甚至是带来声望。在姐姐们的支持下，9岁的总司正式进入试卫馆学习剑道。在这里，她遇到了两个将改变她命运的人：近藤勇和土方岁三。\n\n在试卫馆，她是公认的“斩神剑士”。年仅十几岁便获得“天然理心流”的“免许皆传”，后来还成为剑术指导。这让她在周围人眼中成了一个“奇怪但无比强大的少女”。\n\n3067年，世界大战爆发。幕府急需一切战斗力量。试卫馆的同袍们怀着各自出人头地的梦想，以“壬生浪士”的身份投身军旅。总司最初对此毫无兴趣，她只是跟随如同姊妹的近藤和土方走上了战场。然而在战场上，她的剑术价值被无限放大，其勇武传说在军中流传，最终传到了赏识奇才的将军——织田信长耳中。\n\n信长召见了她，对总司而言，信长是第一个不因她的性别或古怪性格而侧目，纯粹认可其作为剑士价值的大人物。这种纯粹的认可触动了总司的内心。她并非出于政治忠诚，而是以一种武者对知己的纯粹追随，将自己的剑与性命，全部交给了信长。"
 SKR_Enomoto_Takeaki: "榎本 武揚"
 SKR_Hijikata_Toshizo: "土方 歳三"
 SKR_Hijikata_Toshizo_small_desc: "§Y生于：§!§L3042年；早樱幕府、天领五河§!\n§Y派系：§!§C新选组-试卫馆系§!\n§Y生涯：§!§L土方岁三出生于五河地区的一个富农家庭，是家中幼女。但她并不像其他女孩那样憧憬成为偶像或嫁入豪门，反而因为家里经营“石田散药”的缘故，从小背着药箱行商。作为商人，她在路上见过太多因为弱小而被欺凌的惨剧。她意识到，在这个乱世，眼泪是最廉价的，惟有手中的剑才能保护自己与他人。3057年，15岁的土方岁三在行商途中结识了胜子（后来的近藤勇）。最后正式加入试卫馆学习剑术，与近藤结拜为姐妹。\n在世界大战期间，土方岁三展现出了与众不同的特质。她认为，如果“壬生浪士”只是一群会杀人的野兽，战后必然会被抛弃。为了让近藤勇的梦想（成为真正的正规武士）实现，土方开始在军中推行严酷的纪律。她亲自处决了多名作战勇猛但违反军纪的队士，甚至差点与芹泽鸭当场火并。正是他的冷酷，让这支杂牌军有了正规军的雏形，也赢得了织田信长的另眼相看。\n战后，新选组被正式收编。土方岁三就任副长，她制定了严苛的《局中法度》，并建立了一套高效的监察体系。她极力推动新选组的近代化：换装新式步枪、学习合众国的排兵布阵、甚至引入工业-玛娜的对抗训练。这二十年里，她与芹泽鸭的矛盾日益尖锐。在她眼中，芹泽鸭是阻碍新选组成为“现代化军队”的最大毒瘤。为了压制“逍遥系”，土方在幕府官僚体系中积极活动，变得越来越像一个政治家，而非单纯的剑客。§!"
