 SKR_kyoushuu_aresenal_organization_mio_desc: "§Y国立制铳厂§!\n§W京州陆军工厂由征夷大将军织田信长亲自创建，该厂引入了当时最新的南蛮技术，并破例允许外国工程师参与工厂日常运营当中。在武家的直接支持下，该厂在投产两年后就达到了最大产能并持续扩建，目前已然是早樱最大的武器生产商。§!"
 SKR_itsuka_seitetsujyo_organization_mio_desc: "§Y五河镇守府§!\n§W五河制铁所作为早樱建立现代海军计划的重要一环，肩负着提高本土船只建造能力的重要使命。制铁所主体恰好位于合众国黑船舰队锚地旧址附近，象征着早樱奋发图强、实现国防自主的期望。§!"
 SKR_hirazawa_aresenal_organization_mio_desc: "§Y平泽集团§!\n§W平泽炮兵工厂本部位于平泽国小木曾城，是早樱幕府国防现代化项目的重要一环。该厂的建立使得早樱第一次具有了量产小型和中型火炮的能力，尽管其仍被质疑为重金引入了南蛮的奇技淫巧，但将军的御马从不会停下脚步。§!"
 SKR_komatsu_aresenal_organization_mio_desc: "§Y小松集团§!"
 SKR_yamaha_organization_mio_desc: "§Y山叶集团§!"
 SKR_southwest_aresenal_organization_mio_desc: "§Y西南之星§!\n§W西南制铳所为鹿儿藩自行创立的兵工厂，并引进了合众国斯普林菲尔德工厂的技术和产线。厂址位于鹿儿国佐世鹤，该地作为与合众国贸易最为频繁的港口，能够第一时间探听到世界局势的走向。§!"



#事件
 SKR.1.t: "初诣（其一）"
 SKR.1.desc: "新年的京州演舞场一如往年般沸腾，作为全国偶像演出的圣地，一年一度的新年参演可谓是一票难求。层层垒叠而起的席位中，衣着华贵的达官显贵与寻常百姓交杂在一起，用尽全力的挥舞着荧光棒为舞台中翩翩起舞的巫女歌姬引援助力，排山倒海般的声浪几乎将整个演舞场吞没。除了...那位于最顶端，视野最佳的“御用包厢”。\n\n“せいやっ，はっ、はっ、よーっ。”\n\n绝好的隔音设施让这间传统的早樱式包厢免于被周遭狂热的氛围打扰，但如果聒噪自箱内则无能为力了。织田信长微微晃着脑袋，视线看向了那正在最前方用力应援而不注意把大半窗口挡住的近藤勇。“勇，就算是出来放松也不能这样，挡着信长大人看演出了。”土方岁三比自己更快一步的开口说道，红发的武士端坐在自己的侧身，有些无奈的开口提醒着自己的这位顶头上司。\n\n“嘛，不必在意，年年都有的演出我也早看的厌了，这次来也只是想感受下久违的热闹气氛。”信长摆了摆手，示意土方无需在意。这也并非谎话，年初的初诣是难得的能够把大家聚集在一起的活动，久违的放下对立偏见也不失为一件好事。只可惜，这也终究只是自己的一厢情愿。\n\n“芹泽阁下看来又是喝酒喝过头了呢，连信长殿下的邀请函都没有收到。”啜饮着杯中热茶的冲田总司轻轻的点出了信长内心的烦躁，近些日子，芹泽——或者说“逍遥系”愈来愈躁动不安，这次的初诣观演本是一个能好好跟这位老将谈话的机会，但看样子还是被芹泽用酒精挡了下来。“真可惜呢，去年她好像也没有出席，我本以为能跟她好好叙叙旧..”不知什么时候近藤勇已经坐回到原位，一同从战场上走下来的二人如今却形同陌路，近藤勇显露出更加直接的惋惜。“那个家伙...啧。”土方也愤愤的跟上了一句，还算温馨的房内因芹泽鸭名字的出现而现出几分凉意。"
 SKR.1.a: "乾杯！（清脆的碰杯声）"
 SKR.2.t: "初诣（其二）"
 SKR.2.desc: "“你来晚了啊庆喜，芹泽她们都已经走了，我还以为等不到你了。虽然你推脱了表演，但我想参拜你应该不会缺席。”在签筒前默默祈福完的一桥庆喜有些意外的回头看去，在看清来者是谁后，眉头细不可察的皱了一下。大好的新年时光一桥庆喜不想让令人烦躁的争吵破坏她的好心情，于是她特地算好了时间，在新选组一行人参拜完神社后，才不慌不忙准备享受这独属于自己的安宁初诣，但看样子自己的计划是落空了。\n\n“姐姐大人，新年快乐，近来身体可好？”毕恭毕敬却又保持着距离，为这位并无血缘关系的织田家长女送上了问候。\n\n“我是好得很，倒是庆喜，你的办公室直到跨年夜还在亮着灯，该注意休息的是你才对。”织田信长脸上挂着和蔼的微笑，却也并未再向着自己的妹妹迈出脚步，现如今，昔日一起学习与生活的二人，不知从何时起连并肩而行都做不到了。意识到这一点的信长张了张嘴，却什么也没说，那酝酿好的后话无声的在喉舌间消散了。而眼前的庆喜似乎也想到了一起，目光微移，看向了中庭那并未开花的樱花树，并未多言。\n\n就在早樱的两位政治巨头陷入微妙的尴尬境地时，木屐踏着石砖靠近声提醒着一位不速之客的到来。“或许...我来的不是时候？”看着那分别驻足在签筒两侧的二人，伊东甲子太郎向上拉了拉自己的围巾，下意识的想要遮掩自己的尴尬。她不是一个在信长的小圈子里多受欢迎的人，虽不屑于与新选组挤在一个房间内，但初诣无论如何也是不能缺席，通过神社中的偶像的关系，伊东卡着新选组离去的时间才登门拜访，却恰好撞见了织田家的姐妹无声“对峙”。\n\n“真是的，弄得这么紧张兮兮，可要给列位神皇看笑话了。”看清来者是谁后的信长，丝滑的在庄严的神社里开了个神皇的小玩笑，而也不意外的的招来了伊东的白眼。“所以，来签筒这里不是要抽御神签的吗？别忘记正事。”庆喜的开口算是为刚刚的冷场画上了句号，打破了这层微妙隔阂后，三位政见大相径庭的老对手就这样默默的并排站在了一起，向着神明与先祖许下了同一个愿望——让早樱变得更好。\n\n祈祷完毕后，三声硬币落进奉纳箱里，签筒里的御神签跟着少了三张。“我的是小吉，你的呢伊东？”“中吉，还不错，就是为什么说要注意适度饮酒？”庆喜和伊东互相看着彼此的神签，顺势讨论起御神签上的内容。“姐姐大人，你的签是什么吉？”庆喜看向一旁在看风景的信长，开口询问道。“我嘛，哼哼保密...”“切...还是和以前一样呢。”“保持神秘感耍帅吗？”忽视两人的吐槽的信长只是笑了笑，摆摆手跟今日一同参拜的两位老友告别，先一步的踏出了神社的门槛。"
 SKR.2.a: "出门后，信长将那张“大凶”随手扔到了垃圾桶里"
 SKR.3.t: "春寒料峭"
 SKR.3.desc: "芹泽鸭怔怔的看着手中那半张来自织田信长的请柬发愣，在收到的当时她就把这扰了她酒兴的通知扔到了火炉里，可结果却又赶在它彻底烧成灰前从火里取了出来，芹泽鸭也不明白自己到底怎么想的了，自打战争结束，她就像是孤魂野鬼，徘徊在这令人生厌的世界里。\n\n芹泽鸭在少有清醒的时候，偶尔也会反思自己是否应该接受这该死的现状，与近藤勇那帮新选组里的窝囊废和解，就这样告别政坛和社会，继续当她以前那逍遥自在的浪人。但这萌生的念想无一不会再下一瞬被芹泽鸭亲手斩断。她厌恶和平，更厌恶退让，那年未分胜败的战争令芹泽鸭作呕，她永远无法忘记那所谓和平到来的那天，自己心里的愤慨与失望。织田信长忘记了那些为她的千秋伟业付出生命的士兵，近藤勇和土方岁三更是抛弃了武士道精神，沦为了溜须拍马的政客，这一切都令她想吐。\n\n“咕...呕...”胃酸的疯狂反噬终究打垮了人类的身体，踉踉跄跄的走到了卫生间，将彻夜纵饮带来的负担尽数吐出，靠着墙壁滑坐在地上，镜子里倒映着的是连她都感到陌生的憔悴脸庞，她是怎么变成这样的？不、这不重要。\n\n扶着墙壁缓缓站起身的芹泽鸭神色恢复了往常，仿佛刚刚的失意从不存在。因为她有着哪怕沦丧至此也要活下去的执念，信长忘记了，勇忘记了，但她芹泽鸭不能忘，那些在战场上浴血奋战同她一道战斗的亡魂，芹泽鸭必须要给一个交代，她们期待的早樱绝不是这般对着列强卑躬屈膝的丑陋模样。而为了等到那梦寐以求的战争，现在的芹泽鸭必须要忍耐过和平的黑夜。将那封来自过去和现在的请柬顺手扔进了火堆里，芹泽鸭拿起了训练用的试刀，准备开始自己今天的地狱式训练，为了那等待自己大展拳脚的未来。"
 SKR.3.a: "我不需要二十年后的墓碑"
 SKR.4.t: "陆军内的斗争"
 SKR.4.desc: "“很少见到你这么发愁的样子呢，信长大人。”将事务官送来堆积如山的报告整理完毕后，冲田总司看向那对着桌面皱眉头的织田信长，有些疑惑的开口问道。\n\n“嗯，算是有些麻烦呢，冲田，过来看一下这个。”简单应了一声的冲田拎着坐垫坐到了信长的身旁，在乱糟糟的桌面正上方的那两沓文件，大鸟圭介和土方岁三的名字清楚的写在了最醒目的位置。\n\n“是预算问题吧，每到这时候圭介和小土总会为这个争个头破血流呢”简单扫了眼，冲田就清楚信长到底为何而发愁。“哈哈，要是以前的总司一定会拉着她们两个在训练场打上一架，谁打的好谁就能拿下最多的预算。”“信长大人，真是的...不要逗我玩啊。”冲田不轻不重的锤了一下紧贴在身边的征夷大将军，提醒着对方往事莫提的道理。这些年总司一直被信长当做副手一直带在身边，磨练作为下一任潜在接班人能力，而如今曾经不谙世事的“剑圣”也褪去了先前的稚气，能以政治家的视角审视问题了。\n\n大鸟圭介和土方岁三都是历经世界大战的战火走来的军事元老，对早樱军队的建设出力甚多，在冲田看来，她们可以说是信长在军队里的左膀右臂。可偏偏二人的关系素来不睦，游历各国而才学渊博的大鸟圭介向来视土方岁三为故步自封的顽固派，而后者也不止一次批判大鸟圭介是空谈理论和规划的纸上谈兵家。也正是因为有信长在，二人的矛盾才不至于公开化。\n\n“冲田，你怎么看？”陪着身旁的信长将二人针锋相对的方案看完后，信长突然开口问道。这位征夷大将军托着下巴，饶有兴致的看着自己，一副“已有定论，只看能不能想到一块去”的样子。“又想来考我么，信长大人。”对于这时候玩心大起的信长，冲田只能回以无奈。毫无疑问的是，手边的两份方案都相当优秀，但对决策者而言，优秀不是正确的同义词，信长所要的只有符合国家利益的规划，那正确答案就相当明显了。"
 SKR.4.a: "“现代化已经是不可逆的趋势了，对吧？”"
 SKR.4.b: "“精锐的步兵才更加符合早樱的地形”"
 SKR.5.t: "实业兴国"
 SKR.5.desc: "自合众国黑船叩关已历经数十年载，在敌寇战争威胁与钢铁巨兽威胁下，耻辱开国的记忆始终是民族心头的一块疮疤，但另一方面，却也为灰暗的未来照进了一道值得全体国民戮力同心追逐的目标。自那天起，发展独立自主的工业便成为了政府的首要目标。得益于政府长期贯彻执行的发展目标与决心，早樱本土的新兴工业如雨后春笋般出现，上到军队列装的坚船利炮，下到寻常百姓家的农具与留声机，通过不断的吸纳外资与求学，曾经落后的农业玛娜国正一点点的蜕变成追上世界步伐的工业国家，但这一切也并非没有代价。\n\n堪称野蛮的快速工业化带来的不单单是贫富加剧与环境污染等问题，工业大量倾斜于南方使得早樱一直以来的南北矛盾逐步升温，南方实现了一个又一个的“现代化奇迹”，部分藩阀的首府更是能媲美列强的城市，而北方则走向无可挽回的衰退之中。然而即使调用了如此大量的资源投入，黑沫夜的到来依然轻而易举的打断了早樱工业那迅速但孱弱的发展势头......\n\n就这样，在日益激烈的争吵声中，早樱的实业跌跌撞撞的走到了现在，各大企业在破产与兼并中逐渐形成了成规模的财阀集团，一边彼此厮杀，却又一边彼此舔舐伤口。当早樱的经济从尖叫中趋于稳定，复兴的曙光或也不远，作为国家雄图的中流砥柱，冷漠无情的工业机器将再度焕发活力。"
 SKR.5.a: "或许有朝一日，早樱制造也能引领世界潮流"
 SKR.6.t: "神皇驾崩"
 SKR.6.desc: "虽然早在这之前信长就做过心理准备，可当真的发生的时候信长还是感到一阵排山倒海般的压力。信长讨厌“变化”，准确的说是讨厌不在她掌控之中的“变化”，而在早樱，如果说还有什么是连她这位征夷大将军都无法控制的，那也有且只有神皇换位的选举。然而在考虑之后的麻烦前，就在眼下信长还有一件棘手事得处理。\n\n“诸位这样放肆，是否有些不把信长大人放在眼里了？”刀锷撞击刀鞘的清脆声有效的制止了群臣的争吵，信长侧首用眼神表达了对替自己出头的冲田总司的感谢。“事实上这种事情本就无需过多讨论，历来怎么办，今日之事就该怎么办。”刚刚一直未曾开口的庆喜趁着声音减弱，趁势接管了发言权，而在她的身后，西装革履的资深官僚们也纷纷点头以视支持。\n\n“你的意思是在这种时候还要浪费这么多的开支在仪式上面，现在是做这些的时候吗，神皇大人在上看的了会怎么想？”而与庆喜之针锋相对的则是坐在信长近侧的近藤勇，把尸骨未寒的神皇拿来当挡箭牌惹得台下一阵发笑。信长清楚，对她麾下的改革急先锋们而言，循规蹈矩某种意义上也等同于失败。当然...在这朝堂之中也有一批与年轻人截然相反的存在。\n\n信长的视线毫不退让的撇向那愈发冰冷的一角，在灯光的阴影之中，一群穿着奢华古朴的老人正端坐在距离信长最远的一侧，他们并未开口发言，但他们的诉求不言自明。这些故步自封的庸人手里掌握着不少资源，信长也不打算对此视而不见。\n\n沉思片刻后，信长最终将视线落在了一面的群臣上，开口说道："
 SKR.6.a: "此事兹关重大，需倾举国之力，极尽哀荣"
 SKR.6.b: "按常规仪式举行，但一切从简，不许铺张"
 SKR.6.c: "意思意思得了，还有更麻烦的事情要解决..."
 SKR.7.t: "舞台开幕"
 SKR.7.desc: "“三秋大人，刚刚离开的那位真的是织田大将军吗？穿着一身大黑袍，好奇怪...好痛！”听到来者的声音，新上任的礼乐奉行所负责人白崎三雪维持着的正坐顷刻间垮了下来，就在好不容易送走了那位麻烦的客人后，紧跟着所内爱八卦的巫女就闻着味来了，想喝口茶好好放松下的念头就这样被无声的掐灭了。用不轻不重的一记手刀告诉了自己的妹妹此刻正心烦意乱，不过这样恐怕也没法打消她的好奇心吧。\n\n“那位大人脾气听说可臭了，而且作风也很强硬，恐怕新神皇和她共事要遭罪了。啊不过说不定能能分一些KiraKira DokiDoki给她，好好治一治织田...啊好痛！”捂着脑袋嗯哼哼一脸委屈的坐到一旁，一脸不快的美雪看着今天打了自己第二次的姐姐。\n\n“别议论大人物，还有别那么快下定论。”收回手的三秋转头看向了面前整理好的候选人文件，放在第一位的正是那位想要让世界变得更加KiraKira DokiDoki的户山香澄。她的出现可以说出乎了所有人的预料，白手起家的新派偶像能在商品化发达的南方掀起如此热潮不可谓不是奇迹，随着户山香澄的声望愈发拔高——就连其他的南方藩藩主都愿意予以全力支持，她被南方一块推上候选人宝座已是板上钉钉的事，或许她真的能影响到那冷冰冰的幕府也说不定...\n\n“不过...这次选举北方也并不逊色呢，沼津藩、音乃藩的藩主都是北方的选举有力竞争者，当然还有穗乃果大人...诶嘿...诶嘿嘿...”精准无误的抽出了那张画有高坂穗乃果画像的名单，是的，要说自己这位奉行所负责人有什么心仪的对象，那无疑只有高坂穗乃果莫属，在她的身上，三雪看到了其他偶像都没有的纯粹感，那种如太阳般耀眼的表演，任何人只要见过都一定会心甘情愿的支持着穗乃果，也包括她本人。\n\n“啊啊...超～一本正经的姐姐大人又开始犯花痴了呢，真是....啊好痛！姐姐！”默默的撤回了第三记手刀的三雪将穗乃果的名单放到了最上层，用着一本正经的口吻开口说道："
 SKR.7.a: "准备开始工作吧千雪，之后可有的忙活了”"
 SKR.8.t: "情理之外，意料之中"
 SKR.8.desc: "“高坂穗乃果？北方最终的候选人是她么...”正在聆听工作汇报的信长被电报发来的急讯打断，而在浏览完发来的消息后，织田信长的浮现出了几分意外的神情——北方推举的候选人代表是那位“街道偶像”高坂穗乃果。信长也并非是对于这位无害偶像身份的诧异，而是惊讶于北方统合的效率。与南方可谓在经济遥遥领先的坂东藩相比，北方藩域在经济上差距并不明显，几个藩之间的竞争也相对激烈，更何况早在几年前，穗乃果所在的音乃藩和沼津藩之间围绕“御前试合”展开的激烈竞争还历历在目。虽然有小道消息说，两藩现任的藩主之间与穗乃果的关系都不错，但就目前了解到的情报看来，信长本以为会更早收到南方来的消息。\n\n“嗯...是个很阳光的孩子呢，想要用歌声守护大家的笑容，真是美好的理想啊。”“同感同感，比死气沉沉的先皇果然还是活力满满的女孩子更让人愉悦呢。”“啊哈哈，先皇已经死了啦...”新选组的几人也饶有兴致的讨论起来，她们也并不反感穗乃果这样一位开朗的候选人，信长本人也是如此。无论从哪个方面来看，穗乃果都是一位无明显缺点的候选人，最重要的是，她的“野心”天真的令人可爱，如果是信长来做决定，恐怕也会推选这位无害神像来代表北方的利益。\n\n“也不坏，最起码不是个麻烦的家伙。”将信做好分类工作后，信长为这意料之外但又情理之中的结果做了最后定论，继续示意着新选组的下属进行工作汇报。但此时信长的心里也不免种下了一颗疙瘩，这样天真烂漫的孩子也终究成为了政治的牺牲品吗？信长晃了晃脑袋，结束了这无必要的怜悯。"
 SKR.8.a: "希望她有承担一国之君身份的觉悟"
 SKR.9.t: "不出意料"
 SKR.9.desc: "与穗乃果成为北方公推人选带来的惊讶不同，南方选择户山香澄可以说是早已板上钉钉的事。经济上独占鳌头的坂东藩都屈服于新潮流，甚至连一向不问世事的佐嘉也选择支持，岛田藩与鹿儿藩也无理由继续固执己见。看着人选都已尘埃落定，信长也松了口气，单从候选人的情况来看，今年的神皇选举看样子可以平安度过了。\n\n颇为有趣的是，这二人之间虽然路线大相径庭，但最终呈现的表现形式却分外相似，都是通过更加亲民的街头表演和活泼开朗的形象来赢得平民的好感，而这估计也无外乎是因为黑沫夜导致的传统地方藩势力衰弱，才让黑马夺魁。恐怕今后的神皇选举也没法像这次那样有趣了，信长默默在心里想到。"
 SKR.9.a: "让我们看看这“乐队偶像”究竟有几斤几两。"
 SKR.10.t: "古道、鲜花与刺刀"
 SKR.10.desc: "从南到北，从平民百姓到贵族，全早樱的注意力前所未有的集中在了一起。报社每天都用最显眼的头版头条报道着巡游进程，现场观演的票更是被炒到了天价，在这动荡而萧条的年代，这场传统的仪式无疑是振奋国家精神的绝佳契机 。\n\n户山香澄，南方年轻群体心灵的救星，汲取合众国文化而引领的乐队风潮早已形成燎原之势，热情的讴歌爱与希望令身处黑沫夜阴影中的彷徨者看到了前进的方向。\n\n高坂穗乃果，照亮北方的和煦暖阳，她并无过人之长处，却完美的恰到好处，更重要的是，她令每个人都感觉到，这位热情洋溢的少女是他们的神皇，而非一个高高在上的虚无符号。\n\n黑沫夜的阴霾依旧未曾散去，庞大的开支无疑为早樱的经济再添负担，不满的声音并未随着偶像一场场演出的歌声而消散，但幕府也早已做好了准备，巡演能否顺利进行也关乎到幕府的威信，或许这个国家的矛盾多如牛毛，问题数不胜数，但现在争议都被统统搁置，万众都在期待着决定早樱未来数十年的精神领袖花落谁家。"
 SKR.10.a: "美少女，拯救早樱！"
 SKR.11.t: "异世界的门扉"
 SKR.11.desc: "“终于走到这里了呢，香澄！”“嗯，感觉心脏都要抑制不住的跳出来呢。”围绕着神皇选举产生的风暴已经席卷了早樱许久，可那身处于风暴中心的二人却是无比的祥和，从踏上巡游之路开始后，二人用一次次的音乐早已完成了情感上的沟通，透过彼此的音乐，双方的心意都已了然，在这最盛大的舞台上，没有什么必须要竞争过的对象，有的只有会为对方获得胜利而由衷庆贺的挚友。\n\n当然，无论是谁都不打算把胜利轻易的交给对面。\n\n“二位，准备好了吗？”自绚烂的七彩之中，名为莲华的黑发少女款款走出，面色平静的扫视了两位候选人后，用着不带感情的声音开口问道。\n\n“慢着，还没。”“请再等等。”左右两侧的候选人异口同声的让这既定的顺序发生了千百年未有的小插曲。穗乃果与香澄彼此看了对方一眼，在摄像机与身后的誓约人的注视下，二人郑重的交换了彼此手中最重视的东西——麦克风。从各自的家乡出发，手中那有些破旧的麦克风见证了各自的汗水与喜悦，而如今，她们不约而同的选择将这份寄托着深厚感情的武器交给对方。或许之后会有数不尽的人去猜测这一举动的含义，但在两位的心底里，答案却无比简单——这只是一段友谊的见证。\n\n“那么，请随我进入大结界。”在见证完这史诗性的一刻后，莲华那始终毫无起伏的嘴角似是淡淡的扬起一丝微笑，却又旋即消失的无影无踪。“让我们好好享受这场演出吧，穗乃果酱！”“嗯，为了早樱的未来，决一胜负吧。”最后的相视一笑后，二人一同向前迈步，同身上所肩负着的一切一起。"
 SKR.11.a: "歌唱吧，舞动吧，为了更美好的明天！"
 SKR.12.t: "神皇归位"
 SKR.12.desc: "高坂穗乃果已经做到了最好，她在这一生恐怕只有一次的舞台上，将自己的决心和真意贯彻到底，无论胜负，她都应该心满意足才对。可看到实时呈现的票数一上一下的攀升，穗乃果仍旧不免紧张到发抖，她比谁都清楚自己，赢家只有一位，而穗乃果不甘心距一步之遥时功亏一篑。最后，她干脆闭上了双眼，不去看那闹心的计分榜，以及那旁边早已视为挚友的户山香澄，她怕自己在心态上就输了这位友人一城。\n\n短暂而漫长的沉默，当最后一张票落时，台下的观众爆发出穗乃果有史以来听到过最为震撼的欢呼声，巨大的音量排山倒海而来，以至于让穗乃果一时之间无法分辨，她们喊的究竟是谁的名字。\n\n“太好了！恭喜你穗乃果！”户山香澄紧紧的抱住了自己，与她柔软的身体不同，手臂用的力道险些让穗乃果喘不过气当她睁开眼时，那拿到了五十张过半数选票的人的名字引入眼帘。\n\n喜悦？感动？还是迷惘？看到自己成为神皇的刹那，穗乃果的心反而平静了下来。想要回应同样深情的拥抱，可最后却只是轻轻的在香澄那因细不可察的啜泣而微微颤抖的背部上轻轻的拍了拍。舞台是如此的残酷，赢家也只有一位。\n\n“不要忘记我。”“不会忘记你的，绝对不会。”穗乃果的目光空洞的眺望着台下，南北的分野如此明显，一侧顶礼膜拜，另一侧则恼羞成怒。第一次，穗乃果为这习以为常的矛盾感到发自内心的憎恶。香澄终于松开了拥抱着的手，尽管眼角依旧带泪，但那闪闪发亮的笑容依然炫目的令穗乃果睁不开眼，下一次再见到香澄的笑容，又是要到什么时候呢？“不要忘记了哦...我们共同的理想，如果是穗乃果的话，一定一定能够做到。”香澄主动的牵起一旁穗乃果的手，穗乃果也迎合着，二人十指交错，并排站起，而这一次，也可能是最后一次接触，不参杂任何除了友情之外的感情。"
 SKR.12.a: "我们终会在洒满阳光的世界下相见"
 SKR.13.t: ""
 SKR.13.desc: ""
 SKR.13.a: ""
 SKR.14.t: "北海之乱"
 SKR.14.desc: "“北海急电！”“北海急电！”今日幕府的电报机乱作一团，一系列北海镇守府驻军点遭到袭击，甚至已经有大面积的据点沦陷，乌塔利人这一次的叛乱规模之大与准备程度超乎了所有人的预料，毫无疑问，这帮原住民早已在幕府看不到的角落里蓄谋已久，甚至可能早已与北方贪婪的巨熊有所联系。\n\n“此事已无需讨论，不存在妥协与和平，我以通知了新选组即刻准备军队，发兵增援北海。”召集各派系的官僚来到议事厅，信长只是留下一句不客气的通告便拂袖走人。她能感受到身后那些反对者的不信任与愤怒，想必此刻他们正在谋划着将这次北海叛乱的责任一股脑的推到自己身上——那就让他们尽管来吧。信长不打算当缩头乌龟，如今神皇刚刚继位，全社会正都注视着幕府的一举一动，任何软弱都会被视作对复兴之路上的背叛，但换言之，倘若处理得当，这也无疑是一个提振幕府威信的好办法。\n\n冲田，近藤，土方。此次叛乱非同小可，乌塔利人的实力并不容小觑，幕府内部的压力无需担心，你们只负责专心平叛即可，。“是！”“是！”“是！”\n\n三人坚决的回应令信长紧绷的神经舒缓了些，也让她想起新选组里尚有人未进行行动安排。那位凶戾的芹泽鸭无论信长有多么讨厌，但她的军事才能不容置疑。只是在考虑了几秒后，信长果断的将复启芹泽鸭的想法否决了，如今大难当前必须团结一心，害群之马在这时候还是老老实实的关在马厩里。“这次战争事关国家存续，祝诸君武运昌隆。”"
 SKR.14.a: "北海浴血"
 SKR.15.t: "御驾亲征"
 SKR.15.desc: "北海的叛乱已然超乎了所有人的预料，织田信长和她的幕僚最坏的打算，也不过是将将维持个把月，便能用强大的军事力量和后勤保障完成这场盛大的“军事游行”。可结果呢？信长引以为豪的军队限于北方的泥沼与风雪之中，那些北方的游猎者出其不意的袭击一点点的消耗着士兵的士气与精神。\n\n这场战争本是一场立威之战，如今反倒暴露出自身的脆弱和无能，谣言和讥讽已然四起，如果信长不想把自己脸面全都搭进去，现在已经到不得不亲自出手的时候了。不能再拖了——将糟糕至极的电报一把扔进垃圾桶，信长拨通了军部的电话号码，她必须要赶在一切无可挽回之前，尽可能的弥补这场战争的影响。"
 SKR.15.a: "一场永生难忘的耻辱"
 SKR.16.t: "北海平定"
 SKR.16.desc: "战争的结果并不出乎信长的预料，乌塔利的叛乱如过去一样，缺少力量的土著民无论声势怎样浩大，依然不可能与早樱的精锐相抗衡。看着这迟来的喜报，信长紧绷的神情也久违的放松下来，尽管战后重建和剿灭残党依然是一件麻烦事，但这次胜利无疑会大大提振国内消沉的情绪。在北境取得胜利的消息已经令人传递给各个报社，信长已经打定主意要利用这场胜利好好为自己造势。\n\n信长摊开了面前的一张略有些陈旧的地图，这是数年前制定好的一项重要工程，整体采用欧罗巴式的先进设计让这名为六棱郭的军事要塞从一开始就被改革派寄予厚望，在落成之后，早樱的军事辐射范围得以大大扩展，不仅屡次在乌塔利人叛乱中起到重要作用，也同样成为给环伺的邻国的警示——早樱没有他们想象的那么软弱可欺。\n\n信长的指尖摩挲着已经不再是构想的六棱郭，上面密密麻麻的做满了当时的记录，不仅是自己的，还有总司的。“那个孩子也辛苦了呢，这些年来她的成长可真超乎我的想象。”想到一开始那心智单纯的孩子如今也已能称得上是出将入相，信长也不免感到一阵欣慰，这些年的总司与新选组，还有那些卫戍边疆的忠心将士的辛苦她也都看在眼里，趁此机会，让她们好好的放松下也不错？当然还有自己也是。\n\n将地图重新收进文件夹里，信长翻开了一旁的备忘录，在后续的日程安排里，又勾勾画画上了几笔，完成了对后续出行的小小调整。然似乎依然有些不满足，看着纸张上有些扎眼都空白，信长思索片刻后，最后再补上了一句："
 SKR.16.a: "“将凯旋的喜悦，分享给最爱的人们”"
 SKR.17.t: "视察六棱郭"
 SKR.17.desc: "作为节制北方的重要军事要塞，六棱郭代表着早樱军事工程建设的最高成就，正是因为它的存在才能让乌塔利人的叛乱寸步难行，几经战乱，六棱郭依然矗立在北方防线上，成为藩卫早樱的重要屏障。\n\n而随着乌塔利的叛乱再一次倒在这坚城壁垒之下，这座功勋卓著的堡垒久违的迎来了贵客——在冲田总司、近藤勇等新选组核心成员的簇拥下，长期坐镇中央的织田信长不远万里抵达了遥远的北境，亲自来此地参观，慰劳了长期戍守北方的将士，并亲自写下了为全体参与平定北境叛乱官兵提高待遇的手谕。\n\n“事实上，正是因为有你们的无私奉献，早樱的国土才能完整，试图分裂国家的叛徒才一次次的被挫败，六棱郭和它身后千千万早樱子民感谢你们的牺牲与奉献...”简短而有力的演讲在士官之中得到了相当热烈的反响，对这位只能在广播和电视里了解到的实际最高领导人，大多数基层士兵都只是抱着朦胧感情和责任并存的尊敬，可当亲自得以与这位铁腕政治家接触时，他们才发现这位幕府将军也是能说会笑的，与他们别无二致的普通人，他们的流血与牺牲不是成为冷冰冰的幕府机关的统计数字，一个同他们一样，满怀爱国之情为国家奉献的领袖，毫无保留的与他们站在了一起。"
 SKR.17.a: "织田将军，我们敬爱你呀！"
 SKR.18.t: "拨动命运之轮"
 SKR.18.desc: "“织田大将军，您对这次北方平叛的巨大成功有什么感想吗？六棱郭的修建成功是否有助于北方局势的稳定？”“织田大将军您认为乌塔利同盟的叛乱是否与经济下行的现状有关？“织田大将军请看这里！”......\n\n媒体此起彼伏的提问声将信长的耳朵填的满满当当，她有些后悔过分的张扬这次的军事行动，但此举却也实属无奈。黑沫夜造成的重创令她焦头烂额，低迷的经济现状连带着整个幕府的威信都一降再降，这次乌塔利人的叛乱实在是想睡觉来枕头，信长现在不愿意放过任何能提升公众形象的机会，甚至为了彰显自信，这次她甚至独身前行，连基本的安保都没配备。\n\n“亲爱的国民与外宾们，今天是早樱历史上荣耀的一天，我们粉碎了乌塔利同盟残暴而毫无理由的叛乱，为所有代表我们作战的人，我为此献上真挚的祈祷。而对于乌塔利叛匪和其他心怀不轨的人，你们完蛋了。”将提前精心准备好的发言向着台下的观众与媒体掷出，不出意外的迎来相当热情的回应，没人能拒绝排山倒海般的歌功颂德，就连信长也不例外。向着眼前热情的拥趸挥舞着手臂，任由摄像机记录下自己耀眼的时刻，一瞬间，信长似乎觉得早樱黯淡的未来真的会以此为契机，走向正轨，而她也能在大业功成后功成身退，成为历史上浓墨重彩的一笔。\n\n这片刻的恍神令这位久经沙场的老将忽视了台下的那异样的躁动，也忽视了那藏在摄像机镜头下那独属于枪支瞄准镜的反光，而当枪声响起的刹那，一切都为时已晚。恐惧的尖叫声、愤怒的咆哮与其他情绪的嘈杂淹没了信长，霰弹击穿身体令大脑不得不屏蔽感官，以免承受这非人的剧痛。当信长明白到底发生什么了的时候，她已经倒在了演讲台上，炫目阳光刺的眼睛生痛，意识模糊的伸出手想要握住这份耀眼的光芒，但最后留在指缝里的只有北海冰冷的空气。"
 SKR.18.a: "一颗子弹，足以让任何政治巨擘哑然失声"
 SKR_jinkangojuunen_t: "§t人間五十年§!\n§t下天の内をくらぶれば§!\n§t夢幻の如くなり§!\n§t......§!"
 SKR.19.t: "夜半惊岚"
 SKR.19.desc: "信长的突然离世出乎了所有人的预料，无人能想象这位引领早樱前行多年的巨人会在一夜之间离去。她生前留下的是依靠个人威望而团结在一起的政府，而这表面的团结已随着信长的去世彻底不复存在。\n\n在信长的葬礼上，由其妹织田庆喜作为幕府的代表为她既是政敌又是友人，更是无可替代的亲人的姐姐献上悼词。下葬当日乌云密布，这本该是送最高领袖最后一程的庄严时刻，氛围却压抑异常。就在庆喜发言时，她麾下的官僚正按照早已制定好的应急方略逐步控制了幕府的大小机关，作为幕府影响力仅次于信长的二号人物，她是毋庸置疑的继任者人选。\n\n坐在演讲台第一排的，是近藤勇为首的新选组核心成员。这些被信长一手提拔到核心地位的武人脸上遍布麻木，在这时候她们的命运该何去何从？兵营正在逐渐躁动，亲卫迫切的想要领袖给予一个能够接受的答案，而新选组的逍遥系更是早已磨刀霍霍，他们期待许久的大争之世终于到来了。\n\n革新派因信长的离去遭到重创，年纪轻轻的木下日和子成为了紧张不安的革新派成员最后的支柱。但与老成务实的庆喜相比，革新派恐怕难以再有大的作为，不少成员甚至早在葬礼当日便坐到了中间派的席位之中去，信长的遗产正逐步被接纳一空。\n\n最后，那些团聚在最后一排的保守派则窃窃私语着，但如今也无人有心去制止这些地方勋贵代表的密谋，信长的死亡是早樱的不幸，但却是这些被排挤的边缘人的大幸。蜘蛛网般的人际网络正串联起所有的反对派，试图彻底终结一切祸国殃民的西方傀儡，使早樱再沐琼琼之荣光。\n\n暴风雨自世界大战之后，再度莅临这片大洋咽喉之国，尘封已久的棋盘终于被再度端上，野心家和既得利益者攥紧了手中的棋子，为了各自的雄心与早樱的利益而虎视眈眈的盯着其他所有妨碍者。无论结果如何，早樱的命运都将永远的改变。"
 SKR.19.a: "人间五十年，与天地长久相较，如梦亦似幻"
 SKR.20.t: "诸侯云集"
 SKR.20.desc: "环顾着会堂前议论纷纷的众人，意气风发的少女难以抑制嘴角上扬的笑意，在这么些年的忍耐后，一桥庆喜终于等到了这一天。从小到大被那位长姊压一头的心结至此彻底解开，尽管庆喜发自内心的为信长的死而感到遗憾，但她却不打算在这种悲伤之中过多驻足，如今通往早樱权利最高峰的大门已然敞开，真正要书写早樱未来历史的人，不是织田信长，而是她一桥庆喜。 “肃静。”声音不大，但足以让台下的每个人都听得见幕府将军的命令。归于安静的人群之中，有人面露不满，有人则心神不定，他们并不发自内心的认可自己的执政，对于这点，庆喜也早已有心理准备。\n\n“对于织田将军的离世，我们每个人都对此感到惋惜，但木已成舟，逝去的生命无法挽回，我们只能向前看。织田将军为我们留下了宝贵的遗产，她让我们积贫积弱的祖国发展到如今能与列强持衡的水准，不似赛莲斯之流丧权辱国...”一桥庆喜顿了顿，台下的视线此时此刻已尽数汇聚于她的身上，心怀叵测和效忠者都在等待着她的答案。捋平了那欲扬起的嘴角，缓缓开口给出了自己那份属于新时代的答案： “织田将军的功绩不应被否定，但她的独裁却也令早樱的社会与政治日趋压抑。织田将军的伟大改革将继续下去，但这一成果将不再是属于一个高高在上独裁者，而是每个愿意为早樱奉献心力的人。以吾辈之名起誓，早樱的民主化改革将不再是泡影。以及那些冥顽不固者，拥兵自重者，食亲财黑者，你们的好日子到头了。”"
 SKR.20.a: "以令相责，树阀阅之家。\n以证相争，清朝野之妒"
 SKR.21.t: "南方藩国的意见"
 SKR.21.desc: "“这就是坂东的选择吗？”手中的折扇“啪”的一声合上，庆喜抬头看向了端坐在格帘后面的红挑染，这位同自己一样出身旧时代的名门作为外交使节的意图，庆喜的心里相当清楚。只是无论是措辞还是坂东藩提出的意见，庆喜体会不到任何对她这位幕府将军的尊重。\n\n“鹿儿藩的意见与坂东一致，幕府作为代行机构存在时间已然够久了”“岛田藩同样不赞成幕府的存续，大政应该归于神皇”似乎是为了配合美竹兰的攻势，亲自到来的两藩实权领袖先后给出了明确的答复，南方三藩大势已定。但看着眼前这看似一边倒的局势，庆喜倒也并太慌张。\n\n南方三藩的观点在预料之中，在庆喜的谋划里，这三刺头本就是之后要重点打压的对象，可三人这样强硬的态度还是令庆喜不由得担忧起那“遗世独立”的佐嘉是否也会受到影响，如果那位二阶堂咲依然恪守他们的准则，那庆喜还有很多可操作的空间，但反过来说...如果她真的被这些地头蛇死死咬住，那也得为自己找到一条体面的退路了。"
 SKR.21.a: "“那么，佐嘉的意见是？”"
 SKR.22.t: "佐嘉藩、弃权"
 SKR.22.desc: "“真是无聊，你们那政治过家家还请不要把佐嘉拉进去，就这样了。”当能明确感到三人的目光聚集在自己身上时，佐嘉藩的藩主二阶堂咲长长的叹了口气，毫不客气的砸出了她早就想说的答案。\n\n“无论早樱如何像车轱辘一前一后还是左右摇摆，佐嘉的态度永远只有一个，别想着让佐嘉为你们的野心送死。要是敢来，那就等着吃枪子吧。”感受着周遭那异样的目光，在这端坐到腿都麻了的二阶堂咲终于久违的放纵了下，站起身抻了抻胳膊，颇为得意的扫视了下其他大名的反应—— 南方领头羊坂东的代表，那被冠以叛逆红挑染之名的美竹兰一副失望的样子，而身旁的涩谷祈则显得更甚，不知道之前她们对自己抱有什么期待呢？嘛，这些也都无所谓了。在最后，二阶堂咲将视线落在了那出身军旅的西乡利通身上，如果说这里有谁能让自己都忌惮三分，恐怕也只有他一人了。 “希望，这是对佐嘉未来有益的选择。”“佐嘉的未来轮不到你个外人指手画脚。”毫不客气的反怼回西乡利通，二阶堂咲也不愿再在这令人烦躁的会堂多待，转身大大方方的走出了这压抑的空间。\n\n咲当然不怕自己的态度会得罪谁，毕竟那帘子后面投来的满意刺的自己脊背生痒，虽然很不想承认，但佐嘉确实和那位新幕府将军达成了心照不宣的“同盟”，缺了自己的一票，南方难以持衡北方，幕府维持的可能也就大大提升。\n\n不过，这也只是理想情况了，那坐在高台之上的新将军恐怕还没发现，她的统治已经摇摇欲坠了，之前演讲的威严慷慨二阶堂咲很喜欢，但声音大可当不了饭吃，现在的将军既缺乏地方的支持，就连那些新选组也不曾表露出支持，没有军事力量的支持，恐怕倒台已然不远，当然，这一切也都跟自己和佐嘉无关了。"
 SKR.22.a: "“暴风雨要来了啊，得叫小的们把刀枪摩的亮堂些才行”"
 SKR.23.t: "趁火打劫"
 SKR.23.desc: "“你们是在开玩笑吗？这就是你们对幕府这么多年支持的回报！”庆喜手中的扇子重重的拍在了榻榻米上，发出了清脆的声响。在佐嘉的二阶堂咲表达完意见之后，庆喜愈发笃定自己能够继续执掌朝政，北方的藩阀多受信长恩庇，支持幕府的存续对他们并无坏处，就算有心存疑虑者，通过利益交换庆喜也自信能说服他们。\n\n可为什么会这样？西木野真姬、上原步梦、黑泽黛雅，还有那个叫唐可可的赛莲斯人！她们凭什么全部反对自己！\n\n“看样子大局已定了呢，一桥大人。”上原步梦语气冷冷的说道。此刻，任谁都能看出那先前在就职大典上高谈阔论的中间派领袖的倒台已是板上钉钉，自也无人再会对其抱有敬意。“眼下退位让贤也不失为明智之举，在郊外修一栋别墅养老也不错？”唐可可掩嘴轻轻笑道，这一幕的结果并不出乎她的预料。\n\n在短暂的慌乱之后，庆喜还是迅速冷静了下来。她虽然没法赢了，但她还远远未到投子认负的时刻，背靠着庞大的关系网，自己的影响力依然存在。而既然幕府注定要倒塌，那她也要给未来的自己谋得退路...甚至是更上一层楼的机会。"
 SKR.23.a: "难道我也要落得那墙倒众人推的地步？"
 SKR.24.t: "神皇圣断"
 SKR.24.desc: "“神皇陛下，以上便是近些日所发生的一切，幕府的结束恐怕已是板上钉钉，很快...您就能迎来亲政的时代了。”对于庆喜的话，穗乃果并不太能理解，在深宫之中明明没过去多久，为何外围会发生如此巨大的变化？穗乃果冷汗直流，还在感叹自己人生转变之快的时候，怎么马上就有下一班车载着自己去更加波澜壮阔的未来了？糟糕糟糕糟糕...再这样下去的话会出事的！思来想去，穗乃果最后还是采取了先前真姬所教导她的办法——保持沉默。\n\n“做出决定恐怕对陛下而言是一件困难的事，毕竟陛下方才荣登大宝，略感无措也是人之常情。臣也早已做好交权的准备，会有足够的时间让您真切的理解领袖的责任，而不是只在舞台上唱歌。”不过看样子“万能解题法”似乎没能奏效，此时的穗乃果也不得不接受自己即将要做出可能是人生中又一重要的抉择，是继续维持着先前定下的目标，为早樱的每一个人带去灿烂的笑容，还是说...选择一条更加直接的道路？她真的能做好吗？\n\n“不过...如果神皇陛下尚未有承担责任的觉悟，您也大可否决地方诸藩的建议，作为神皇本人的您拒绝接受奉还，也足以堵住其他人的嘴。”说完，帘子对面的庆喜似乎是笑了几声，声音里夹杂着几分苦涩，哪怕再怎么神经大条，穗乃果也能听得出来，庆喜并不对这种结果抱希望。\n\n“那么，容臣先行告退。”说罢，庆喜站起了身便向外走去，新幕府将军与新神皇的首次见面就这么草草结束...了吗？穗乃果攥紧了裙边，尽管这搞不清楚那也搞不清楚，但眼下，就在自己的跟前，不就有在等待着自己回应的人吗？嗯！鼓起勇气，就像在舞台上面对粉丝那样。\n\n“那个！庆喜酱...”一把拉开了那隔开二人的帘子，端坐许久快被压麻的腿终于能好好站起来活动了，一下子打破“传统”让穗乃果都有些被自己吓到了，可庆喜那边的表情则要更加震惊，攥着的扇子都掉在了地上，挂着黑眼圈的幕府将军目瞪口呆的看着这突然闯入自己视野里的神皇。\n\n站稳脚步，然后气势要足！自己给自己在心里鼓了鼓劲的穗乃果，大踏步的来到了庆喜的跟前，现在的她不是神皇，而是高坂穗乃果。“那个啊...虽然治国啊什么的我是不太懂啦，但是啊，我想我应该也是有能够做到的事情，所以...就是那个...庆喜酱！我想告诉你的是..."
 SKR.24.a: "“我作为神皇的权力是无限的！”"
 SKR.24.b: "“我不会辜负你的期待的！”"
 SKR.24.c: "“我们可以一起让早樱变得更好！”"
 SKR.24.d: "“就算不是大将军了，我们也可以当朋友啊！”"
 SKR.25.t: "壬生狼的密谋（其一）"
 SKR.25.desc: "自从庆喜将军庆喜继任摄政之位后，军队内部——尤其是新选组内部对于庆喜的不满便与日俱增。在整个幕府的政治架构里，这只由信长提拔的精锐部队的独特和独立性无人出其右，可以说他们的权威完全来自于信长本人的支持以及与部分军队的亲密纽带关系。而如今信长去世，出身官僚贵胄之中的庆喜对于这样一只不受控制的武装力量颇为忌惮，尽管表面与芹泽鸭等人维持着合作关系，但二帮人之间关系不和早已是不争的事实。 事实上，庆喜并不打算迫害这些功勋卓著的老将，如今朝野不稳，她更需要这些政治与军事力量的支持，对于新选组的不满大多来自于她麾下的官僚集团，而庆喜也只能在两帮人之间小心翼翼的维持着平衡，不至彻底激怒另一方。但同时，庆喜也已经在暗中着手一点点的削弱新选组在军队的根基，将卫戍京城的关键逐步由自己的亲信接管。 这在新选组看来无疑是极其不妙的信号，如今国体大事议论在即，对于铁杆幕府支持者做出如此“背信弃义”之事其目的不言自明。为了之后数十年的俸禄乃至人生，激进言论逐渐取代理智之声，但此刻的幕府已然没有心力多浪费在这些阴谋之上了。"
 SKR.25.a: "“盯紧点她们，谁知道这些家伙能感触什么出格的事情！”"
 SKR.26.t: "“闹剧收场”"
 SKR.26.desc: "在中间派与尊王派的口水仗下，手里拿着武士刀的第三方于阴影之中杀出。谋划许久的新选组于今日终于发动了推翻庆喜幕府政权的政变。以近藤勇为首的新选组干部通过在军队之中的深厚人脉关系，笼络到了大批对未来惶惶不安的军人的支持，在庆喜做出反应之间便牢牢的控制住了京城，迅速剿灭了剩下不愿投降的禁军后，新选组领袖冲田总司宣布庆喜背叛了织田将军的意愿，将国家交给到了反动庸人与卖国贼手中，辅政失格的庆喜已被解除职务，而他们将誓死捍卫信长改革的遗产。\n\n确认中央已无人有能力抵抗后，新选组便急不可耐的对那些曾经公开反对和批判他们的官僚和军官进行了清洗。短短数日之内，旧日的早樱便已不复存在，崭新的军政府在幕府政体的尸骸上建立起来。\n\n但这远远谈不上结束，新选组虽然控制了首都与近畿地区，但在这之外的诸藩不会坐视自己的利益拱手相让，毫无疑问，野心家们也已经开始集结军队，准备同新选组在战场上见分晓。而新选组内部却也远谈不上团结，近藤勇与芹泽鸭的合作摇摇欲坠，军事出身的武人缺少治国理政的才能，如今的他们像是无头苍蝇一样不知道要把国家带往何方。而被实权者推上舞台的冲田总司作为少有的“中间人”她也已无路可退，要么钉在历史的耻辱柱上被万人唾骂，要么就带着新选组，真的为早樱开创一个伟大的未来。"
 SKR.26.a: "不是结束的开始，而是开始的结束"
 SKR.27.t: "一切照常"
 SKR.27.desc: ""
 SKR.27.a: ""
 SKR.28.t: "朝见天子"
 SKR.28.desc: "“这应该是我们初次见面吧...那个，请多指教！”穗乃果的身体有点僵硬，毕竟昨晚可以说是一宿没睡好，什么叫发生了政变？什么叫庆喜酱被关起来了？什么叫现在是新选组当政了？这些天发生的事比先前国体辩论时还要超出了穗乃果的预想。\n\n不过今非昔比，穗乃果也不是那会对着权力瑟瑟发抖的人了，在跟庆喜深入交流后，这些看着强大不已的幕府将军也都有属于自己的心事，眼前的少女肯定也不例外。 “啊...是！请多指教！”冲田总司匆匆的行了一礼，眼下的一幕也是在她的状况外。为什么一贯都躲在门帘后面的神皇会这么堂而皇之的坐在自己跟前？这突兀的一幕打乱了准备好的步调，二人这么大眼瞪小眼，气氛陷入了微妙的沉默。\n\n“那个，总司桑...今天是有什么事呢？”最后，还是由穗乃果先打破了这微妙尴尬的对峙，紧跟着回过神来的总司这才想起自己是来办正事的，装作老成模样的清了清嗓子，按照近藤勇准备好的草稿开口说道。“啊，是的！今天前来是想向请神皇大人正式下达任命总司桑...啊不是，是本人担任幕府将军一职的诏书。” “啊，哦这样子啊，那个稍等一下下...纸和笔放哪里去了呢...哦在这在这。”在身后的柜子里一通翻找后，穗乃果将卷纸和笔墨依次排开，下笔准备起草自己担任神皇到现在的第一卷诏书——所以正式的诏书到底要怎么写来着？ “玆国事...唔...是要这么写吗？学校里没教过啦...”看着眼前白花花的纸，穗乃果仿佛看到了一张零分试卷正在眼前飘过。 “那个，抬头应该是告全体国民...”有些看不下去神皇这么为难的样子，冲田总司小声的开口提醒道。“哦哦，这样子的吗！谢谢啦总司桑～”“啊不...没什么这，还有为什么要叫我总司桑啊？”“唔...总司桑就是总司桑啊，就像庆喜酱就是庆喜酱一样...呜哇，接下来的话又该怎么写啊，总司桑教教我！” 于是乎，冲田总司顺带用了一个上午的时间，帮助这位神皇陛下温习了一遍各类诏书的格式，好满足这位神皇的学习欲望。"
 SKR.28.a: "“慢着慢着，感觉话题跑偏了啊喂！”"
 SKR.29.t: "奉诏讨贼"
 SKR.29.desc: "事态的变化并不出乎意料，当京城政变的消息传遍整个早樱后，全国群情激愤，反对幕府的人士终于找到了合理的借口，奔走相告联络同党，组建起各自的武装力量，意图在这场浩浩荡荡的战争中分的一杯羹。而其中又尤以北方诸藩为甚。\n\n已经各自安全回归本藩的领导人们相聚在音乃藩，经过短暂的讨论后拥立音乃藩藩主西木野真姬为盟主，歃血盟誓，誓要结束幕府的反动统治。而西木野真姬更是拿出了神皇此前委托于其的亲笔诏书，授予其总督四方之权，以此为依据，西木野真姬在北方建立起与中央对立的新政府，并于同日发电报往京城，要求以冲田总司为首的反逆军头缴械投降。 幕府方面的回应同样强硬，在严词拒绝任何交出手中权力的可能性后，大军便开拔音乃藩，意图要在叛军形成气候之前先行歼灭。如今，南方各藩尚未表态，境外大国也已经注意到了这“大洋十字路口”内部的政治风暴。如今的两方都只能祈祷，在巨人决定下注之前，彻底结束这场内乱。"
 SKR.29.a: "欲加之罪，何患无辞？全军迎击！"
