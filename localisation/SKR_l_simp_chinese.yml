 SKR_flavor.15.t: "天京致天领（上）"
 SKR_flavor.15.desc: "丰苇原瑞篱内皇国皇帝 宫国朱璃 致早樱国 足利一叶 参议阁下：\n\nCiallo～(<・ω< )⌒☆\n\n见字如面，听闻近日贵国公方之事，朕深感悲痛。南国诸领受合众国影响至深，现又有新选组据京州，日后恐生变故。参议阁下既居左近卫之职，督南国诸邦，望在百忙之中，念我两国之谊，护我皇国商旅周全。\n\n如今局势晦暗，如参议阁下有需可遣使至东云、神都等处我国商会，以此信加盖之皇国国玺为凭，伊等必倾囊相助。\n\n朕又闻双叶阁下欲寻一清修之所，如若不弃可至我皇国伊濑野之皇学舍。朕必命管长悉心照料，使双叶阁下不虚此行。\n\n朕知参议阁下素有剑豪之名，承鹿岛新当流之奥义。朕亦略通武艺，望来日可以武会友，共诉衷肠。现随信赠阁下铠甲一副，我皇国之咒装刀一把，以结两国之好。\n\n朕另修书一封与京州之神皇穗乃果与冲田将军，望转呈。\n\n【丰苇原瑞篱内皇国之玺】"
 SKR_flavor.15.a: "落款\n宫国朱璃，皇国二千零四年"
 SKR_flavor.16.t: "天领致天京（下）"
 SKR_flavor.16.desc: "早樱国南国郡代 足利参议正三位左近卫中将一叶 致丰苇原瑞篱内皇国皇帝 宫国朱璃陛下\n\nCiallo～(<・ω< )⌒☆\n\n获桃花帝陛下来信及赐物之铠甲、名刀，不胜惶恐。\n\n陛下来信所言之事，乃南国郡代分内之务。贵国与吾早樱国乃姊妹之邦，皇国子民之事乃吾早樱之事，毋增陛下之忧。早樱诸皇国商会见陛下来信，皆山呼万岁。陛下勤政爱民，外臣不胜叹服。\n\n愚妹双叶之事，承陛下美言，不日将其遣往伊濑野见学，望管长严格指教，莫有疑虑。\n\n陛下武艺，虽隔瑞穗海之远，吾早樱国人尽皆知。前天京之战驱合众国南蛮，扬我武家之神威，吾虽外邦之民亦心悦诚服。若得亲睹陛下之姿，必斗胆讨教。\n\n【南国郡代之印信】"
 SKR_flavor.16.a: "落款\n足利一叶，莱芜二年"
 SKR_flavor.17.t: "图书管理员的平凡一日"
 SKR_flavor.17.desc: "没有灵感，连游戏标题都无法确定——这是名为奈绪史明的美少女游戏剧本家近期的日常。在将又一打废案丢进纸箱之后，他终于踏出了位于斯特拉斯堡的工作室。沉默不语，只是向东走去，相比起之前负责的工业风游戏，他需要亲眼看一些自己从未见过的东西。台钳、熔炉、水泵随处可见，但偶像、羽织、长刀这些恐怕只有远方的异国才得以一见。\n\n“您好，请问有没有介绍Toyoashiharanomizugakinouchinosumeramikotonokuni的国家的书籍？”扎着双马尾的图书管理员没有对这个长得像绕口令的一样的名字露出什么诧异的表情，只是拿出一张草稿纸写下了几本书名，“都在二楼的右手边，不过藏品有点少你可能需要找一下。另外你也可以直接问图书部的白崎绪美或者铃木佳奈，她们好像在那边有几个朋友的样子。”\n\n白崎绪美？奈绪史明似乎对这个名字有点印象…但他今天是来看书的，还是下次再说吧。\n\n几经寻找，奈绪史明终于找到他需要的沃雅基地图册，《西海列国志》，历代圣铃兰传教士的日记，以及一本标着“禁止外借”的《皇国帝纪》。\n\n由巫女开创的神官国家？历代统治者都是女性？如果不是亲自阅读这些晦涩的古文，奈绪史明根本不会相信这样的国家真正存在。在其北方还有另一个少女偶像与武家共治的奇异政权，书中的每一行记载都在催促着他走出这座图书馆，他需要亲眼看看。"
 SKR_flavor.17.a: "第一站，合众国领事馆"
 SKR_flavor.18.t: "船票"
 SKR_flavor.18.desc: "“你好，请问有到天京的船吗？” 奈绪史明向柜台的售票员询问道。“天津？您是说赛莲斯京兆港吗？”“不是，就是合众国南部那个丰什么原皇国的天京。”售票员思索片刻，“那应该是暂时没有，如果您要去的话最近的直达航线是先去合众国丹沃港，可以考虑一下。”“那下一班船最快什么时候出发呢？”“0d0721线，明天下午。”“好的，那请给我一张票吧。”\n\n售票员并不急着马上办票，而是按照桌子上贴的操作流程继续问道：“这是国际航线，请您出示一下合众国签证。” 奈绪史明将印着崭新合众国签证的斯特拉斯堡护照递了过去，售票员只是例行公事一般扫了几眼确认盖的是合众国签证，便按照流程继续。\n\n“多谢惠顾。”售票员小姐将船票和找零一块递了过去。“顺别多问一句，您有皇国的入境许可吗？虽然她们好像也没有海关之类的东西。”\n\n“我有介绍信，写信的人说拿着就可以见到她们家皇帝的样子。”“那就祝您好运。”售票员只是像听笑话一样结束了对话，奈绪史明自己也不太相信那个叫铃木佳奈的图书部员写的东西能发挥什么作用，但船到桥头自然直，总会有办法的。"
 SKR_flavor.18.a: "出发，启航"
 SKR_flavor.19.t: "天京访客"
 SKR_flavor.19.desc: "天京港守军汇报，发现一名搭乘私人船只进港的不明身份人员。此人持有斯特拉斯堡护照并有合众国签证，自称从丹沃出发抵达我国并提供了一封由汐美学园图书部开具的介绍信。外事和安全部门已经介入并进行初步接触，现请求进一步指示。"
 SKR_flavor.19.a: "这不是明牌合众国间谍吗？"
 SKR_flavor.19.b: "热烈欢迎！"
 SKR_flavor.20.t: "日记：桃花染的皇姬"
 SKR_flavor.20.desc: "皇国的都城天京给我的印象很好，城市布局极具美学。我只是试着把介绍信递过去，没想到真的见到了宫国朱璃本人，据她本人说是因为和写信的人颇有缘分。我们相谈甚欢，皇姬大人带我参观了整座皇宫和演武场，或许是战乱的原因，这些建筑并没有我想象中的宏伟。我印象最为深刻的反而是皇姬的亲卫，那个姓稻生的女孩，没想到她在下班的时候居然还是皇国各地巡演的偶像，奈何时间有限我没能亲眼看上一场。据亲历者所说，平日里拿刀的武人们会在那时候拿着荧光棒给她助威，不知是何种景象。\n\n下午，又参观了皇国新成立的美少女游戏会社“奥古斯特”的工作室，和他们的剧本家和画师进行了一番友好交流，愿他们也能创作出优秀的作品。\n\n在皇国这几天远胜于读几百页书，我对未来的剧本企划终于有了新的想法。临行前皇姬殿下又给了我一份皇国的通关文牒和介绍信，说是只要交到早樱国的南国郡代手中就可以在当地畅通无阻，希望如此。"
 SKR_flavor.20.a: "我记得是要搭三号码头的船来着？"
 SKR_flavor.20.b: "我记得是要搭五号码头的船来着？"
 SKR_flavor.21.t: "神都港来客"
 SKR_flavor.21.desc: "神都港守护报告有一不明身份男子持皇国通关文牒和斯特拉斯堡护照乘船抵达神都港，鉴于先前从未有此例，特请求指示。"
 SKR_flavor.21.a: "让他在南方逛逛就行了"
 SKR_flavor.21.b: "欢迎他到处看看"
 SKR_flavor.22.t: "日记：闪闪发光，心动不已？"
 SKR_flavor.22.desc: "自神都港上岸，我就知道这里和皇国完全是两个地方，虽然我和她们都讲同一种语言（这或许是个未解之谜），但是在这里我这种手无寸铁的人没有护卫估计连大门都不敢出。我的护卫今川小姐似乎对这些习以为常，早樱的少女偶像即使是在血花飞溅的战场上也能面不改色地演唱。\n\n从神都港坐船一天就能抵达南方最繁华的平户港，当地的领主户山香澄是按照传统选举上台的。好几位居民都说他们早就受够了政治斗争，于是选了个青春活力美少女偶像，这也是早樱的传统了，她们居然都是要在朝廷注册的职业神官，我倒是首次听闻。\n\n可惜的是，即使我多次请求，她们也不愿意带我去东边的大结界边上看一眼。根据她们的模糊描述，里头是只有在早樱“神皇”选举的时候才能够进入的巨大演舞场，道场的守护者似乎只是一个小女孩，但附近居民都称其为“东照大权现”。按照传说，她恐怕就是早樱统治者选举的最终裁定者。\n\n不过，她还是非常详细地介绍了乐队的构成和偶像的日常演出方式等等一手信息，还特意允许我出入礼乐奉行所的资料库随意查询。"
 SKR_flavor.22.a: "该回家了"
 SKR_flavor.22.b: "下一站，京州"
 SKR_flavor.23.t: "日记：神皇陛下"
 SKR_flavor.23.desc: "从安葬着前代将军的本能寺一路参观到幕府的大本营安土御所，再去礼乐奉行所和城下町，走完京州外城就花了足足两天时间。等到进入京州皇宫时已经是来这里的第四天了。莱芜神皇陛下，或许应该称她为高坂穗乃果陛下？在初次会面时我就确定她是个能给人带来希望的偶像。她向我介绍了不少她还在音乃藩时的趣事，还不知从哪里掏出了几张她家小店的优惠券，原来贵为神皇还需要拜托客人照顾自家生意。\n\n在谈到神皇选举的时候，她却意外的没什么印象，据陛下本人说那是在一个大的离谱的舞台上和户山香澄小姐进行一场轻松愉快的对邦大赛，自己不过是好运才以一票之差取胜，事后回想反倒紧张不已？似乎如此。\n\n我想，我大概已经知道如何创作一部好游戏了。"
 SKR_flavor.23.a: "拭目以待"
 SKR_flavor.24.t: "日记：眼镜娘"
 SKR_flavor.24.desc: "东国赛莲斯\n眼镜少女到处是\n这个我支持"
 SKR_flavor.24.a: "请关注拆迁地球与爱情事故喵，支持组长旮旯给木喵，谢谢喵"
 SKR_flavor.25.t: "相遇（下）"
 SKR_flavor.25.desc: "京州的月色下，两道身影踉踉跄跄的走在已空无一人的大街上，盛田昭夫一只手扶着那发痛的额头，另一只手搀扶着已经不省人事的学姐，艰难的向着她说出的公司地址走去。 盛田昭夫一直不怎么喜欢居酒屋的氛围，她并没有多少交心的朋友，一个人在热热闹闹的人群里显得太过特立独行，如果不是家里发来让她回去继承那清酒生意的急电，她也不会闷着一股气来这里一个人喝闷酒。只可惜，今天这酒是没有喝成了，还多了一桩新麻烦事。\n\n从井深大的身上摸出了钥匙，拧开了那间狭窄的铁门，力竭的盛田昭夫将这间屋子的主人一把推到了沙发上，靠着门框止不住的喘着粗气。 在盛田昭夫跟前的是一间一眼便可看到头的办公室，几个卡位分割出了各自的界限，但却只有坐在最里头的那间，累着高到快触及那并不高的天花板的文件，以及一股刻进木头里的咖啡味。先前这位学姐说她的公司只有她自己在运作的确所言非虚。\n\n叹了口气，盛田昭夫却并未转身离开，那正在沙发上哼哼的家伙的状况没法让她安心，在酒席期间，这位学姐说了很多，从幕府的政治再到企业的垄断，最后回到了自身郁郁不得志的境地，哪怕已经喝的醉醺醺，但她的态度依然强硬和唯我，以至于整段时间里，盛田昭夫光是在当聆听者的角色，她同情这位学姐的遭遇，也从她的落寞身上冥冥之中看到了自己未来的影子。\n\n“或许帮助她，也是在帮自己吧。”盛田昭夫不禁这么想到。坐在寂静的办公室里，盛田昭夫自然而然的看向那间唯一有人味儿的区域，她回想起酒桌上的时候，井深大含糊不清吐出那些她构想的碎片，她不敢说完全不好奇这位优秀学姐脑袋里的想法。所以，尽管教师的道德感让她的心脏砰砰直跳，可手还是稳稳当当的翻开了那厚厚的文件，先是第一页，再然后实现第二本，紧接着是第三摞...... 当阳光从那狭小的窗户里撒进车间，宿醉的井深大悠悠从梦中转醒。本就乱糟糟的办公区被弄的更乱，地上随处可见各种白纸，而上面写满了密密麻麻的计算公式，而那位晚上陪自己喝了酒的后辈，正盘腿坐在地上，孜孜不倦的在继续在纸上勾画着什么。 “你这家伙...在干什么？”“啊，学姐您醒过来了？我昨晚在您留着的笔记上的运转逻辑进行了一些优化，要是醒来的话就过来看看吧，顺便一问...现在学姐的公司还招...”"
 SKR_flavor.25.a: "“招，欢迎，现在你就是京州通信研究所的未来之星了。”"



 SKR_crisis.1.t: "早樱海域紧张度上升"
 SKR_crisis.1.desc: "双方在早樱地区的对峙已然升级...另一方面，我们也能够将更多筹码摆上牌桌..."
 SKR_crisis.1.a: "做好准备！"
 SKR_crisis.2.t: "不期而遇"
 SKR_crisis.2.desc: "在又一次巡逻之中，双方的舰队不期而遇。飘着不同旗帜的军舰一边保持着距离，一边同时做好了战斗准备。在简短而充满外交措辞的互相问候后，战斗警报被解除。双方互有默契地拉开距离，朝着各自的目标而去。"
 SKR_crisis.2.a: "又是紧张刺激的一天 "
 SKR_crisis.3.t: "人在囧途"
 SKR_crisis.3.desc: "巡逻舰队向第二舰队司令部报告，一艘圣铃兰所属的军舰在附近失事。我方本着人道主义原则将人员救起并提供了必要的物资。对方船员要求在最近的港口上岸返回本国，请求进一步指示。"
 SKR_crisis.3.a: "来了，就别想走了"
 SKR_crisis.3.b: "缓和局势"
 SKR_crisis.4.t: "人在囧途"
 SKR_crisis.4.desc: "巡逻舰队报告，一艘合众国所属的军舰在附近失事。我方本着人道主义原则将人员救起并提供了必要的物资。对方船员要求在最近的港口上岸返回本国，请求进一步指示。"
 SKR_crisis.4.a: "来了，就别想走了"
 SKR_crisis.4.b: "愿圣树的光辉拯救他们"
 SKR_crisis.5.t: "截获武器"
 SKR_crisis.5.desc: "在一次登船检查中，我方发现了标注为“玩具”，“生活物资”，“香肠”的制式武器和大量基数的弹药。对应的货箱已被扣下，货船在经过全面检查后依法放行。"
 SKR_crisis.5.a: "你们这香肠有点特别啊"
 SKR_crisis.6.t: "撞击事故"
 SKR_crisis.6.desc: "在又一次近距离对峙中，双方的船只发生了猛烈碰撞！目前没有人员伤亡报告，就现场状况来说，是我们撞赢了？"
 SKR_crisis.6.a: "我们是不是该把撞角装回来了？"
 SKR_crisis.7.t: "又一次例行检查"
 SKR_crisis.7.desc: "瓦鲁瓦号巡洋舰本次部署周期已然来到了最后一周，已经看腻了周围海域的水兵们无不期待着返回沃什顿母港的命令。在朝阳升起时，舰长唐纳德上校放下了咖啡杯，打扫干净盘中的早餐，迈着稳健的步伐走向了舰桥。沿途正在换班的水兵们草草地敬了个礼，在任务即将结束时也没人会在意这些懈怠。\n\n在向入口站岗的陆战队员点头示意后，唐纳德熟练地爬上陡峭的舷梯，打着哈欠走进舰桥。“比登，你去休息吧，该我轮班了。”唐纳德看着墙上的时钟和自己的手表，对着在舷窗边看书的副舰长比登中校说道。比登伸了个懒腰，合上书递给唐纳德。“昨天晚上又是什么事没有，我又看了四章，可算是要把任务出完了。”\n\n唐纳德让开出口，比登挥挥手走下舰桥，“那我先去吃早饭了。”又是平平无奇的一日。\n\n半瘫在舰长椅上的唐纳德也无事可做，索性拿起比登的书继续读下去。直到雷达室发来了消息，“报告，左舷发现船只。”唐纳德如例行公事般回复：“保持关注，各战位就绪。”，随后又翻过一页书。\n\n“报告，是挂罗西亚国旗的薇薇安型货船，舷号23。”这次是观察员给出了明确的报告。唐纳德有些失望地起身，把书放回桌上。“让他们停船接受检查。”唐纳德走向左舷，随手拿起一个望远镜。\n\n“报告，没有回复。”“那就打旗语。”唐纳德望向对方的桅杆，“你方无权检查”，对方的回复清晰地映在了望远镜中。“接着打。”看着对方的旗手又打了一遍几乎一样的旗语，唐纳德思索了片刻，“最后再警告一次。”\n\n依旧是同样的回复。"
 SKR_crisis.7.a: "“开炮”"
 SKR_crisis.8.t: "又一次例行检查"
 SKR_crisis.8.desc: "占位符"
 SKR_crisis.8.a: "占位符"
 SKR_crisis.9.t: "武器运抵"
 SKR_crisis.9.desc: ""
 SKR_crisis.9.a: ""
 SKR_crisis.10.t: "武器遭到拦截"
 SKR_crisis.10.desc: "我们的运输船在输送武器的过程中遭到了拦截..."
 SKR_crisis.10.a: "该死"
 SKR_crisis_news.1.t: "海涅格勒023号货轮遇袭"
 SKR_crisis_news.1.desc: "近日，悬挂罗西亚国旗的罗西亚籍货船海涅格勒-023号在早樱海域拒绝了合众国/圣铃兰海军的登检要求后遭到了炮击。一发至近弹对船只右舷造成了严重破坏，并导致船舱进水。合众国/圣铃兰人员完成登船检查后拒绝了任何协助修复船只的要求，该货船随后在罗西亚东方舰队的协助下回到港口检修。\n\n罗西亚政府已经就此事进行强烈抗议，据称该国正在从西部抽调船只增援东方舰队，并加大在极东地区的军事部署。"
 SKR_crisis_news.1.a: "殃及池鱼…"

 SKR_news.1.t: "高坂穗乃果赢得对邦选举"
 SKR_news.1.desc: "近日，依照古老的仪式召开的早樱神皇选举落下帷幕，来自音乃藩的高坂穗乃果以一票之差的微弱优势超越来自坂东藩候选人的户山香澄赢得了对邦选举，即位为早樱第八十三代神皇。以征夷大将军为首的京州及全国各公卿均已向新君上表朝贺，京州也将按照惯例举行为期七天的盛大庆祝活动。新神皇的年号已被正式宣布为“莱芜”，将在仪式结束后正式启用。"
 SKR_news.1.a: "对邦，其乐无穷"
 SKR_news.1.b: "对于这个结果，我们略有异议"
 SKR_news.1.c: "好耶！我们赢了！\n*欢呼声*"
 SKR_news.2.t: "北海不详事件"
 SKR_news.2.desc: "令人震惊的消息自早樱传来，在平定了北方乌塔利同盟的又一次叛乱，并视察了新落成的要塞六棱郭后，征夷大将军织田信长在公开演讲时遭到了一名极端乌塔利民族主义者的近距离刺杀，在抢救无效后不治身亡。刺客使用了一把拼装而成的玛纳铳枪，并对自己的行为供认不讳。据称，刺客是一名遭到幕府严厉镇压的早樱正教会信徒，目前罗西亚正教会与圣铃兰均声称与此事无关。故去的征夷大将军遗体将被护送回京州本能寺安葬，而早樱全国均已经进入全面警戒状态。"
 SKR_news.2.a: "早樱的未来全是未知数"
 SKR_news.3.t: "冲田总司继任征夷大将军"
 SKR_news.3.desc: "在遇刺身亡的织田信长被安葬于京州本能寺之前，围绕征夷大将军之位的争夺便已经展开。由于京州依旧处于全面戒严状态，外界对于此事一直知之甚少，今日这个问题终于有了答案。不知进行了何种激烈的斗争，新选组一番队队长冲田总司被正式宣布为新一任征夷大将军。莱芜神皇也已经正式接受了将军的朝贺，承认了其地位。然而，地方各藩尚未明确进行表态支持。"
 SKR_news.3.a: "事情会变好的吧？"
 SKR_news.4.t: "早樱危机"
 SKR_news.4.desc: "终于，早樱内部自冲田总司继任将军的的矛盾已经从音乃藩和岛田藩的小规模冲突演变为了京州和南方各藩的全面对峙。以坂东藩、岛田藩、鹿儿藩为首的同盟在户山香澄的带领下已经开始向京州进军，而地处东南的佐嘉藩则试图置身事外，静等局势有变。征夷大将军已经召集依旧忠诚的藩国组建联军南下征讨，一场围绕着早樱命运的战争已然爆发。"
 SKR_news.4.a: "种子早已埋下..."
 SKR_news.5.t: "六棱郭之战"
 SKR_news.5.desc: "早樱的战局似乎已经进入了最后阶段：北方各藩均已臣服，莱芜神皇也宣布禅位让贤，只有撤退至北方的新选组残部依旧在继续抵抗新政府。新选组占领了北方的重要防御工事——六棱郭，并打算在此与政府军进行最后一战。在数量处于绝对劣势的情况下，似乎没有人会看好新选组的背水一战。"
 SKR_news.5.a: "新选组的最后一搏"
 SKR_news.6.t: "南小鸟出任早樱太政大臣"
 SKR_news.6.desc: "近日，早樱神皇穗乃果正式下诏恢复了在武家时代空置了数百年的太政大臣一职，宣告“神武共和”体制的结束，早樱朝廷重新掌握权力。在举办了一场根据典籍复原的古代偶像的盛大仪式后，来自音乃藩的南小鸟已被正式任命为新一任太政大臣，这一决定被广泛视为音乃藩在北陆战争结束后取得的巨大的影响力进一步得到巩固。此外，南小鸟也是穗乃果的密友和核心圈成员，这或许也是这一任命的重要原因。"
 SKR_news.6.a: "昨日小鸟，今日鸿鹄"
 SKR_news.7.t: "园田海未出任早樱太政大臣"
 SKR_news.7.desc: "近日，早樱神皇穗乃果正式下诏恢复了在武家时代空置了数百年的太政大臣一职，宣告“神武共和”体制的结束，早樱朝廷重新掌握权力。在举办了一场根据典籍复原的古代偶像的盛大仪式后，来自音乃藩的园田海未已被正式任命为新一任太政大臣，这一决定被广泛视为音乃藩在北陆战争结束后取得的巨大的影响力进一步得到巩固。园田海未本人作为音乃藩中的著名尊王派兼穗乃果的青梅竹马，她得到这一任命或许正是早樱众望所归。"
 SKR_news.7.a: "抽了一张好牌"
 SKR_news.8.t: "渡边曜出任早樱太政大臣"
 SKR_news.8.desc: "近日，早樱神皇穗乃果正式下诏恢复了在武家时代空置了数百年的太政大臣一职，宣告“神武共和”体制的结束，早樱朝廷重新掌握权力。在举办了一场根据典籍复原的古代偶像的盛大仪式后，来自沼津藩的渡边曜已被正式任命为新一任太政大臣。在北陆战争结束后，尊王派重新取得政权已然成为定局。来自近畿重镇的渡边曜被入朝京州也被视为早樱朝廷团结北方各藩，加强中央集权的重要举措。"
 SKR_news.8.a: "船长登舰"
 SKR_news.9.t: "高咲侑出任早樱太政大臣"
 SKR_news.9.desc: "近日，早樱神皇穗乃果正式下诏恢复了在武家时代空置了数百年的太政大臣一职，宣告“神武共和”体制的结束，早樱朝廷重新掌握权力。在举办了一场根据典籍复原的古代偶像的盛大仪式后，来自虹咲藩的高咲侑已被正式任命为新一任太政大臣。高咲侑的上台宣告着礼乐奉行所的权力重新得到加强，据她本人所说，一场让人悸动不已的巨大改革即将在早樱偶像界发生。"
 SKR_news.9.a: "侑酱，小心夹脚！"
 SKR_news.10.t: "唐可可出任早樱太政大臣"
 SKR_news.10.desc: "近日，早樱神皇穗乃果经过研究决定恢复了在武家时代空置了数百年的太政大臣一职，宣告“神武共和”体制的结束，早樱朝廷重新掌握权力。在举办了一场根据典籍复原的古代偶像的盛大仪式后，来自结丘藩的唐可可已被正式任命为新一任太政大臣。这既是唐可可个人的努力成果，也是神皇复政的时代浪潮所致。“苟利国家生死以，岂因祸福避趋之”，唐可可向每一个早樱国民郑重宣告，一个新的早樱即将来临。"
 SKR_news.10.a: "一个赛莲斯人，怎么就当上了早樱的公家？"
 SKR_news.11.t: "关白之职再立，早樱的新时代"
 SKR_news.11.desc: "早樱的都城，神皇的居所——京州传来数千年未有的爆炸性新闻。不知达成了何种协议，南方坂东藩藩主户山香澄已经正式接受了朝廷授予的“关白”之位，这一比武家时代和幕府将军更加古老的职位如今重现天日。根据莱芜神皇的诏书，户山香澄将作为朝廷柱石、一人之下万人之上，有人甚至认为早樱将走向另一种形态的幕府政治。但无论如何，这依旧是早樱南北矛盾走向消弭的一大助力。"
 SKR_news.11.a: "拉邦结派？我喜欢！"
 SKR_news.12.t: "知名剧本家奈绪史明新作发售"
 SKR_news.12.desc: "今日，由剧本家奈绪史明和柚子国合作的美少女游戏全新作Limelight Orangeade Jam正式发布。该作跨时代地选择了少女乐队偶像为主体，讲述了男主角从零开始组建乐队的励志故事，并在过程中与不同的美少女邂逅并相爱。据奈绪史明自己在采访中说，这一题材受到了皇国和早樱偶像文化的启发，他试图通过这部作品来铭记每一位在旅途中热情帮助他的少女。该作品制作精良，一经发售便在美少女同萌各国收获大量好评，近期前往沃雅基群岛的船票也因此一票难求。皇国和早樱相关部门也均表示已经启动该作品的引进流程。"
 SKR_news.12.a: "少女乐队时代的来临？"
 SKR_news.13.t: "IRIS姊妹作即将发布！"
 SKR_news.13.desc: "伟大的组长，IRIS组永远的太阳ztz制作的美少女游戏《拆迁地球与爱情事故》即将发布，请每一位看到这个新闻的玩家都关注一下，感谢！"
 SKR_news.13.a: "你们这是什么旮旯给木啊？"

