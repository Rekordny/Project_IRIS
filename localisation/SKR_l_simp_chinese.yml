 SKR_setsumei: "即便贵为§P征夷大将军§!，也无法在朝堂之上肆意妄为。\n\n早樱幕府的权威建立在£SKR_Kakushin_texticon £SKR_Chukan_texticon §t四§!§K大§!§C派§!§g系§!£SKR_Shinsengumi_texticon £SKR_Hoshu_texticon 的动态平衡之上，作为统治者，您需时刻权衡各个派系的 £SKR_Influence_texticon  §Y影响力§!与 £SKR_Relationship_texticon  §S好感度§!。\n\n£SKR_Influence_texticon §Y影响力§!决定了该派系在政治舞台上的声量与权重，派系的影响力越高，其对国家运行（无论是增益还是减益）的加成系数便越庞大。\n\n£SKR_Relationship_texticon §S好感度§!则决定了派系对您的忠诚程度，及其力量的朝向。好感度高于§P50§!时，其影响力将转化为对您的鼎力支持。反之，若低于此红线，其影响力将即刻化为阻力，乃至演变为§R灾难性的政治破坏§!。\n\n请谨慎行事，一个强大但离心的盟友，往往比弱小的敌人更危险。是驾驭群臣还是被其反噬，皆在将军殿下一念之间。\n\n注：即使是§g最温顺的保守派§!，也绝不会容忍§6南蛮§!的奇技淫巧。无论他们多么忠诚，都无法为您提供任何科研上的助力。"
 SKR_kakushinha_info: "[SKR_kakushinha_info_scripted_loc]"
 SKR_kakushinha_info_1: "£SKR_Kakushin_texticon §t革新派§!\n\n\n\n\n\n\n\n£SKR_Oda_Nobunaga_texticon\n\n\n\n\n\n\n\n§C派系领导人§!：征夷大将军 织田信长\n\n自§g3053年黑船叩关的屈辱§!以来，幕府革新派在将军织田信长的铁腕下应运而生。其核心成员由少壮派官僚、留洋知识分子以及技术军官构成，他们唯一的信条便是信长所提出的“富国强兵”战略。\n\n在革新派眼中，仅凭传统的武士刀无法切断不平等条约的枷锁，唯有工业化与现代化的军队才能捍卫国家。因此，他们倾注全力打造了“传习队”——这支聘请欧罗巴军事顾问训练、装备先进火器的新式陆军。\n\n对信长和她的追随者而言，为了达成建立统一民族国家的宏图伟业，§t任何挡路的传统与特权都将被无情碾碎§!。在这个剧变的时代，幕府毋需优柔寡断的改良，唯有铁与血，才能扭转早樱的困境。"
 SKR_kakushinha_info_2: "£SKR_Kakushin_texticon §t革新派§!\n\n\n\n\n\n\n\n£SKR_Kinoshita_Hiyoko_texticon\n\n\n\n\n\n\n\n§C派系领导人§!：木下日和子秀吉\n\n自§g3053年黑船叩关的屈辱§!以来，幕府革新派在将军织田信长的铁腕下应运而生。其核心成员由少壮派官僚、留洋知识分子以及技术军官构成，他们唯一的信条便是信长所提出的“富国强兵”战略。\n\n在革新派眼中，仅凭传统的武士刀无法切断不平等条约的枷锁，唯有工业化与现代化的军队才能捍卫国家。因此，他们倾注全力打造了“传习队”——这支聘请欧罗巴军事顾问训练、装备先进火器的新式陆军。\n\n对信长和她的追随者而言，为了达成建立统一民族国家的宏图伟业，§t任何挡路的传统与特权都将被无情碾碎§!。在这个剧变的时代，幕府毋需优柔寡断的改良，唯有铁与血，才能扭转早樱的困境。"
 SKR_chukanha_info: "[SKR_chukanha_info_scripted_loc]"
 SKR_chukanha_info_1: "£SKR_Chukan_texticon §K中间派§!\n\n\n\n\n\n\n\n£SKR_Hitotsubashi_Yoshinobu_texticon\n\n\n\n\n\n\n\n§C派系领导人§!：一桥庆喜\n\n在激进的革新与顽固的守旧之间，一桥庆喜与其领导的中间派构成了幕府政治天平上一个至关重要的砝码。该派系成员多为上层官僚与名门武士——他们虽承认变革的必要，却对信长那种不惜破坏传统的独断专行深感不安。对这些受过良好教育的精英而言，国家的现代化绝不能以武家道义与社会稳定为代价。\n\n他们奉行“渐进论”与“尊王佐幕”——即主张§O神皇应作为神圣象征接受崇敬§!，而治国理政的具体职责，仍应由具备高贵血统与丰富经验的武士阶层承担。尽管在信长的威压之下，中间派选择了战术性的沉默，但其庞大的政治资源与地方兵力始终未曾动摇。他们如同蛰伏的猛兽，暗中注视着革新派的每一步险棋，随时准备在局势失控之时接管国家，将早樱引回他们心目中的“正轨”。"
 SKR_chukanha_info_2: "£SKR_Chukan_texticon §K中间派§!\n\n\n\n\n\n\n\n£SKR_Ashikaga_Kazuha_texticon\n\n\n\n\n\n\n\n§C派系领导人§!：足利一枼\n\n在一桥庆喜锒铛入狱之后，官居左近卫中将的足利一枼成为了事实上的武家栋梁，与其领导的中间派构成了幕府政治天平上一个至关重要的砝码。该派系成员多为上层官僚与名门武士——他们虽承认变革的必要，却对信长那种不惜破坏传统的独断专行深感不安。对这些受过良好教育的精英而言，国家的现代化绝不能以武家道义与社会稳定为代价。\n\n他们奉行“渐进论”与“尊王佐幕”——即主张§O神皇应作为神圣象征接受崇敬§!，而治国理政的具体职责，仍应由具备高贵血统与丰富经验的武士阶层承担。尽管在信长的威压之下，中间派选择了战术性的沉默，但其庞大的政治资源与地方兵力始终未曾动摇。他们如同蛰伏的猛兽，暗中注视着革新派的每一步险棋，随时准备在局势失控之时接管国家，将早樱引回他们心目中的“正轨”。"
 SKR_shinsengumi_info: "£SKR_Shinsengumi_texticon §C新选组§!\n\n\n\n\n\n\n\n£SKR_Kondo_Isami_and_Serizawa_Kamo_texticon\n\n\n\n\n\n\n\n§C派系领导人§!：新选组局长 近藤勇 新选组笔头局长 芹泽鸭\n\n新选组的前身为在世界大战中屡建战功的民间武装§2“壬生浪士”§!，这些渴望功名的剑客和浪人在战后被信长纳为家臣，并赐名'新选组。凭借赫赫战功成功跻身幕府权力的核心。\n\n然而，这支令人闻风丧胆的精锐部队，其内部正如当今的时代一样撕裂。以近藤勇与土方岁三为首的“试卫馆系”正竭力将其打造为一支装备新式步枪、纪律严明的现代化军队；而芹泽鸭领导的“逍遥系”则顽固地坚守着浪人的狂放与嗜血，拒绝沦为体制的看门狗 ；更有伊东甲子太郎等人暗中向神皇输送秋波 。新选组虽是§C近畿地区无可撼动的军事基石§!，但严重的内耗已使其行动能力与政治可靠性大打折扣。"
 SKR_houshuha_info: "[SKR_houshuha_info_scripted_loc]"
 SKR_houshuha_info_1: "£SKR_Hoshu_texticon §g保守派§!\n\n§C派系领导人§!：空缺\n\n天下大势，浩浩汤汤，顺之者昌，逆之者亡。对于幕府保守派而言，3053年的开国并非危险与机遇并存，而是一切礼崩乐坏的根源。这一派系主要由最传统的幕臣与固守乡土的地方士族构成，是旧有封建特权与土地制度最顽固的捍卫者。在他们眼中，祖宗之法不可变，一切外来的技术与思潮，皆是对早樱国体的侵蚀与毒害。\n\n尽管在黑船来航后的政治版图中，主张“重新锁国”的声音已日趋边缘，但这并不意味保守派已毫无还手之力。凭借盘根错节的血缘纽带与宗族势力，他们织就了一张无形的关系网，足以对任何触动其根本利益的改革形成强力阻滞。他们是早樱拖在身后延续千年的车辙，虽明知无法阻挡历史的车轮，却仍试图以身躯卡住变革的齿轮——只为让那个§g唯有武士与贵族享有尊荣的旧梦§!，得以再延续片刻。"
 SKR_houshuha_info_2: "£SKR_Hoshu_texticon §g保守派§!\n\n\n\n\n\n\n\n£SKR_Akechi_Jube_texticon\n\n\n\n\n\n\n\n§C派系领导人§!：明智十兵卫\n\n天下大势，浩浩汤汤，顺之者昌，逆之者亡。对于幕府保守派而言，3053年的开国并非危险与机遇并存，而是一切礼崩乐坏的根源。这一派系主要由最传统的幕臣与固守乡土的地方士族构成，是旧有封建特权与土地制度最顽固的捍卫者。在他们眼中，祖宗之法不可变，一切外来的技术与思潮，皆是对早樱国体的侵蚀与毒害。\n\n尽管在黑船来航后的政治版图中，主张“重新锁国”的声音已日趋边缘，但这并不意味保守派已毫无还手之力。凭借盘根错节的血缘纽带与宗族势力，他们织就了一张无形的关系网，足以对任何触动其根本利益的改革形成强力阻滞。他们是早樱拖在身后延续千年的车辙，虽明知无法阻挡历史的车轮，却仍试图以身躯卡住变革的齿轮——只为让那个§g唯有武士与贵族享有尊荣的旧梦§!，得以再延续片刻。"
 

 #京州会议
 SKR_fate_of_bakufu_title: "§P早樱§!将§4何去何从§!？"
 SKR_fate_of_bakufu_text: "[SKR_fate_of_bakufu_scripted_loc]"
 SKR_Kyoshu_Conference_scripted_loc_1: "照此趋势，§K京州会议§!将以§Y一桥庆喜继任§!收场"
 SKR_Kyoshu_Conference_scripted_loc_2: "照此趋势，§K京州会议§!将以§O政权奉还神皇§!收场"
 SKR_Kyoshu_Conference_scripted_loc_3: "照此趋势，§K京州会议§!将以§C冲田总司§!§S继任§!收场"
 SKR_Kyoshu_Conference_scripted_loc_4: "当前对§K京州会议§!的结果下定论还§R为时尚早§!"
 SKR_yoshinobu_point_effect_desc: "支持£Kyoshu_Conference_shogunate_texticon §Y一桥庆喜§!的票数[?SKR_yoshinobu_point_temp|+=0]"
 SKR_taisei_hokan_point_effect_desc: "支持£Kyoshu_Conference_idol_texticon §O政权奉还§!的票数[?SKR_taisei_hokan_point_temp|+=0]"
 SKR_Kyoshu_Conference_Yoshinobu_tt: "£Kyoshu_Conference_shogunate_texticon §Y看守政府§!§C摄政§! §Y一桥庆喜§!\n--------------\n§L蛰伏许久的观察者终于走到了舞台中央。对一桥庆喜而言，织田信长的死并非国家的灾难，而是上天赐予自己的良机。\n\n在信长死后，庆喜敏锐地捕捉到了风向的变化。她并非不知变通的老顽固，相反，她从容打出了名为“公议政体”的底牌。在她看来，这不仅是与信长专制的切割，更是一场稳操胜券的政治表演：通过给予诸侯们渴望已久的话语权，她将轻松把对南方共和派心存恐惧的北方大名的忠诚收入囊中。\n\n一桥庆喜相信，当喧嚣散去，这些迷茫的偶像终会意识到，唯有自己——这位流淌着高贵武家血液的继任者，才是早樱毋庸置疑的天下人。而眼下的这场诸侯会议，不过是她未来数十载执政生涯中，一段微不足道的插曲。§!"
 SKR_Kyoshu_Conference_Taisei_Hokan_tt: "£Kyoshu_Conference_idol_texticon §O政权奉还思潮§! \n--------------\n§L“大政奉还”，或者说“王政复古”这个词的含义，早已在三十年的时光中发生了翻天覆地的变化。\n\n遥想三十年前，它还只是极端分子妄图阻挡时代浪潮的排外嘶吼。而如今，它却成了推翻幕府最锋利的理论武器。\n\n“新复古”理论重新阐释了历史：它宣称早樱古代的神皇选举并非封建迷信，而是一种“原始民主”的雏形。对北方民众而言，这是将偶像从幕府的“鸟笼”中解放的神圣使命；而在南方共和派看来，这是通向现代选举制度的必经之路——毕竟，在武家窃取权柄之前，统治者本就是由万民在舞台下公推选出的。\n\n这是一个完美的政治容器，无论你是渴望神皇复权的复古派还是激进的自由派，都能在其中安放自己的理念。它不再关乎是否驱逐外国人，而是关乎一个足以动摇织田幕府统治根基的诘问：既然将军无法代表民意，那为何不把权力还给那个真正由万民选出的偶像？§!"
 SKR_Kyoshu_Conference_Okita_tt: "£SKR_Shinsengumi_texticon §C新选组§!一番队队长 §C冲田总司§!\n--------------\n§L权力，至高无上的权力，与其说是一种奖赏，不如说是一种强加于人的诅咒——对于冲田总司而言，这顶沉重的将军垂缨冠便是如此。\n\n在这位试卫馆出身的剑士看来，“征夷大将军”本是遥不可及的字眼。她从未觊觎天下，只一心沉醉于刀剑的世界。然而命运造化弄人，历史洪流冲垮了旧秩序，也将这位昔日的乡下少女推向了时代的风口浪尖。究竟是时势造就了英雄，还是历史裹挟了凡人？此刻无人能够回答。\n\n与精通权术的官场老手不同，冲田对令人生厌的政治博弈知之甚少。但这份“纯粹”恰是新政府所需的完美门面——一个毫无野心却武力超群的象征。§!"
 
 #北陆战争
 SKR_Hokuriku_War_text: "[SKR_Hokuriku_War_scripted_loc]"
 SKR_Hokuriku_War_scripted_loc_1: "§O北方四藩§!终于摘了伪装的面具，竟敢将矛头对准京州，试图颠覆§t信长公§!的遗产。\n\n我们将用利刃作为回应，§C诚字旗§!绝不会在此时落下！"
 SKR_Hokuriku_War_scripted_loc_2: "名为§C新选组§!的窃贼，逆潮流而动，伪称将军，将§O穗乃果§!囚禁在寒冷的皇居之中。\n\n北方四藩已歃血为盟，与民众一道汇聚成不可阻挡的洪流，我们将§P粉碎暴政§!，将真正的笑容带回这个国家！"
 SKR_morale_text: "幕府军的抵抗意志：[?SKR.SKR_morale|Y0]"
 SKR_morale_tt: "抵抗意志代表了幕府军当前继续作战的意愿，§O无论出于何种原因，民众也不愿与神皇为敌§!，§C一旦丧失抵抗意志，幕府军将树倒猢狲散。§!"
 SKR_Hokuriku_War_SSG_tt: "@SKR 早樱幕府（新选组）@SKR\n----------------------------\n§C愛しき友は 何処に§!\n亲爱挚友今身在何方\n\n§Cこの身は 露と消えても§!\n即便此身与朝露同消\n\n§C忘れはせぬ 熱き思い§!\n永不忘怀  一身热血\n\n§C誠の名に集いし 遠い日よ§!\n不忘当日寄身诚字旗下\n\n§Cあの旗に 託した夢を§!\n与托于旗上的青云之志"
 SKR_Hokuriku_War_LL_tt: "@NIS @KUD 尊王派同盟 @UEH @SBY\n----------------------------\n§Z悲しみに閉ざされて 泣くだけの君じゃない§!\n不会只是浸沉在悲伤中独自哭泣\n\n§Z熱い胸 きっと未来を切り開く筈さ§!\n要怀着满腔热情定能开拓出未来的道路\n\n§Z悲しみに閉ざされて§!\n只是沉浸于悲伤中\n\n§Z泣くだけじゃつまらない§!\n独自哭泣多么无趣\n\n§Zきっと（きっと）君の（夢の）§!\n肯定会（肯定会）你那（梦想的）\n\n§Zチカラ(いまを）動かすチカラ§!\n力量（正是）使你前进的力量\n\n§Z信じてるよ だからSTART!!§!\n我是如此坚信着 所以让我们START!!"
 
