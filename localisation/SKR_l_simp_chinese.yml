 SKR_sankin.9.t: "鹿儿藩的参勤交代（上）"
 SKR_sankin.9.desc: "参勤交代是幕府用以约束诸藩的古老制度，各藩大名须轮流在京州与领地之间往返居住。鹿儿藩远在西南，往返一次便要耗费数月，这对任何一位大名而言都是沉重的负担——但西乡利通倒是从不抱怨。\n\n“将军已在前院和室等候。”传唤的声音打断了她的思绪。西乡利通整理衣襟，跟随侍者穿过长长的回廊。安土御所的格局庄严而压抑，每一道门、每一处转角都在无声宣示幕府的权威。她步履沉稳，腰间短刀轻轻敲击着侧腹，发出细微而有节律的声响。殿内，织田信长正坐在上首。\n\n她今日倒未着那身常穿的异国军装，换了一袭素净的鹤纹小袖，长发随意束起，斜倚在凭几上翻看什么文书。见西乡利通入内，她抬眼一瞥，嘴角微扬。“西乡，你倒是准时。”“将军召见，岂敢怠慢。”西乡利通躬身行礼，依礼数三拜之后，才在指定的位置端坐下来。“不必拘谨……”\n\n信长将文书丢到一旁，打量着这位来自西南的女大名。数十年间，她们见过许多次——在战场上、在幕议中、在庆功宴上。但像今日这般单独对坐，倒是不多。“说吧，”信长开口，语气里带着她一贯的直截，“你特意求见，总不是只为了给本将军请安。”西乡利通垂首片刻，再抬起头时，那双一向冷静的眼睛里多了一丝旁人难得一见的温度。“臣此来，确有一事，要当面谢过将军。”\n\n“哦？”“黑沫夜之后，幕府优先救助南方诸藩。此事，臣一直铭记在心。”信长挑了挑眉，似乎没料到她会提起这个。“鹿儿藩当年若非将军调度钱粮、减免赋税，又特许西南制铳厂保留工匠，只怕早已元气大伤。”西乡利通的声音平静，但每个字都像是斟酌了很久，“臣那时刚刚继任藩主，内外交困，若非将军援手，西乡家的经营殖产未必守得住。”“此事，臣一直不曾当面致谢。”她微微欠身，“今日补上，还请将军见谅。”\n\n信长沉默了一瞬，忽然笑了一声。那笑容里有几分自嘲，也有几分不易察觉的落寞。“你倒是记得清楚。”她伸手拿起旁边的茶盏，抿了一口，“那时候本将军调了国帑去救南方，北方那些暴民骂了本将军整整三年。说你信长只顾着工业区，不顾北方百姓死活。”“臣知道。”西乡利通低声道。“你知道？”信长放下茶盏，“那你可知道，当年本将军做那个决定，不是因为偏袒南方，而是因为——”她顿了顿，语气忽然变得锋利起来，“仗打完了，国力空虚，若不保工业命脉，整个早樱都要跟着一起沉。北方再苦，饿不死人。南方工业垮了，就什么都没了。”“臣自然知晓。”西乡利通的目光沉稳地迎上去，“所以臣今日来，不是为了替北方抱不平，而是想告诉将军——”"
 SKR_sankin.9.a: "“当年您保下的那些工厂，如今仍在为早樱造枪造炮。鹿儿藩没有忘记。”"
 SKR_sankin.10.t: "鹿儿藩的参勤交代（中）"
 SKR_sankin.10.desc: "她示意在外的侍者取来一件长条形的锦盒，接过之后亲自双手托举，恭恭敬敬地呈上。“这是西南制铳厂的最新制品。臣斗胆，请将军过目。”信长来了兴致，示意侍者呈上来。她打开锦盒，目光顿时一亮。盒中静卧着一支步枪。\n\n并非寻常制式武器。枪身修长，木质部分选用上等黑胡桃木，纹理细密如流水；金属部件泛着深沉的靛蓝光泽，每一处棱角都经过手工打磨，温润而不失锐利。枪托上以银丝镶嵌着鹿儿藩的桔梗纹，护木侧面则刻着一行细小的铭文——\n  “西南之星，献与征夷大将军”。\n\n信长将枪取出来，在手中掂了掂分量，又拉开枪机，动作熟练得像一个真正的火器爱好者。杠杆机构滑动顺畅，发出清脆的金属声。她眯起眼睛，透过枪管向光处看了一眼膛线，嘴角的弧度越来越大。“手工拉制的八条膛线，缠距均匀……护木做了减重处理，扳机也调过了？”她抬头看向西乡利通，“这可不是流水线上能下来的东西。”\n\n“将军好眼力。”西乡利通微微颔首，“此枪由西南制铳厂首席工匠全手工打造，从锻造到组装，耗时八个月。枪管钢料选用佐世鹤特产的玉钢，经反复折叠锻打而成，强度与精度俱是上品。整枪仅此一支。”她顿了顿，补充道：“臣以为，好马配好鞍，好枪当配识货之人。将军是早樱最懂火器的人，此物放在臣手里，不过是库中一器；放在将军手中，方不负匠人之心。”\n\n信长端详着手中的步枪，忽然笑出了声。“利通啊利通。”她摇摇头，语气里带着几分玩味，“你这份礼，比那些送金送银送古董的有意思多了。”她将枪轻轻放回锦盒，起身走向门口。经过西乡利通身边时，丢下一句话："
 SKR_sankin.10.a: "“走，陪本将军去演武场。”"
 SKR_sankin.11.t: "鹿儿藩的参勤交代（三）"
 SKR_sankin.11.desc: "安土御所·演武场靶场。\n\n幕府的演武场位于御所西侧，平日供旗本众练习弓马铳炮之用。今日信长一声令下，场中便清得干干净净，只留下靶位、沙袋与几名负责装填弹药的新选组队士。局长近藤勇亲自在场边侍立，见将军与西乡联袂而至，微微欠身，目光在西乡利通身上停留了一瞬，便又垂了下去。\n\n信长已经换了一身利落的窄袖装束，长发扎起，看上去倒比在御殿中年轻了几分。她拎着那支“西南之星”，走到射击位前，侧头看了看立在三十间外的靶子。“就这个距离？”“将军随意。”西乡利通站在一旁，双手笼在袖中，神色淡然。信长哼了一声，举枪抵肩。她的动作行云流水——据枪、瞄准、呼吸，一气呵成。扳机扣下的瞬间，枪身微微一震，清脆的枪声在靶场上空回荡。硝烟未散，远处报靶的旗手便挥动小旗——“中靶！八点！”\n\n信长皱了皱眉，显然对这个成绩不太满意。她拉开枪机，弹壳叮当弹出，第二发子弹已经上膛。这次她多花了些时间调整，第二声枪响之后——“十点！中靶心！”她嘴角微扬，将枪放下，回头看向西乡利通。“你也来。”\n\n西乡利通没有推辞。她接过“西南之星”，在手中掂了掂，忽然笑了。“将军可知道，臣年轻时的‘西南第一神铳手’之名，是怎么来的？”“怎么来的？”“老藩主教的。”西乡利通举枪，“他说，铳是武士手臂的延伸，心不稳则枪不准。战场上瞬息万变，唯有沉着者能活到最后。”她没有刻意瞄准，举枪便射。\n\n枪声响起。“十点！中靶心！”信长挑了挑眉。西乡利通连续射击，枪声如连珠炮般响起，每一次拉杆、上膛、击发的动作都精准得像机械一样稳定。五发打完，报靶的声音接连传来——“十点！十点！九点！十点！”“好！”信长忍不住拊掌。西乡利通放下枪，微微欠身：“献丑了。”\n\n信长接过枪，抚摸着温热的枪管，忽然意味深长地看着她。“西乡，你觉得本将军的枪法如何？”“将军天赋过人。”西乡利通答得中肯，“若勤加练习，不难登峰造极。”“天赋过人……”信长重复了一遍这四个字，忽然笑了笑，笑容里带着一丝不易捕捉的苦涩，“本将军这辈子，被人骂过‘白痴’，被人叫过‘异类’，倒是很少有人夸本将军‘天赋过人’。”她将枪递给近藤勇收好，拍了拍手上的灰，缓步走向靶场边的歇息处。西乡利通跟在身后，两人并肩而立，望着远处靶场上尚未散尽的硝烟。沉默片刻，信长开口了：“北方的战事，你怎么看？”"
 SKR_sankin.11.a: "她的语气听起来随意，但西乡利通知道，这个问题绝不随意"
 SKR_sankin.12.t: "鹿儿藩的参勤交代（四）"
 SKR_sankin.12.desc: "“将军指的是……”“乌塔利。”信长用了这个词，声音压得很低，“本将军已经得到密报，他们正动员各部攻打北海镇守府驻地，还用着…罗西亚人的枪。——”她顿了顿，冷笑一声，“打着’民族自决’的旗号，干的却是分裂早樱的勾当。”\n\n西乡利通沉默了一瞬。“将军是怀疑，罗西亚在背后推动？”“不是怀疑。”信长转过头，直视她的眼睛，“是确定。先皇病重的消息传出去之后，列强们就开始蠢蠢欲动了。复古派也好，共和派也罢，都是他们扶植的对象。”她冷笑一声：“他们以为本将军老了，不中用了。”“将军春秋鼎盛。”\n\n“本将军知道。”信长不客气地打断她，“但仗已经打了一个月，镇守府的驻军伤亡不小，再拖下去，北海怕是保不住。”她顿了顿，“本将军问你——若是乌塔利的暴动持续下去，鹿儿藩能出多少兵？”这个问题来得直接，不留余地。西乡利通沉默了片刻。“鹿儿藩西南偏远，调兵北上，最快也要一个月。”她缓缓开口，“而且……臣以为，乌塔利人的事，不能只用武力解决。”信长的眼神锐利起来。\n\n“数百年来，乌塔利人世代生活在北海，幕府设置镇守府后，他们的牧场被收归，渔场被限制，习俗被禁止。他们有怨气，这很正常。”西乡利通的声音平静，像是在陈述一个客观事实，“罗西亚人正是利用了这些怨气，才能煽动他们发起叛乱。若仅凭武力镇压，今日平了乌塔利，明日列强换个旗号，又能在别处点起火来。”\n\n“所以你的意思是，本将军应该让步？”“臣的意思是，”西乡利通转过头，与信长对视，“将军当年救南方，是因为南方关乎早樱的命脉。如今北方的问题，同样关乎早樱的根基——倘若北海陷于敌手，罗西亚人的铁蹄就能直逼虹咲。但若只是派兵平叛，而不解决乌塔利人的苦处，就算打下来，也难以守住。”\n\n信长盯着她看了很久。风从靶场吹过来，卷起细碎的沙尘。新选组的队员们远远站着，没有人敢靠近。“你说得倒是轻巧。”信长忽然笑了，笑意却不达眼底，“堂堂猛将‘西南之虎’，本将军问你能否派兵增援，你却跟本将军讲了一通治国道理。”“臣不敢欺瞒将军。”西乡利通垂首，“将军是臣的恩人，臣的立场，从来都是鹿儿藩与早樱的安稳。将军若行正道，臣自当为将军前驱；将军若有失德……臣也会进谏。”“进谏。”信长咀嚼着这两个字，忽然叹了口气。"
 SKR_sankin.12.a: "“你知道上一个跟本将军说‘进谏’的人，现在在哪里吗？”"
 SKR_sankin.13.t: "鹿儿藩的参勤交代（五）"
 SKR_sankin.13.desc: "西乡利通没有接话。“他被本将军贬到了边远之地，种了十年的地。”信长淡淡道，“后来本将军想起来，又把他调回来了。他倒是不记恨，回来之后还是那副老样子，该说的一样不少。”她转过头，望着远处暮色初临的天际线。“本将军身边的人，要么怕我，要么求我，要么等着看我笑话。”她的声音低了下来，像是在自言自语，“敢说真话的人，倒是越来越少了。”\n\n西乡利通沉默着，没有接话。“不过你说的事，本将军会考虑。”信长忽然话锋一转，恢复了方才的干脆利落，“北方乌塔利人的安抚要做，但底线不能退。谁要是敢在这个时候分裂早樱——”她顿了顿，目光冷厉，“本将军不介意让他们见识一下，什么叫做天下布武的‘铁腕’。”她转过身，拍了拍西乡利通的肩膀。\n\n“今日这枪，本将军就收下了。”她难得露出一丝真心的笑意，“回去告诉西南制铳厂的工匠，他们的手艺，本将军很满意。”“臣代工匠们谢过将军。”西乡利通躬身行礼。信长走了几步，忽然又停下来，头也不回地丢下一句话：“下次来京州，不必等到参勤交代的时候。”西乡利通微微一怔，随即欠身。“臣，遵命。”\n\n暮色渐浓，演武场上只剩下靶子孤零零地立在那里，上面密密麻麻的弹孔清晰可见。远处官邸的灯火一盏一盏亮起来，将这庞大的建筑群笼罩在一片朦胧的光晕之中。西乡利通站在原地，目送将军的身影消失在回廊尽头。她的手指无意识地摩挲着腰间的刀柄，脑海中回想着方才的每一句话。\n\n将军比上次见面时又瘦了一些。"
 SKR_sankin.13.a: "她把这个念头压下去，转身，朝相反的方向走去"


 SKR_flavor.1.t: "相遇（上）"
 SKR_flavor.1.desc: "京州是一座充满奇迹的城市，只要有志气和毅力，任何人都能闯出一番成就——曾几何时，井深大也是这么想的。但现实终究不是黑板和草稿纸上能用推导得出唯一解的问题，社会里要算计的东西比想象的还要多得多。\n\n酒精的味道在嘴里蔓延，这是今天第几杯了？脑袋有些晕晕的，可那放在一旁的辞职信却依然扎眼的狠。最后一位，那些当初跟着她一起出来创业的同学彻底走了个干净，没人想继续再在一间狭小逼仄的车间里干着毫无未来的事业。她一点儿也不埋怨那些抛下她先一步离去的战友，只恨自己没能带着他们走出一片天。\n\n“唉”两声叹气声重合在了一起，井深大下意识的扭头看去，一旁坐着的是一位斯斯文文的年轻女性，虽然惆怅，但眼睛却还是在闪闪发亮，一副尚未经过社会毒打的样子。二人对视，先一步撇开的是对头的女性，只是她的视线在最后还是不自主看向摊在桌上的辞职信，显然刚刚自己那副丢脸的样子被看了个精光。想到这里，烦躁更上一层楼的井深大又猛灌了一口啤酒，然后不出意外的呛了口狠的。\n\n“人怎么能倒霉成这样？”井深大有些无奈的想到，就在想用袖口擦拭嘴角的浮沫时，一旁的女性先一步递来了手帕。“啊...谢谢。”简单擦了擦后便将手帕还了回去，却又不禁上下扫视了眼前的家伙几眼，她身上有着年轻毕业生有生涩感，但举手投足间却相当从容，显然是有着很好的家教。\n\n“是京州大学的毕业生吗？”井深大试探性的想要打开话题，而对方也很快作了回应。“对，京州大学物理系。”“诶？还是学妹啊。”“原来您是学姐吗，失敬失敬！” 同样的出身让二人间的隔阂消失了大半。少女挪了个位置，坐到了那位先走一步的同学的座位上。“学姐是在搞什么研究吗？看你闷闷不乐的样子，是撞到瓶颈了吗。”“这个啊...这可能是个很长的故事了。”酒精的作用以及孤身一人的彷徨让井深大不免松开了话舌，她确实需要一个好的倾诉对象了。而且，让年轻人听一听社会人的经验也不是坏事。"
 SKR_flavor.1.a: "再来两份鸡肉串，还要杯啤酒谢谢"
 SKR_flavor.2.t: "实验"
 SKR_flavor.2.desc: "“咳咳咳...井深你这家伙，在搞些什么啊？”今天上午一事无成，跑了三家银行没能换来任何资金支持的盛田昭夫烦躁的推开了自家会社的大门，然后便被扬起的灰尘刺激的直咳嗽。想都不用想，这就是井深大的好戏！ “啊，盛田你回来了，正好过来看看这些东西。”一身的西装弄的一身灰，但这个科技狂显然完全不在乎这一点，正乐此不疲的把箱子里的东西一一搬到已经十分拥挤的地面上，果不其然，这些也都是从黑市弄来的廉价，但却不知安全和可靠有几何的神秘原材料。\n\n“上次我帮你排查了二十个咒语里的问题后你说要请我吃鳗鱼饭，我到现在都没见着，这次又打算怎么请我什么。”盛田昭夫将顺路捎来的便当放到了井深大的身边，从昨天忙活到现在一口饭没吃的井深大几乎是立刻就掀开盖子，大快朵颐了起来。然而尽管嘴里吃个不停，但手上的勾勾画画依然没停，见此盛田昭夫也只能跟井深大坐在一起，帮着他处理这些新诞生的奇思妙想。 放在最上头的是一个正正方方型的小机器草案，设计的像是往轻便的方向靠，但围绕在草图周围的计算公式证明它绝非什么小道具。“你说，如果这个国家的每个人都能吃饱饭，是不是就不会有战争了。”盛田昭夫有些意外的看向这个满脑子只有逻辑的客观真理的理工女，她什么时候会想着操心这种国家大事了。“我不这么认为...但至少会比没吃饱饭要幸福的多。”\n\n“那为了幸福，人人都会努力吃饱饭，而我要创造的就是让每个人都能便宜吃饱饭的奇迹，当然，每个人都要付费购买。”将最后一粒冷掉的大米送到了嘴里后，井深大把空饭盒随手一扔，说出了像是宣言，但却更像是预言的话。 盛田昭夫没有搭话，而是将视线看向了另一张更加亲切和熟悉的方案，从赚钱的角度来看，比起从农民身上掏钱，还是从城市住民身上来钱更快些，而谈及城市经济，就注定离不开偶像们，从有钱人身上掏钱或许比穷人来的更快些。 “唉...”叹了口气，盛田昭夫伸手揩去了这雄心勃勃的学姐嘴角边上的米粒。恐怕二人要围绕各自的方案又要辩驳个三天三夜了。"
 SKR_flavor.2.a: "但盛田昭夫坚信自己的音乐能够取得成功"
 SKR_flavor.2.b: "但井深大还是一如既往打动了自己"
