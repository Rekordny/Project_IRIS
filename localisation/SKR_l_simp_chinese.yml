 SKR_sankin.7.t: "坂东藩的参勤交代"
 SKR_sankin.7.desc: "“核算无误，这是坂东藩上半年的账目明细。”市谷有咲规规矩矩地跪坐在桌前，将文件递了过去。虽然带着熬夜的黑眼圈，但她依旧保持着礼节。毕竟，坐在她面前的可是那位征夷大将军。信长接过报表，随意翻看了几页，嘴角勾起一抹饶有兴致的笑意：“听说你们南方最近流行一种叫‘乐队’的东西？用西洋乐器自己伴奏自己唱，这种新潮东西倒是对我胃口。”听到信长夸奖乐队，有咲的脸微微红了一下，有些不好意思地撇开视线：“啊……那个，其实也没什么大不了的，就是我们藩主……凭着一腔热血瞎搞出来的东西罢了。”\n\n“瞎搞能弄出这样的阵仗，也算是种才能了。”信长轻笑了一声，但随即，她的眼神中多了一丝深意，“不过，比起台面上的热闹，你们南方最近在暗地里也不太平啊？”有咲愣了一下，微微坐直了身子。“攘夷志士。”信长不紧不慢地吐出这四个字，“桂小太郎，还有那个叫坂本辰马的商贩。这帮打着共和旗号的家伙，最近在南方诸藩可是相当活跃，听说还建立了不少地下据点。”\n\n听到这两个名字，有咲的脑海中瞬间闪过某个经常潜入藩邸、单方面握着香澄的手高喊“维新同志”的长发男子形象。但表面上，她只能强装镇定地揉了揉隐隐作痛的太阳穴：“确实……那些人不仅行踪诡异，还自顾自地把香澄当成什么维新旗帜，真是给人添乱。不过请将军大人放心，我们坂东藩始终致力于驱逐这些危险分子，绝不会让他们影响到地方治安……”\n\n“那么，问题就来了。”信长用审视的目光看向有咲，“暗处有这群乱窜的耗子在搅局，明面上，你们却推举了一个只会弹吉他的单纯小女孩去竞争神皇之位。内忧外患，你们南方能行吗？”\n\n面对这番质问，和室里的空气安静了几秒。有咲最后只是有些无奈地叹了口气，随后抬起头平静地说道。“……我们相信她就行了。剩下的麻烦，我们会想办法解决的。”\n\n信长凝视了这名少女片刻，随后靠回椅背上，发出一阵爽朗的大笑。\n\n“哈哈哈哈哈！原来如此！不讲道理的信任吗？倒也不坏！既然如此，就让我好好见识一下你们南方的觉悟吧。退下吧。”\n\n“是，多谢将军大人。”有咲松了一口气，恭敬地行了个礼，带着文件退出了房间。"
 SKR_sankin.7.a: "光与影交织的南国"
