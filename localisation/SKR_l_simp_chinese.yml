 SKR.45.desc: "显然，幕府颁布的戒严令甚至在天领内部都难以完全执行，北方四藩更是视其为无物。一场叛乱即将到来，此事人尽皆知。昔日服从于织田木瓜诸将在局势明朗之前皆隔岸观火，但其中也有可以拉拢的对象——尤其是受过信长大恩的革新派们。如果能将信长亲军拉拢至幕府麾下，我们便胜券在握，但是代价呢？"
 SKR.45.a: "敌人不嫌少，朋友不嫌多"
