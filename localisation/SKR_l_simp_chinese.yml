 SKR_sankin.6.t: "虹咲藩的参勤交代"
 SKR_sankin.6.desc: "七月的京州，闷热得连知了都懒得叫唤。两位少女踏入了房间，走在前面的粉发少女举止端庄，而跟在她身后的黑发少女，则正好奇地四处张望。“哟，这不是虹咲的上原国守吗？大热天还从气候更舒适的北方赶来，实属劳烦了。”\n\n“虹咲藩上原步梦，拜见将军大人。”步梦规规矩矩地行了个礼，随后将报告递上，“这是本藩年度财政报表与活动记录，请将军过目。信长随意翻了两页报表，不由得挑了挑眉：“有别于其他藩国，你们这种各自为战的‘独立偶像’模式看似松散，财政收入却出奇亮眼。能把一群个性强烈的小姑娘糅合到一起，没想到你还挺深藏不露的嘛。不过——”信长的目光越过步梦，落在黑发少女身上，“真正写下这些企划的，是你身后这位名叫高咲侑的孩子吧？”\n\n被点到名字的侑眼睛一亮，上前一步激动地说：“不是的！是因为步梦和大家本身就非常闪耀！我只是想在最近距离支持她们，看着她们而已！啊，说起来，新闻里冲田小姐拔刀时的样子也超帅气呢！”“……？”一旁的冲田总司愣了一下，似乎没料到自己会在这种场合被女孩子唐突表白。信长则像发现了什么有趣的玩具一样，打趣地说道：“既然高咲你这么懂得欣赏人才，干脆别回穷苦的北边了，留在这如何？我可以把整个礼乐奉行所交给你打理，再让冲田给你当贴身侍卫。”“诶？！真的可以——”侑的话还未说完，室内的气温突然从三十度高温降至了冰点。\n\n……什么情况？信长也被毫无征兆的降温整懵了。只见上原步梦的脸上依旧挂着笑容，但眼眸已经失去了所有高光，一只手死死攥住了侑的手腕。“侑…酱…？”步梦的声音虽然轻柔，却带着一种深不见底的压迫感，“你刚刚……打算答应什么呢？明明说好了，我的梦想就是和侑一起走到最后的。你不会……抛下我一个人留在京州的，对吧？”信长在心里倒吸了一口凉气，这哪是普通少女？自己要是再多说一句，这丫头绝对能现场爆发出比合众国圣铃兰联军还恐怖的破坏力！“咳咳……开个玩笑罢了。”信长干咳两声，迅速收起了恶趣味，“报表我收下了，你们……就先退下吧。”\n\n“多谢将军大人，那我们就不打扰了。”随着危机解除，步梦眼里的高光瞬间恢复，拉着还在状况外的侑退出了房间。\n\n两人走远后，只剩下心有余悸的信长和总司默默擦了擦汗。也许就在刚才，她们化解了一场将使京州化作废墟的大危机……"
 SKR_sankin.6.a: "看来京州的确不适合花心呢……"
