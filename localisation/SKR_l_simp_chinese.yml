 SKR_Ashikaga_Kazuha: "足利 一葉" #朝武芳乃（雾）
 SKR_Ashikaga_Kazuha_desc: "§C南国郡代 参议 正三位 左近卫中将 足利一葉§!\n\n早樱名门足利氏世袭南国郡代与左近卫中将一职，幕府在南方的最高代言人，麾下辖有南方诸天领及南国各藩。\n\n一葉自幼接受全套的贵族教育，师承“鹿岛新当流”，武艺高强。在继承南国郡代后顺利获得了京州公方的认可并额外获封“参议”一职。然而，位高权重的一葉实际上是一位性格奔放的剑豪，其履行南国郡代职责的方式是亲自在乡间城头巡行，以单挑或群殴的形式制服任何危害秩序的暴徒。而南国郡代的实际工作则被丢给了妹妹双葉和细川兵部大辅。\n\n随着黑沫夜的到来，幕府入不敷出，首当其冲的南国郡代手下的兵力也一减再减。一葉日常如浪人般的行事风格最终从个人喜好变为了无可奈何的必要行为，幕府的南国郡代也正一步步沦为神都二条院的笼中鸟..."
 SKR_Ashikaga_Futaba: "足利 双葉"
 SKR_Hosokawa_Yuu: "细川 幽"
 SKR_Hosokawa_Yuu_desc: "§C正五位下 兵部大辅 细川幽§!\n\n个人实力高强的南国第一号苦命人，担负着南国郡代大部分实际事务的影子郡代。\n\n精通茶道、花道、歌道、围棋、蹴鞠、料理，乃是早樱知名的文化人，在剑术与马术也颇有造诣，在辅佐足利一葉的同时还兼任足利双葉的护卫与监护人。表面上玩世不恭，只想在茶室中吟诗作对的幽一旦遇到有关足利姐妹的事情便会立刻切换为严肃的工作模式。据称，当幽在不知哪里的街头找到日常行踪不明的足利一葉时，往往会上演被称为南国第一景的主从相声。\n\n在每况愈下的早樱幕府，细川幽并不认为自己能成就何种伟业。对于她来说，她真正的职责只有在乱世中保护好足利姐妹二人而已。"
