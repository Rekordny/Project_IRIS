 SKR.51.t: "壬生狼的密谋（其二）"
 SKR.51.desc: "“小勇，行动要是失败了的话，这可是杀头的大罪。”摇曳的烛火下，山南敬助的神色里满是藏不住的担忧。近藤勇没有回话，而是视线一一扫过了在场的其他新选组干部，永仓新八、藤堂平助、井上源三郎...... 她们之中有困惑、有不安、也有跃跃欲试，但无论是谁，都没有提出反对，多年的出生入死早已让彼此之间建立起了牢不可破的信任，而近藤勇，也必须要对得起这份信任。\n\n“庆喜的野心昭然若揭，等这个叛徒把权力交出去后，神皇和那些过家家的偶像绝不会容得下我们。”土方的声音划破了沉闷的空气，红发的剑客站起了身子，环视了周围的同伴，这是所有人都心知肚明的答案。“混账庆喜，她拍拍屁股溜了把我们给落下了。”“杀了她，一切就都还有机会！”“看样子也到了翻脸的时候了啊...”\n\n引信已然被点燃，新选组的剑客们一一站起身，这次将再一次为国出征——翦灭那些背叛了早樱的叛徒。看着群情激昂的一幕，近藤勇却将视线转向了身后，在尊位之上坐着的并不是身为新选组领袖的自己，而是织田信长生前最为信任的副手，那位传奇的天才冲田总司。 从近藤勇安排完战略部署，再到如今所有人都已然做好准备，这位“众望所归”的领袖却未发一言。异样的沉默令近藤勇感到了些许烦躁，她一直不太猜得出这位少女心里究竟藏着什么心事。“总司，今晚过后你就是新的幕府将军了，会感到紧张吗？”近藤勇选择了主动打破二人的隔阂，但好在总司也并没有彻底装死到底的打算。 “啊...抱歉，刚刚一直在想些事情。”总司面露歉意的笑了笑，旋即又恢复到了那副自信长死后就几未曾消退的木讷。“小勇，我在想，我们的早樱将会变成什么样子？早樱...真的应该由只会握刀的我们来引领吗？”近藤勇不再回话，总司的问题她何尝不清楚答案？早樱将再度浴血，这次甚至不是来自敌寇，而是来自同胞间的手足相残。这是一步无法回头的坏棋，却是不得不下的一子，到头来，新选组还是没能做到守护早樱。"
 SKR.51.a: "人生百代，勿念青史"
 SKR.52.t: "壬生狼的密谋（其三）"
 SKR.52.desc: "“也只有在这种时候，近藤才会想起我啊。”芹泽鸭摇晃着酒杯，那倾世容颜脸上挂着阴恻恻的笑容，令近藤勇感到一阵恶寒。在踏进芹泽鸭的宅邸前，山南敬助就建议自己抛下逍遥系独自行动，可近藤勇最终还是选择向这位新选组的异端递来橄榄枝——新选组需要维持团结，而逍遥系的力量也是实打实的。 “事实上我在两天前就遣人送来密信，邀请芹泽阁下来府上一聚，但显然，那天您应该又在酒馆里醉生梦死了。”刻意的讥讽没有影响到芹泽鸭的从容，像是早有准备一般从衣袖里将那张熟悉的信取出，然后便像是丢垃圾一样扔到了近藤勇的跟前。“我还没有卑贱到能被一张纸呼来喝去。若是勇你没被那些闲言碎语所动摇，肯定会亲自来求我出山，毕竟当条摇尾乞怜的家犬可是阁下最擅长的事情不是么？” \n\n“那就希望阁下的牙齿，还能咬的动除了烧鸟以外的东西。”近藤勇的冷淡回应让芹泽鸭的笑意更加浓烈，在一阵低沉的笑声后，躺在榻榻米上的芹泽鸭坐直了身子，第一次正眼看向了旧日的友人。“我会如你所愿，无论是庆喜还是那些藩阀，我都会打到。“那轻描淡写的口吻下，只有近藤勇才明白她的承诺份量价值几何。确认完芹泽鸭的态度后，剩下的难题也都迎刃而解了。\n\n“再见，芹泽阁下，祝愿你有个清醒的夜晚。”言毕，近藤勇不愿再多看这位被自己亲手放出笼的野兽一眼，向着阴冷的夜色下走去。她不得不承认，芹泽鸭赌对了，令她魂牵梦绕的大争之世即将到来，而她近藤勇，将是让无辜者的鲜血洒满早樱的罪魁祸首。"
 SKR.52.a: "与虎谋皮，与魔谋易"
 SKR.53.t: "《告早樱全体国民书》"
 SKR.53.desc: "致全体早樱国民。前幕府将军一桥庆喜涉嫌与他国勾结，破坏已故幕府将军织田信长的伟大改革遗产而被勒令下野，然其野心不死，蓄谋通过政变来巩固统治。但一桥庆喜卑劣举措已被新选组发觉并粉碎，其已被正式关押，等待着一场公正而必要的审判。 然国不可一日无主，神皇年幼无力参政，新选组诸位成员将于此危难之际巩固朝政，肃清海内，誓死保卫伟大改革之遗产不被奸贼所玷污，经过与忠于国家的诸位官员内部商讨，正式推选织田大将军助手冲田总司为新一任幕府将军。"
 SKR.53.a: "荡尘涤污，重整河山，便在今日"
 SKR.54.t: "入洛"
 SKR.54.desc: "在诚字旗飘扬在京州城头的当下，担任城郊守备的传习队士们第一次见到了别的旗帜。“木下大人，那是谁家的纹章？”“二之引，是南国郡代进京了。”一袭黑衣的木下日和子接过士兵的话头，挥挥手示意关卡不得阻拦，目送着小小一队人马进入了京州城。“不管她们是来吊丧的，还是来要钱的，现在来都可没有好消息啊。”日和子望着足利双叶的背影摇了摇头。\n\n城中身着青蓝色羽织的新选组队士们有些新奇地注视着身着华服的双叶和盔甲上画着家纹的随行武士们，但双叶的贴身护卫今川鞠已经不由得把手放在了刀柄上，她从那些眼神中感受不到一丝友好。京州已经变了天，那个乐意看自己这个落魄武士踢球的织田将军，早已不在人世。\n\n踏入安土御所后，双叶向总司行了优美的一礼。坐在上座的总司没有马上回答，她眉宇间满是被时局推上风口浪尖的疲惫，而在她身旁还站着新选组的三个元老——近藤勇、土方岁三与芹泽鸭。\n\n“将军大人，南国乃幕府半壁江山，而如今南方各藩并不安分，还望将军大人能立刻拨付军费以备不测。”虽然并不情愿，即使是为了自己的姐姐，双叶还是要向面前这个浪人将军低头。\n\n总司还没来得及开口，一旁的芹泽鸭便发出一声冷笑，她毫不客气地指着双叶嘲讽道：“嚯，穿着这么华丽的衣裳，骨子里却跟那些只会唱歌跳舞的偶像一样软弱吗？算什么武士！跑到咱们北边来要饭，还真是给足利家丢脸啊！”\n\n“你——！”鞠猛地将半截刀拔出刀鞘，却被双叶伸手拦下。\n\n“芹泽的话虽然难听，但也是实情。”土方岁三也接了话茬：“北方四藩谋逆在即，幕府正随时准备平叛。现在的京州抽不出一粒子弹给你们填窟窿。等平叛结束，幕府自然有力气南下支援。”\n\n被夹在中间的总司无奈地叹了口气。她看向双叶，语气中带着一丝被几个前辈架在高台上的无力感，“总而言之……确实就是这样。幕府现在自顾不暇，实在帮不上什么忙了，双叶大人请回吧。”\n\n“既然幕府时局艰难，那我南国便不添乱了。我回去之后必定转告姐姐大人加强戒备，静待将军大人凯旋，挥师南下的消息。”双叶又行了一礼，就此向总司告辞。"
 SKR.54.a: "“那只能把门板拆下来当盾牌了”"
