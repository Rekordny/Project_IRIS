 SKR_sankin.4.t: "结丘藩的参勤交代"
 SKR_sankin.4.desc: "“唐可可小姐，看来您很擅长在报告上做文章，但华丽的辞藻和无关紧要的问题汇总，不是能带过收入存在漏洞的办法。”\n\n信长敲了敲桌子，正色看向了那穿着赛莲斯服饰的外乡人。她想到结丘藩那出了名社恐的藩主可能不会亲自到来，可她却怎么也不会想到，她会让一个赛莲斯人担任这等大位。但报告上的“诡计”被看穿并未令眼前的少女陷入慌乱，反而还令那副平静的面具换成了更加热情洋溢的款式。\n\n“在这种财路问题上刨根问题可不好哦，毕竟结丘藩给中央缴纳的税款可是一年比一年高了，都快赶上南方的藩领了，领地内的怨言也颇多，另外...织田大人应该不会跟钱过不去吧。”听闻此言，信长略有意外的挑了挑眉，她也的确不是来找茬的，幕府的权力还没有强到能影响到这些藩阀的内部，能和这些阳奉阴违的家伙和平的“五五成分”何乐而不为？而也正是有这一层无声的默契在，唐可可才能如此镇定。\n\n“呵，真会说话。”在这之后，又是几番公式化的问答，信长便打法这位新派外交官离去了。见此情形，一直未曾开口的冲田总司忍不住发问道：“信长大人，那些地下活动的报告，您不打算...唔？”信长伸手捏了捏总司的小脸，看着那半不满半疑惑的可爱少女，信长笑笑后，做起了解释：“不急，总司，现在尚在巡游期间，没必要刺激他们的敏感肌，利用一些刻意的小错来遮掩实际的目的，想必就算戳穿她们的小心思，那叫唐可可的外交官，肯定也不会承认，更何况，我们手里也的确没证据。继续保持监视就行，记得之后提醒下结丘藩的探子，要多多关注那个叫唐可可的外人。”"
 SKR_sankin.4.a: "“自以为是的贪婪家伙总会露出他们的马脚”"
