#城市介绍
 SKR_955_title: "安土御所&礼乐奉行所"
 kyoshu_city_story_desc: "京州，旧称平城，其历史可追溯至上古时期设立的北陆镇守府。该城在早樱漫长的“北陆征伐”中长期作为重要的前线要塞和补给中心存在，从建立起便与武家有着千丝万缕的联系。在南北朝时代结束后，平城作为北方神皇的临时行在被正式确立为首都，并改名京州，使得神皇彻底摆脱了南方贵族和神官们的影响。\n\n在迁都后，朝廷以赛莲斯京兆府为蓝本，历时数十年在平城旧址上打造新都，原先的北陆镇守府被扩建为京州皇居，矮墙被完全拆除改为两层城墙和要塞构成的坚固堡垒，并在城郊的安土山、岩山、天王山等地建立支城作为外围防线。时至今日，京州城依旧是早樱的权力中心，以及偶像神皇的至高舞台。"
 azuchi_city_story_desc: "安土御所位于京州皇居西侧，是织田信长聘请欧罗巴建筑师设计，于3072年动工修建的新型官邸。\n\n从外观看起来，安土御所是一座标准的传统大名居城。高耸的白漆土墙环绕四周，正门是一座气势恢宏的黑门，上刻有织田家的木瓜纹。门口站岗的也是身着羽织、佩戴武士刀的传统卫兵。走进大门，映入眼帘的是枯山水庭院、修剪整齐的黑松以及几座典型的木制平房。这里通常用来接待保守派人士、神职人员或者是进行传统的礼仪活动，维持着传统武家的体面。\n\n穿过传统的前院，一座通体由花岗岩和大理石构成的洋式建筑赫然矗立在庭院深处，它是这座建筑真正的核心。其摒弃了所有繁复的装饰，仅用一些锋利的线条与石柱构建出一种纯粹的秩序感。\n\n御所内部以一条漫长的大理石长廊作为主轴，两侧设有高大的采光窗与壁灯，直通深处的将军御座所。御座所是信长的办公室，其被设计为一个空旷的欧罗巴式大厅。这里没有传统的屏风与榻榻米，只有巨大的落地窗、堆满文件的办公桌和新奇的东洋物件。\n--------------------------------\n礼乐奉行所坐落于京州皇居外苑东侧，是管理全早樱偶像活动与事务的最高行政机构。\n\n其运作模式独立于传统的幕藩体制之外，类似于超国家的联合行会。虽然各藩拥有对领内“地方偶像”的自治管理权，但任何跨区域巡演或晋升为“全国级”存在的偶像，均须在奉行所注册并获得“金印文书”。奉行所不仅掌握着权威的全国偶像排名认定权，更垄断了包括京州演舞场在内的所有大型演舞场的赛事举办许可权。\n\n作为连接中央与地方的枢纽，奉行所负责组织四年一度的“御前试合”——先在各个大区进行地方预选，选出代表各地区的最强队伍，获胜队伍晋级进入对邦淘汰赛。最终决赛将在京州皇居内举行，由神皇亲自观赏。胜者将获得“国士无双”的称号，虽然只具有荣誉性质，但获胜藩往往能在此后四年里获得巨大的话语权。\n\n尽管织田幕府多次试图将其完全纳为喉舌，但奉行所凭借对偶像资源的绝对掌控，至今仍能在政治分裂的夹缝中维持着微妙的半自治地位。"
 ogiso_city_story_desc: "小木曾城，旧称米泽城，该城及其所属的平泽国是幕府天领中最为重要的组成部分之一。城市坐落于木曾川与长谷川两河之间的肥沃土地，与周围的两郡十四乡一起成为了京州的重要粮食来源。此外，由于织田氏的发祥地织田庄亦位于此处，平泽国始终在幕府各领中享有崇高地位。自天下一统后，幕府在此地实行“乐市乐座”和“公四民六”的政策，并长期委任嫡子或重要家臣担任守护或城代，该城得以蓬勃发展。\n\n在早樱开国后，织田信长将此地选为新军“传习队”的驻地和兵工厂厂址，两百年的平和时光就此结束。在时代的推动下，此地田园牧歌般的生活，或许即将成为历史。"
 miyako_city_story_desc: "神都，旧称海宁，早樱先民受始皇帝之命自赛莲斯东渡后为乞求海疆安宁在海边建立此城。据传说初代神皇自大结界守护神东照大权现处得到折扇一把、千早一件、神刀一柄，并由万华镜观早樱国运。之后便以“浪涛之畔，亦有皇居”预言为由正式定都于此，城市也由此改名神都。自朝廷北迁之前，神都经过多次大火和重建，并最终发展为以北城皇宫为核心的宫廷、市场以及以南城二条院为中心的城塞、军营的格局。\n\n朝廷重新定都京州后，神都依旧作为重要的祭祀场所和要塞发挥作用。自织田幕府建立起，便设立南国郡代与神都京兆大夫等职位直接管辖神都及其周围数国。然而，当第一艘合众国军舰驶入神都港后，这座以早樱海疆安宁为愿的城市又被再次推到了争斗的最前沿。在南方蓬勃的工业化运动和北方朝廷之间，充当一道脆弱的屏风…"
 touun_city_story_desc: "东云，出自塞莲斯古籍“东临沧海，云波涌起”。虽位于早樱西侧，但千年以来始终承袭此名。东云城坐落于夕山以北，东云半岛顶端，既是早樱最大的商港也是一座天然要塞。在织田氏一统早樱后，东云被纳入幕府天领并被指定为唯一对外通商港口，在历代将军的有意扶持下开始大力发展与塞莲斯的大宗海上贸易，并最终形成东云商人与京州幕府五五分成贸易利润的格局。在早樱开国后，东云港的地位不减当年，并开始逐步转型为一座工商并重的现代城市，承载着新一代早樱人富国强兵的希望。"
 numazu_city_story_desc: "沼津，早樱的渔业之都。早樱岛国全民靠海吃海，沼津能从中脱颖而出全是自然的伟力。除种类丰富的常见鱼类外，以肉质鲜美却难以捕捉闻名的海露鱼会在秋季成群洄游至沼津外海供渔民捕捞，成为此地的特产。因每年产量有限，海露鱼往往有价无市，其中的上品则会直送安土御所，出现在征夷大将军和神皇的餐桌上。除各种时令鱼类外，沼津的各种鱼类加工技术同样冠绝早樱全国，并最早发展出了集体渔业会社和加工企业，进一步稳固了其渔业之城的地位。"
 otonokizaka_city_story_desc: "音乃木坂坐落于京州南方富饶平原的中心，也是南方自京州街道上洛前的最后一站，此地祝圣铃兰丛中的地脉节点上建有早樱最大的礼乐奉行所——高坂神宫。在神宫附近出生的女孩有着近似于圣铃兰居民的玛娜亲和力，且每隔百年就会诞生一位足以改变天气的传奇巫女。在神宫之外，音乃木坂也因丰沛的地脉的馈赠诞生了早樱最为丰富的饮食文化，是全国几乎所有糕点小吃的发祥地。无论京州城头的旗帜如何变换，音乃木坂都会在巫女们的指引下期待着美好明天的到来。"
 yuigaoka_city_story_desc: "结丘城位于破碎丘陵中难得的一小片平原上，在古老的征夷战争时代，此地一度是北陆街道的终点和与乌塔利魔族战争的最前沿。如今的结丘则是一座和平的海滨城市，在西侧平安岛的保护下免受成为海防最前线的命运。古代遗留的城墙早已为了容纳更多人口被拆除殆尽，缺乏大型港口的劣势也使得结丘更加依赖陆运而非海运。在诸多不利之下，结丘的居民从未放弃，而是在此地扎根，生生不息，繁荣昌盛。而结丘的偶像巫女们相较于其他地区也多了一丝忧国忧民的色彩，不因祸福未定而踌躇不前。"
 nijigasaki_city_story_desc: "除重力读数异于早樱其他地区外，虹咲在近代几乎是和北海一样没有新闻的地方。一切命运的改变都始于此地设立了新的礼乐奉行所——虹之咲神社，这座奉行所一开始只是作为探索新的巫女偶像团体组织形式的实验品，却结出了异常丰硕的果实。在短短五十年间，出自本地的巫女数量便翻了三倍，并且以崭新的组织架构成为了早樱北方最有活力的巫女组织，并一度有竞争神皇之位的能力。然而，在京州的礼乐奉行所本部中，并不是所有人都对虹之咲神社的现状感到高兴。但假以时日，偶像们会证明自己……"
#单位/科技
 samurai: "武士"
 samurai_desc: "武士阶层诞生于七百年前的南北朝时代，经历了数百年的演变，如今是幕府依仗的精锐近战部队。他们装备有精良的甲胄与打刀，恪守对主君的绝对忠诚。虽然在军事改革后，武士在战场上的地位被他们过去所轻蔑的“铁炮足轻”所取代，但长达数年的培养周期与文武兼备的素养，依旧是其作为精锐部队的资本。即使在面对火器的劣势下，他们依然能凭意志维持阵线，是战场上最可靠的中坚力量。"
 ronin: "浪人"
 ronin_desc: "浪人是指失去主君，亦或是被迫或主动脱离藩籍的流浪剑客。他们通常只带着简单的打刀行走江湖，既惩恶扬善，也横行霸道，全凭个人心情，不受传统的武士道约束。浪人通常行动敏捷、不择手段，习惯在复杂的环境中游走，以迅雷不及掩耳的拔刀术斩杀目标。"
 miko: "巫女"
 miko_desc: "巫女起源于上古时代的祭祀传承，经历了漫长岁月的流转，如今则更多被冠以“偶像”之名。她们的培养高度依赖于个人资质与天赋，故而万里挑一。与武士相似，巫女同样需要历经长达十余年、极其严苛的培养周期。作为早樱传统的精锐力量，巫女能在野外通过歌声与自然环境产生共鸣，从而释放强大的法术；然而，在被玛娜稀薄与浓烟滚滚的近代化城市中，失去自然庇护的她们则显得不堪一击。"

