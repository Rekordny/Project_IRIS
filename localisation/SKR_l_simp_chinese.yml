#拉拉
 SKR_Kousaka_Honoka: "高坂 穗乃果"
 SKR_leader_Honoka: "莱芜神皇"
 SKR_Kousaka_Honoka_Emperor: "莱芜神皇"
 SKR_Kousaka_Honoka_Emperor_desc: "早樱第§Y八十三§!代§C莱芜神皇§!，御名§h高坂穗乃果§!。\n\n穗乃果出生于音乃藩的一个古老巫女家族，同时家里经营着藩内著名的“穗村”菓子屋，因此做得一手好点心。\n\n音乃藩是北方玛娜浓度最高的地区之一，穗乃果虽然在此之前通过偶像选战成为了音乃藩的藩主，但因为她实在不擅长处理文书和整理财政，经常偷偷跑出去玩，藩内的实际政务大多由她的队友兼好友——聪慧的园田海未和富有的西木野真姬等人辅佐。在音乃藩的百姓眼里，穗乃果不是高高在上的藩主，而是那个会在街上奔跑、会为了举办一场表演而拼尽全力的真正的开朗偶像。\n\n穗乃果拥有极强的感召力及吸引他人的能力，缪斯的成员或多或少都受其影响，其中的东条希更是说过：“和穗乃果在一起的时候自己会变得奇怪，想去对她撒娇”。有传言称，当穗乃果全意祈祷或歌唱时，其身上蕴含的玛娜之力强大到可以通过意念改变天气，但似乎并不稳定，也因此她在当地被称作“天气之子”。"
 SKR_Minami_Kotori: "南 小鸟"
 SKR_Koizumi_Hanayo: "小泉 花阳"
 SKR_Sonoda_Umi: "园田 海未"
 SKR_Hoshizora_Rin: "星空 凛"
 SKR_Tojo_Nozomi: "东条 希"
 SKR_Ayase_Eri: "绚濑 绘里"
 SKR_Nishikino_Maki: "西木野 真姬"
 SKR_Nishikino_Maki_desc: "§C正四位上 音乃国守兼民部大辅 西木野真姬§!\n\n音乃藩现任藩主、西木野家族千金、缪斯的财政大总管。\n\n西木野真姬出生于赫赫有名的西木野家族，其家族垄断着北方的尖端医疗领域。作为家中的独生女，真姬自幼便展现出令人咋舌的天赋——无论是演奏乐器、作曲还是复杂的魔导理论，她都能轻松掌握。但因其过于优秀的才华和不坦率的性格，真姬在加入缪斯之前一直是个有些孤独的“深闺大小姐”。\n\n缪斯成立后，西木野真姬口嫌体正直的自愿承担了团队的所有作曲工作，甚至多次动用自己的零花钱解决了团队的财政危机。3089年，在穗乃果作为代表参与选举后，年仅16岁的真姬便被穗乃果“硬塞”了藩主的位置。虽然她对此表现得极为不满，但为了防止那个笨蛋候选人的后院起火，真姬还是将音乃藩的财政和军备打理的井井有条。\n\n在政治上，真姬反感幕府，并非出于深仇大恨，纯粹是觉得她们“又土又无趣”，她认为，只有缪斯这样集才华与美貌于一身的存在（自称）才有资格领导早樱走向未来。正因如此，她也是北方势力的“提款姬”，每当其他藩因军费发愁时，她都会一边傲娇地谴责对方，一边默默帮忙签下巨额的项目款单。"
 SKR_Yazawa_Nico: "矢泽 妮可"
 SKR_Yazawa_Nico_desc: "§C正五位下 音乃国介 矢泽妮可§!\n\nNicoNicoNi~"
 SKR_Takami_Chika: "高海 千歌"
 SKR_Sakurauchi_Riko: "樱内 梨子"
 SKR_Matsuura_Kanan: "松浦 果南"
 SKR_Kurosawa_Dia: "黑泽 黛雅"
 SKR_Kurosawa_Dia_desc: "§C正四位下 沼津国守 黑泽黛雅§!\n\n沼津藩藩主，Aqours成员，缪斯的忠实粉丝，果皇单推人。\n\n黑泽黛雅出生于历史悠久的名门望族——黑泽家。与其他后来兴起的家族不同，黑泽家从南北朝时代开始就是当地的造船业和渔业霸主，世世代代守护着北方的古老传统和礼法。作为家中长女，黛雅接受了最为正统的“大和抚子”式教育，琴棋书画、祭祀兵法样样精通。\n\n尽管深受传统文化熏陶，但黛雅并非守旧之辈。她对海外的昂格利亚语和欧罗巴文化深感兴趣，所以在命名偶像团体时，她提议将代表水的“aqua”和代表我们的“ours”拼接，命名为“Aqours”，这一富有深意的名字得到了队友们的一致认可。\n\n在北方众多的偶像诸侯中，黛雅是“王政复古”思潮最坚定的支持者，这并非出于政治野心，而源于她内心深处对偶像的狂热崇拜。鲜为人知的是，这位一向不苟言笑的冰山美人，在私下其实是隔壁音乃藩偶像团体缪斯的狂热粉丝，更是高坂穗乃果的单推信徒。\n\n3089年，听说音乃藩要派穗乃果参与选举后，黛雅立刻动员全藩资源为穗乃果的选举造势。在她眼中，神皇的宝座非穗乃果莫属，任何试图阻碍的人，都是必须被铲除的异端。"
 SKR_Kurosawa_Ruby: "黑泽 露比"
 SKR_Kurosawa_Ruby_desc: "§C従五位 沼津国介 黑泽露比§!\n\n露比酱~何が好き"
 SKR_Kunikida_Hanamaru: "国木田 花丸"
 SKR_Ohara_Mari: "小原 鞠莉"
 SKR_Tsushima_Yoshiko: "津岛 善子"
 SKR_Watanabe_You: "渡边 曜"
 SKR_Takasaki_Yu: "高咲 侑"
 SKR_Takasaki_Yu_desc: "§C従五位上 虹咲国介兼礼乐奉行 高咲侑§!\n\n你毫无疑问是个艾玛推呢"
 SKR_Uehara_Ayumu: "上原 步梦"
 SKR_Uehara_Ayumu_desc: "§C正四位下 虹咲国守 上原步梦§!\n\n虹咲偶像同好会核心成员、高咲侑的青梅竹马，虹咲藩藩主。\n\n上原步梦出生于虹咲藩的一个普通中产家庭，与邻居家的孩子高咲侑是形影不离的青梅竹马。与那些天赋异禀或家世显赫的北方诸侯不同，步梦最初只是一个平凡少女。她最大的梦想并不是成为藩主或神皇，仅仅是“能永远和侑在一起，做大家都开心的事”。\n\n3089年，随着天下局势扑朔迷离，高咲侑决定投身变革的洪流，试图改变这个压抑的世道。为了不被走得太快的侑抛下，也为了保护总是那个满脑子热血理想的青梅竹马，步梦凭借刻苦的努力（和强大的“执念”）硬是练就了顶级的偶像歌舞，在侑的策划下，联合了多位实力强劲的独立偶像，共同组建了“虹咲偶像同好会”，并最终被推举为藩主。\n\n平日里的步梦是温柔的少女，对待同好会的成员也像姐姐一样亲切。但据传，一旦涉及到高咲侑的安全，或者发现侑对其他藩的偶像（甚至同好会内部成员）表现出过度的“花心”时，她就会进入一种名为“夹脚”的恐怖状态。但“夹脚”的具体含义为何，无人知晓。" 
 SKR_Yuki_Setsuna: "优木 雪菜"
 SKR_Yuki_Setsuna_desc: "§C従五位 虹咲国介 优木雪菜§!"
