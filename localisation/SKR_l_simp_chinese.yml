 SKR_sankin.1.t: "音乃藩的参勤交代"
 SKR_sankin.1.desc: "外面的风雪也太大了点吧，幕府的道路系统还停留在战国时代吗？”伴随一声抱怨，红发少女踏入安土御所的和室。她解下围巾，尽管嘴上抱怨，礼仪依然彰显名门底蕴。\n\n“哟，这不是我们北方的大小姐吗？新年快乐啊，西木野。”信长坐在主位，嘴角勾起玩味的笑。如果不是为了应付那帮老古董，她才不想在木屋里发呆，但眼下能有人聊聊天也不错。“新年快乐，将军大人。”真姬微微欠身，将厚厚的财务报表推到了桌前，眼神则不自然地飘向了窗外，“这是今年的税金和统购清单。请您过目，如果没问题的话我就先告辞了，预定的乐器接收可不等人。”\n\n“哎呀，难得来一趟京州，我还以为你是特意来向我这位将军嘘寒问暖的呢。”信长单手托腮，故意拖长了语调，“结果只是顺便来交个差吗？而且，说到风雪，来的时候你操纵下天气不就好了嘛。前阵子‘缪斯’不还在音乃木坂弄了个停雪‘奇迹’？”真姬立马意识到，信长指的是去年巡演时，她们在雪中演唱《Snow halation》结果顺带把雪给停了，甚至被报纸大肆炒作为神明显灵的事。白皙的脸颊顿时红透，真姬猛地拔高音量：“纳、纳尼搜类！一米哇嘎奶！（那算什么啊，完全搞不懂你在说什么！）”\n\n“别误会了！那…那只是因为九个人在特定阵型下通过演唱达成了某种玛娜共鸣而已！这…这可是魔导科学！绝对不是某些编辑胡扯的神明显灵！”紧接着，为了掩饰内心的慌乱，她拼命搬出一大堆晦涩的魔导理论滔滔不绝地解释起来。\n\n“哈哈哈哈哈——！”看着眼前拼命用术语解释“奇迹”的傲娇少女，信长忍不住拍桌大笑，这可比应付外面那些只会低头称是的幕臣有趣多了。笑够了之后，信长随手将身旁的一盒南蛮巧克力推到真姬面前，“拿去吧，这是给你们这些年轻人的新年礼物。”真姬愣了下，别过头小声嘟囔：“……谢谢将军大人，那我就勉为其难收下了。”\n\n待红色的身影离开，侍立在侧的冲田总司有些不解地歪了歪头：“信长大人，这位音乃藩主态度是否过于随意了？”“无妨，总司。”信长笑着将巧克力丢进嘴里，眼神中透着难得的轻松。然后，她望着窗外纷扬的雪花，轻笑着摇了摇头。\n\n“在这个见鬼的世道里，就让这些只想和同伴唱歌的小鸟，好好享受这新年的安宁吧。”"
 SKR_sankin.1.a: "“哼！这群傲慢的武士简直是莫名其妙！”"
 SKR_sankin.2.t: "沼津藩的参勤交代"
 SKR_sankin.2.desc: "与某位把抱怨写在脸上的大小姐不同，今日踏入安土御所的客人，展现出了教科书般标准的古老礼仪。一袭深色传统和服，步伐轻盈，沼津藩主黑泽黛雅在距离信长三步之遥处完美定格，行了个挑不出一丝毛病的大礼。“沼津藩黑泽黛雅，奉旨参勤。愿将军大人武运昌隆。”\n\n“免礼吧，黑泽。”织田信长靠在座椅上，打量了下眼前的少女，“上个月神皇驾崩，你们这些世代遵循礼法的名门想必尤为心痛吧。”“承蒙将军大人挂念。”黛雅声音平静地说道，“神皇崩御乃早樱之大恸。沼津上下正全心投入自肃悼念之中，祈愿先皇得以安息。”不出所料，她说了一嘴滴水不漏的外交辞令，说着好听，却半点有用的情报都没透露。信长轻笑一声，手指敲击着桌面：“祈福固然重要，但国不可一日无君。南方的户山香澄可是风头正劲，作为北方重镇，你们沼津的‘Aqours’不打算角逐一番吗？”\n\n空气似乎凝滞了一瞬。\n\n黛雅的眼底闪过一丝不易察觉的狂热——大选？神皇那至尊的宝座，当然只有那位如太阳般耀眼的穗乃果大人才配得上！无论如何，沼津必将为其扫清一切障碍！然而，当她重新抬起头时，脸上依旧是那副波澜不惊的冰山神情：“将军大人说笑了。沼津地处偏远，我等不过是坚守旧律的乡野渔夫。对于选举，沼津目前尚在审慎考量中，请静候佳音。”骗鬼啊！你们家明明就垄断了当地的渔业好吗…信长强忍住吐槽的冲动，不由得在心里感慨黛雅这波太极拳打得精妙：既没有宣布参选，也没透露是否推举其他人选。\n\n“哦？说的倒是蛮好听。”信长凝视了她片刻，最后摆了摆手，“行吧行吧，既然如此便退下继续你们的自肃吧。替我转告北方的诸位，在这个节骨眼上，可别弄出什么收不了场的乱子。”“谨遵将军教诲。”黛雅再次行礼，从容退下。\n\n待和室的门被拉上，冲田总司上前一步：“信长大人，这沼津藩似乎并不打算争夺神皇之位？”，信长冷哼一声，将桌上的全国注册偶像名单合上，“越是礼数周全，背地里图谋的就越大。派人看紧她们，看看究竟要耍什么花招。”"
 SKR_sankin.2.a: "完美的礼仪，深藏的野心"
