 SKR_Serizawa_Kamo: "芹沢 鴨"
 SKR_Serizawa_Kamo_small_desc: "§Y生于：§!§L3038年；早樱幕府、岛田藩岛金§!\n§Y派系：§!§C新选组-逍遥系§!\n§Y生涯：§!§L芹泽鸭出生于一个固守旧习的武士家庭。她自幼便常从家中长辈嘴里听闻那些只会唱歌跳舞的巫女偶像是怎样夺走家族领地的故事。父亲郁郁而终，芹泽鸭也不学无术，常混迹于街头，她厌恶这个软弱的偶像时代。年轻时便因多次暴力伤人而成为各藩通缉的浪人。\n3067年，世界大战爆发，已经近30岁的芹泽鸭意识到，属于自己的历史机遇来了。她与来自试卫馆的近藤勇等人组建了“壬生浪士”，她不在乎什么家国大义，只在乎哪里有仗可打、有人可杀。\n在战斗中，她那不计后果、近乎自杀式的冲锋战法，令合众国士兵闻风丧胆。\n战后，信长将“壬生浪士”收编进幕府体系，并改名为“新选组”。芹泽对此嗤之以鼻，她认为新选组正在变成幕府的看门狗。虽然因战功保留了地位，但她逐渐被排挤出核心圈子。世界大战后的二十年里，她整日沉迷于酒精，在这个和平的世道里如行尸走肉般活着。她领导的“逍遥系”成为了新选组内的法外之地——一群只听命于暴力，拒绝接受现代军纪的浪人集团。§!"
