#精神
 BDA_homeland_defense_Regiment: "乡土防卫团"
 BDA_homeland_defense_Regiment_desc: "n\n\n£BDA_homeland_defense_Regiment_bookmark\n\n\n\n\n在世界大战中合众国与罗西亚的数次登陆作战几近摧毁了坂东国本就不强的常备军，无力增援的幕府只得允许地方自发组织民间武装进行抗战以加强海防，坂东地方的财阀们便通过武装家丁与收编民团组建了乡土防卫团。\n战争的结束后防卫团循着各地的需求逐渐分化为起着类似警察职能的平户防卫团与保留较强野战战力的绫州防卫团。随着坂东乃至早樱内部矛盾的日趋尖锐，这两支队伍的命运也将发生改变......"
 BDA_industrial_revival: "工业复兴"
 BDA_industrial_revival_desc: "§p是啊 无论面对多大的暴雨§!\n§p无论经受多强的狂风一次又一次§!\n§p告诉自己 朝未来前进！§!\n§p就算昨天遭受了冷雨§!\n§p就算暴风阻挡了脚步§!\n§p就算前方没有尽头 就算前路还很遥远§!\n\n\n\n\n£BDA_industrial_revival_bookmark\n\n\n\n\n自黑沫夜侵袭早樱以来已有四年之久，在千千万万各界人士的不懈努力下黑沫夜所造成的伤口正在快速愈合。但这一切并非没有代价赤字飙升，田地荒废，污染横行。尽管如此我们依旧相信我们将走出这艰难时光......"
 BDA_trio_of_nankoku: "南国三重奏"
 BDA_trio_of_nankoku_desc: "§p循着约定来到此地，那是献给你的旋律§!\n\n\n\n\n£BDA_trio_of_nankoku_bookmark\n\n\n\n\n由于黑沫夜的影响，数次能力不足的藩阁倒台导致元气大伤的坂东诸财阀均不愿再推出自家的代理人。前藩主都筑诗船认为此刻正是从财阀手中解救坂东的最后机会，牵头各个LIVEHOUSE负责人举办了BangDream乐队挑战赛以复兴乐队文化。赛事中大显身手的Poppin'Party，Roselia，RAISE A SUILEN三支乐队火爆南国，在接下来的3089藩主选举中Poppin'Party的户山香澄拔得头筹，与她的同伴们接手了在危难中坂东。\n\n§p朝着梦想的彼岸 那一望无际摇曳着的光辉§!\n§p迈步脚步吧 勇往直前吧§!"
 BDA_black_foaming_dash: "黑沫夜冲击"
 BDA_black_foaming_dash_desc: "\n\n\n£BDA_black_foaming_dash_bookmark\n\n\n\n\n黑沫夜的冲击戳破了南国三十年来所营造的泡沫幻影，工厂接连倒闭，工人不断失业。幕府盲目裁军导致大量四处游荡的浪人使得事态雪上加霜。梦醒时分的刺痛挑动着每个人的神经，以攘夷志士为代表的激进团体声势日益壮大。此刻我们伫立与悬崖边缘，若是不能正确处理，我们就将万劫不复"