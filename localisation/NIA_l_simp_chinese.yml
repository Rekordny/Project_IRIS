 NIA_a_regime_of_failure_desc: "费利佩尼亚是一枚位处天元的弃子，也是被孤立主义者们最常提及的“合众国最失败的杰作”。地处航道正中央的费利佩尼亚是值得耗费无数生命去夺取的宝石，而自由合众国用自己的实力赢得了其他列强们占领此地的默许。然而波多利特天真的理想主义者们却试图将这座小岛打造成不同于帝制或神权国家的自由橱窗，而不只是作为一个富庶的大种植园而已。其结果便是无穷无尽的冲突和入不敷支的驻军开支。\n\n十五年已过，哪怕是最热心的殖民者也已经放弃了将她们认为完美的体制在这座岛上复现。于是她们和军舰一起远去，回到她们在彼岸的家——留下一座千疮百孔的岛屿，\n\n和一个摇摇欲坠的政府..."
