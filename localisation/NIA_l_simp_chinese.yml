#事件
 NIA.3.t: "费利佩尼亚战火"
 NIA.3.desc: "为了反抗合众国那失败的傀儡政府，费利佩尼亚义勇军已经揭竿而起。作为她们亲近的同胞，我们不能看着自由的火种就此熄灭。我们的部队已经整装待发，舰队也准备出港，为伟大的自由战士们提供一切必须的援助。"
 NIA.3.a: "为了所有人的自由"