l_english:
 ####爱丽诺####
 #党名
 bolina_party:0"波利娜·波拿巴帝国统一党"
 #人物简介
 Joan_of_Arc_desc:0 "诸天乃主之荣耀，天空乃神手之伟业。\n......白昼传达语言，夜晚传递知识\n既不会交谈也不会说话，连声音也无法听到。\n温暖之光洒遍大地，延伸到世界的最尽头。\n从天的尽头往上登，一直绕到天的尽头。\n我的终点就在此地，我的命数就在此地，我的生命就在此地。\n我的生等同于无，如同影子四处游离。\n我的弓无法依靠，我的剑也不能救我。\n谨以剩下的唯一之物，愿能守护他的脚步......\n.......主啊，此身将交由您的处置——\n绝望之后必将迎来希望！！！"
 Pauline_Bonaparte_desc:0 "出生于小岛之上的少女，凭借卓越的军事天赋进入军校，在经历了上次大战的洗礼之后对人间的苦楚深有体会。玛纳派与工业派的斗争撕裂了这个世界，而她则斡旋于二者之间，不断地寻找着能够换来永久和平的平衡点\n——她相信永久的和平终将到来，但在此之前需要先穿过泥泞与鲜血"


 #国策名
 ELN_dierciailinuodagemin:0"燃烧的鸢尾花"
 ELN_dierciailinuodagemin_desc:0"她将浴火重生"


 ELE_ele_xiaomiekejizhishangzhe:0"消灭科技至上者"
 ELE_ele_xiaomiekejizhishangzhe_desc:0"一昧的追求进步只会带来极为恐怖的倒退，他们的道路必然失败，因此我们需要阻止他们"
 ELE_ele_zhongjvzhizhan:0"终局之战"
 ELE_ele_zhongjvzhizhan_desc:0"这将是终结所有战争的战争"
 ELE_ele_heisezuozhanfanan:0"黑色作战方案"
 ELE_ele_heisezuozhanfanan_desc:0"我们的参谋部将制定针对乌斯拉尔与火车国的作战方案"
 ELE_ele_chixvnanjin:0"持续南进"
 ELE_ele_chixvnanjin_desc:0"跨过海峡，去解放南方的人民"
 ELE_ele_zhunbeiliangqizuozhan:0"准备两栖作战"
 ELE_ele_zhunbeiliangqizuozhan_desc:0"如果要继续向东前进的话，这些准备是必须的"
 ELE_ele_shouhuitielurenouzizhiquan:0"收回铁路人偶自治权"
 ELE_ele_shouhuitielurenouzizhiquan_desc:0"3075年，铁路人偶们用胁迫的手段脱离了我们的管理，这明显违反了《克莱门条约》，现在是追究她们的责任的时候了"
 ELE_ele_jingongwusilaer:0"进攻乌斯拉尔"
 ELE_ele_jingongwusilaer_desc:0"自上次大战结束以来，我们的老冤家并没有消停下来。事实上，他们的政府仍然在向人民灌输仇恨思想，如果继续这样下去的话我们将永无宁日……"
 ELE_ele_jiefangmofaguodu:0"解放魔法国度"
 ELE_ele_jiefangmofaguodu_desc:0"魔法使们组成的国家政府自始至终从未考虑过人民的真正幸福——一切都是为玛纳而服务，这纯粹是本末倒置"
 ELE_ele_cuihuijiquan:0"摧毁极权"
 ELE_ele_cuihuijiquan_desc:0"奥西娅联邦的存在是这个世界上发生的最错误的事情之一。如果这样的国家仍然存在，IRIS又怎能真正实现民主与自由呢？"
 ELE_ele_hangxiangxueyuan:0"航向雪原"
 ELE_ele_hangxiangxueyuan_desc:0"我们将穿越大海，解放彼岸的人民"
 ELE_ele_kuaguohaixia:0"跨过海峡"
 ELE_ele_kuaguohaixia_desc:0"事实证明昂格利亚的政府并没有能力领导他们的人民……"
 ELE_ele_jingonganqiao:0"进攻安琪奥"
 ELE_ele_jingonganqiao_desc:0"作为新思潮的发源地之一，安琪奥并没有很好地发挥这一优势……"
 ELE_ele_xiangdongjin:0"向东进"
 ELE_ele_xiangdongjin_desc:0"向东！"
 ELE_ele_baozhengmoliwuqizhiliang:0"保证魔力武器质量"
 ELE_ele_baozhengmoliwuqizhiliang_desc:0"应该没有人喜欢炸膛吧"
 ELE_ele_chongshenkelaimentiaoyue:0"重申《克莱门条约》"
 ELE_ele_chongshenkelaimentiaoyue_desc:0"3071年签订的《克莱门条约》明确要求了乌斯拉尔的非军事化以及火车国的非军事化，但目前的情况似乎并不是这样的……"
 ELE_ele_huanheyvgongyepaideguanxi:0"缓和与工业派的关系"
 ELE_ele_huanheyvgongyepaideguanxi_desc:0"和BC自由学院的谈判将有利于国家的团结和整合派力量的壮大"
 ELE_ele_huanheyvmanapaideguanxi:0"缓和与玛纳派的关系"
 ELE_ele_huanheyvmanapaideguanxi_desc:0"与贞德的谈判将会让她认识到只有波拿巴主义才能给人民带来幸福"
 ELE_ele_xiangfuxiangcheng:0"相辅相成"
 ELE_ele_xiangfuxiangcheng_desc:0"玛纳工坊与工业工厂的搭配将会大大提高生产效率"
 ELE_ele_wanshanbentugongyetixi:0"完善本土工业"
 ELE_ele_wanshanbentugongyetixi_desc:0"内战结束至今，我们的工业仍需恢复"
 ELE_ele_gaoxiaocanzhenyuan:0"高效参政院"
 ELE_ele_gaoxiaocanzhenyuan_desc:0"改革松散的行政机构，波利娜将组建具有最高行政裁决权的参政院，分为海军、陆军、财政、立法、内务5个小组与其共商国事"
 ELE_ele_xiaomiechouheng:0"消灭仇恨"
 ELE_ele_xiaomiechouheng_desc:0"玛纳派与工业派的对抗深深地伤害了我们的世界，这必须停止"
 ELE_ele_tishengjiaoyusuhiping:0"提升教育水平"
 ELE_ele_tishengjiaoyusuhiping_desc:0"消灭文盲对我们传播思想大有好处"
 ELE_ele_bonabawangsui:0"波拿巴万岁"
 ELE_ele_bonabawangsui_desc:0"第二次爱丽诺大革命的胜利者——波利娜·波拿巴，她将接受人们建议加冕为王，领导爱丽诺走向新的辉煌"
 ELE_ele_xinshibingfa:0"新式兵法"
 ELE_ele_xinshibingfa_desc:0"波利娜崭新的作战思路将大大提升我们部队的作战能力"
 ELE_ele_gaoxiaojingji:0"高效经济"
 ELE_ele_gaoxiaojingji_desc:0"正确的经济政策将使我们的国家繁荣富强"
 ELE_ele_tiaotiaodalutongpalisi:0"条条大路通帕莉丝"
 ELE_ele_tiaotiaodalutongpalisi_desc:0"建设贯穿全国的公路网将使我们腾飞"
 ELE_ele_weisheliliang:0"威慑力量"
 ELE_ele_weisheliliang_desc:0"这是一种非常令人恐惧的武器——我们如果不想被其摧毁的话，我们自己也得有"
 ELE_ele_xietongzuozhan:0"协同作战"
 ELE_ele_xietongzuozhan_desc:0"这百年以来，战争形态已经发生了极大的改变，我们必须调整思路"
 ELE_ele_shaixuandifanguan:0"筛选地方官"
 ELE_ele_shaixuandifanguan_desc:0"选贤举能有利于国家的安定"
 ELE_ele_bolinafadian:0"波利娜法典"
 ELE_ele_bolinafadian_desc:0"这部法典融合了有史以来全人类的思想结晶"
 ELE_ele_jidongzuozhang:0"机动作战"
 ELE_ele_jidongzuozhang_desc:0"集中优势兵力快速突击将让我们大获全胜"
 ELE_ele_chaoshijvdaji:0"超视距打击"
 ELE_ele_chaoshijvdaji_desc:0"出其不意，攻其不备"
 ELE_ele_chongjianweidaguodu:0"重建伟大国度"
 ELE_ele_chongjianweidaguodu_desc:0"爱丽诺将在波利娜领导下浴火重生"
 ELE_ele_kongzhongliliang:0"空中力量"
 ELE_ele_kongzhongliliang_desc:0"空中的作战力量不可忽视"
 ELE_ele_zhengqvminzhongzhichi:0"争取民众支持"
 ELE_ele_zhengqvminzhongzhichi_desc:0"人民的力量是无穷的"
 ELE_ele_lingligongshi:0"凌厉攻势"
 ELE_ele_lingligongshi_desc:0"快速突击，迅速取得胜利"
 ELE_ele_cezhongfangyu:0"侧重防御"
 ELE_ele_cezhongfangyu_desc:0"让他们来！"
 ELE_ele_daibuyiduan:0"逮捕异端"
 ELE_ele_daibuyiduan_desc:0"极端主义者总是给我们添麻烦"
 ELE_ele_tuijinzhimindijianshe:0"推进殖民地建设"
 ELE_ele_tuijinzhimindijianshe_desc:0"不能忽视我们远方国土上的人民"
 ELE_ele_xiushanggongfang:0"修缮工坊"
 ELE_ele_xiushanggongfang_desc:0"工业派破坏的工坊数量极为庞大……"
 ELE_ele_chenlimingzugongyexiehui:0"成立民族工业协会"
 ELE_ele_chenlimingzugongyexiehui_desc:0"民族工业协会的成立将大大提高工业的发展效率"
 ELE_ele_paoshudashi:0"炮术大师"
 ELE_ele_paoshudashi_desc:0"波利娜似乎很擅长这个"
 ELE_ele_diguojiaoyvtuan:0"帝国教育团"
 ELE_ele_diguojiaoyvtuan_desc:0"帝国教育团负责监督整个教育制度和教师资格的认定，把军事学校和技术学校置于国家管理之下"
 ELE_ele_wojilangchao:0"我即浪潮"
 ELE_ele_wojilangchao_desc:0"洪水滔天！"
 ELE_ele_xiushangongchang:0"修缮工厂"
 ELE_ele_xiushangongchang_desc:0"玛纳派在撤退时不忘摧毁了很多机床"
 ELE_ele_tiaozhengjingjizhengce:0"调整经济政策"
 ELE_ele_tiaozhengjingjizhengce_desc:0"为了适应局势的变化，这些做法都是必须的"
 ELE_ele_kuojianbingongchang:0"扩建兵工厂"
 ELE_ele_kuojianbingongchang_desc:0"只有强大的军备才能保卫和平"
 ELE_ele_chenlidiguoyinghang:0"成立帝国银行"
 ELE_ele_chenlidiguoyinghang_desc:0"在金融领域，帝国银行能够起到很好地统帅作用"
 ELE_ele_shijiededageming:0"世界的大革命"
 ELE_ele_shijiededageming_desc:0"一个新世界即将到来"
 ELE_ele_diguozuozhangcanmoubu:0"帝国作战参谋部"
 ELE_ele_diguozuozhangcanmoubu_desc:0"波利娜超前的军事思维需要和有能力的将领们进行高效的合作才能得到极佳的发挥"
 ELE_ele_quanminzhengbing:0"全民征兵"
 ELE_ele_quanminzhengbing_desc:0"只要动员起所有人，那么我们将无坚不摧"
 

