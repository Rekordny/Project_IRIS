 #新闻内容
 elinonews.1.desc:0 "爱丽诺首都帕莉丝发生了大规模交火，在中心城区的香舍丽榭大道上。两股相向而行的人潮与夹在中间的警察扭打在一起，随后子弹与魔力光束把战斗推向热兵器时代，赶来增援的宪兵队更是火上浇油。\n一发炮弹划过人们的头顶。击中了附近的居民楼，迅速升起熊熊大火，这标志着局势的进一步升级。\n波利娜·波拿巴对此表示强烈谴责，并称可能任何导致局势进一步升级的行为都要受到法律的制裁。"
 elinonews.2.desc:0 "一伙工业派激进分子冲进了爱丽诺国民议会大楼。在占领该建筑后，宣称要重启修宪会议。\n戏剧性的是，正当宪兵们犹豫是否要进入建筑时，另一伙玛纳派激进分子从窗户翻进了建筑物。也声称要重启修宪。\n随着一声剧烈的爆炸声传来,宪兵们鼓起勇气冲进了会议大厅,但只看到烧成焦炭的桌椅和模糊不清的鸢尾浮雕。"
 elinonews.3.desc:0 "这场革命迅速蔓延至整个爱丽诺。\n与上次革命不同的是，这一次是玛纳派，整合派，工业派的三方混战。\nBC自由学园领导的装甲兵起义迅速在各大城市取得响应。波利娜·波拿巴在国民议会的废墟前宣布成立紧急政府，圣女贞德则在全国各地的农村召集大量的支持者，立志拯救人民于水深火热之中。"
 elinonews.4.desc:0 "随着爱丽诺内战的结束，波利娜·波拿巴成为了第二次大革命的胜利者\n在她狂热支持者们的强烈要求下，一场隆重的登基仪式在首都帕莉丝举行。波利娜·波拿巴身着华丽的礼服缓步走上台阶，在王位之上向世人宣告波利娜帝国的成立。\n现在，整个爱丽诺都将顺着她指引的方向前行\n——希望那是一条光明的解放之路"

 #国家内容
 elino.1.desc:0 "新宪法开始正式实行，但是部分省份明确的表示将不会服从宪法。\n目前各地均爆发了大规模的示威游行，部分地区已经出现玛纳派与工业派的肢体冲突。"
 elino.2.desc:0 "两队示威团体正沿着香舍丽榭大街相向而行，把大道挤的水泄不通。据前线的警察称双方均有大量武装人员，目前治安警察已经在大道中央形成人墙，但双方的人潮仍然在不断地逼近，并大喊着口号要求警察让道。"
 elino.3.desc:0 "宪兵队搭乘机动载具迅速抵达了现场，但立刻遭到了双方的攻击。现在三股势力正在大道上搅成一团。"
 elino.4.desc:0 "治安警察很快被愤怒的人群淹没，外围前来维稳的宪兵和人群发生了交火，现在是一片混乱的情况!"
 elino.5.desc:0 "工业派激进分子冲进了国民议会大楼，并赶走了所有议员，并声称要重启修宪会议。\n目前门外的宪兵们正在确认里头有没有人携带高危武器。"
 elino.6.desc:0 "波利娜·波拿巴注意到近期军队的异动——无论如何她必须要承认的是民众的愤怒正在向军队蔓延，许多士兵的家人在近期的暴乱中丧生或是受伤\n最不妙的时刻可能很快就会到来。"
 elino.7.desc:0 "贞德·达尔克悲伤地凝视着远方升腾而起的火焰。\n她比谁都清楚,唯有牺牲与死亡能够铺就通往天堂之路。\n如果主选择了她，那么她将毫不犹豫地扛起那救世的大旗。"
 elino.8.desc:0 "四面八方的人们如潮水般涌来。\n从隐秘的树林到繁华的街道，枪声交杂着咒语。\n大革命开始了。"

