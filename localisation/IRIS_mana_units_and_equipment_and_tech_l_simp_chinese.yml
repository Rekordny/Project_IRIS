  mana_armored_airship: "魔导装甲空艇"
  mana_armored_airship_desc: "集成了运输、侦察、对空截击、对地支援能力的终极支援兵器。"
  mana_armored_airship_1: "早期魔导装甲空艇"
  mana_armored_airship_1_desc: "巨大的空中平台，既能够作为飞行部队的前进基地，也能作为运输载具使用，在必要时也能够执行对地支援任务。"
  mana_armored_airship_2: "现代魔导装甲空艇"
  mana_armored_airship_2_desc: "集成了运输、侦察、对空截击、对地支援能力的终极支援兵器。"

  sleigh_equipment: "装甲雪橇"
  sleigh_equipment_desc: "为适合雪地作战环境所开发的强化加固雪橇，在保持机动性的同时拥有一定程度的装甲防护能力，能够搭载一门支援武器兵运载多名士兵在雪地进行快速机动。"
  sleigh_equipment_1: "装甲雪橇"
  sleigh_equipment_1_desc: "为适合雪地作战环境所开发的强化加固雪橇，在保持机动性的同时拥有一定程度的装甲防护能力，能够搭载一门支援武器兵运载多名士兵在雪地进行快速机动。"
  sleigh_equipment_2: "突击型装甲雪橇"
  sleigh_equipment_2_desc: "为适合雪地作战环境所开发的强化加固雪橇，在保持机动性的同时拥有一定程度的装甲防护能力，能够搭载一门支援武器兵运载多名士兵在雪地进行快速机动。"

  stella_motar: "“星雨”1000毫米臼炮"
  stella_motar_desc: "这门口径巨大的魔导臼炮能够将一枚经过精炼的巨大炎爆晶以抛射弹道发射到空中，并在末端分裂为五十个以上的分裂弹头，能够对广域范围内的敌人降下炼狱之火。虽然部署和装填都极其费时费力，但其每一次成功射击足以弥补这些微不足道的缺陷。"
  stella_motar_1: "“星雨”1000毫米臼炮"
  stella_motar_1_desc: "这门口径巨大的魔导臼炮能够将一枚经过精炼的巨大炎爆晶以抛射弹道发射到空中，并在末端分裂为五十个以上的分裂弹头，能够对广域范围内的敌人降下炼狱之火。虽然部署和装填都极其费时费力，但其每一次成功射击足以弥补这些微不足道的缺陷。"
  stella_motar_2: "“星雨XI”1300毫米臼炮"
  stella_motar_2_desc: "这门口径巨大的魔导臼炮能够将一枚经过精炼的巨大炎爆晶以抛射弹道发射到空中，并在末端分裂为五十个以上的分裂弹头，能够对广域范围内的敌人降下炼狱之火。虽然部署和装填都极其费时费力，但其每一次成功射击足以弥补这些微不足道的缺陷。"

  mana_chariot: "魔导战车"
  mana_chariot_desc: "由高能魔导器驱动的战车，能够紧贴地面飞行，紧凑的空间足够容纳三名车组成员。除内置的防护屏障外，还有随车盾牌手提供额外防御能力。战车即使处于全速运行状态也不会产生任何颠簸，随车的术士可以如往常一般释放致命的杀伤法术。"
  mana_chariot_1: "机动魔导战车"
  mana_chariot_1_desc: "由高能魔导器驱动的战车，能够紧贴地面飞行，紧凑的空间足够容纳三名车组成员。除内置的防护屏障外，还有随车盾牌手提供额外防御能力。战车即使处于全速运行状态也不会产生任何颠簸，随车的术士可以如往常一般释放致命的杀伤法术。"
  mana_chariot_2: "重型魔导战车"
  mana_chariot_2_desc: "由高能魔导器驱动的战车，能够紧贴地面飞行，紧凑的空间足够容纳三名车组成员。除内置的防护屏障外，还有随车盾牌手提供额外防御能力。战车即使处于全速运行状态也不会产生任何颠簸，随车的术士可以如往常一般释放致命的杀伤法术。"
  
  kagurasuzu: "神乐铃"
  kagurasuzu_desc: "巫女们举行神事祭典时的必要道具，清脆的铃声将会带来奇迹，或是让人认为会带来奇迹。"
  kagurasuzu_1: "神乐铃"
  kagurasuzu_1_desc: "巫女们举行神事祭典时的必要道具，清脆的铃声将会带来奇迹，或是让人认为会带来奇迹。"
  kagurasuzu_2: "神乐福铃"
  kagurasuzu_2_desc: "巫女们举行神事祭典时的必要道具，清脆的铃声将会带来奇迹，或是让人认为会带来奇迹。"


  Hermeteic_armor: "炼金装甲"
  Hermeteic_shield: "外挂护盾"
  Hermeteic_shell: "炼金弹药"
  Hermeteic_armor_desc: "由炼金术所制成的特殊装甲，其轻如鸿毛却胜于钢铁。相比于同等重量的均质装甲，其防护能力更上一层楼。"
  Hermeteic_shield_desc: "由炼金术所制成的特殊装甲，其以额外附加装甲的形式披挂在坦克装甲之上，为坦克提供额外的防护性能。"
  Hermeteic_shell_desc: "炼金术的集大成者，其外观与普通炮弹并无区别，但其内部装药却大相径庭。由炼金术精制的炮弹装药拥有远超平均的杀伤和穿甲性能。"
##单位
  group_mana_title: "玛纳部队"
  category_mana: "玛纳部队"
  category_mana_infantry: "玛纳步兵部队"
  category_mana_artillery: "玛纳打击部队"
  category_mana_armor: "玛纳持盾部队"
  category_flying: "飞行单兵作战部队"
  category_behemoth: "战争巨兽部队"
  category_undead: "不死者"
  category_rune: "符文部队"
  Mana_Infantry_Battalion: "奥术战斗营"
  Mana_Infantry_Battalion_desc: "一种古老的玛纳军事编制，其历史可追溯至亚历山大时代。最初的奥术战斗营完全由玛纳术士组成，以密集方阵形式迎敌；而在结晶革命的浪潮推动下，这一传统编制逐步演进为更适应现代战场的协作单元——如今它以玛纳术士为核心，由持枪士兵提供火力掩护与警戒的战斗编组。这种演变是后结晶革命时代战争下的妥协，是如今玛纳国家军事单位最为常见的步兵编制，传统且高效。"
  Mana_Inferno_Infantry_Battalion: "炼狱突击术士营"
  Mana_Inferno_Infantry_Battalion_desc: "集中使用大量炎爆系法术的特殊奥术战斗营，更加注重于进攻，通常用以突破敌方防守最为坚固的阵地。他们所过之处，一切看似固若金汤的防御都会化为一片白地——那是将地狱也不曾有的惨烈景象。"
  Mana_Pioneer_Infantry_Battalion: "唤潮先遣术士营"
  Mana_Pioneer_Infantry_Battalion_desc: "以水息术辅助战斗的特殊奥术战斗营，能轻松跨越任何被视为天险的江河湖海，在登陆和渡河作战中往往作为前锋部队出现。此外，这些术士也能通过造水术在沙漠中获得独特的战略优势。"
  mana_golem_support: "魔傀连"
  mana_golem_support_desc: "隶属于师级指挥体系的战术支援单位，专门操控以土石构筑的重型魔傀（哥雷姆），为前线部队提供战术掩护与接触支援。凭借玛纳术士对大型构装体的精密操控，魔傀能够在战场上有效吸引、承受并分散敌方火力。由于其具备强大的破坏能力和显著的战场威慑效能，该单位通常被敌军列为高价值优先打击目标。"
  magic_engineer_company: "玛纳构造连"
  magic_engineer_company_desc: "隶属于师级指挥体系下的专业工程与保障单位，主要借助构造系术式执行战场工程保障任务，以完成前线工事的构筑与障碍结构的破坏，同时负责战时玛纳导具的维护和抢修，是现代工程连与维修连的雏形。"
  magic_recon_company: "水晶侦测连"
  magic_recon_company_desc: "直属于师级指挥体系下的专业侦察单位，专司前沿战场情报获取与态势感知。该部队通过操作精密的全视水晶增幅仪，实现对敌军部署、动向及战场环境的远距离实时监测，为指挥机构提供关键情报支撑。"
  magic_logistics_company: "傀儡运输连"
  magic_logistics_company_desc: "直属于师级指挥体系的战略运输单位，专门负责操控以土石构筑的重型魔傀（哥雷姆），并为其植入预设行动逻辑，使其能够自主、持续地为前线部队实施物资前送与后勤保障。凭借其高度可靠的输送能力和非传统的后勤支援方式，该单位常被敌军视为高价值战略目标，并因而成为优先打击对象。"
  magic_field_hospital_company: "牧师保障连"
  magic_field_hospital_company_desc: "隶属于师级指挥体系的野战医疗单位，由战地支援牧师构成，依托玛纳术式实施应急治疗，旨在确保伤员在安全撤离前线的同时维持生命体征，最大限度保障作战人员存活率。"
  Mana_Heavy_Magic_Guide_Battle_Battalion: "重型奥术战斗营"
  Mana_Heavy_Magic_Guide_Battle_Battalion_desc: "源于奥术战斗营的前排持盾手，该单位最初职责为展开玛纳护盾，掩护后方战斗人员；经长期战术演变，现已发展为独立编制的专业防御力量，能够通过集中吟唱方式为整个作战集群提供大规模防护屏障。"
  Mana_Breakthrough_Battalion: "魔导突破营"
  Mana_Breakthrough_Camp_desc: "魔导突破营是结晶革命中催生的一种玛纳作战单位。玛纳结晶的应用，使得施放大型术法不再完全依赖施术者个人的卓越天赋，从而实现了大规模、协同化的法术打击。与早期的奥术战斗营一脉相承，该单位仍以术士方阵为基本形态，通过集体吟唱发动强力的范围性轰击。出于维持法术稳定性与输出强度的需要，这一传统方阵结构被延续至今，并被公认为近代炮兵阵地战术的雏形与起源。"
  Mana_Golem_Grenadier_Battalion: "魔傀掷弹营"
  Mana_Golem_Grenadier_Battalion_desc: "臂力和投掷能力得到了强化的重型魔傀集群单位，不知疲倦，能够夜以继日的将手边各种可用的弹药投向敌方阵地。魔傀掷弹兵的打击精确度有待提高，但胜在易于召唤，可以在前线快速部署。"
  magic_Breakthrough_support: "魔导打击支援连"
  magic_Breakthrough_support_desc: "魔导打击连是魔导突破营体系下的专职支援单位，直属于师级指挥体系。该部队充分借鉴近代炮兵阵地战术，通常部署于二线阵地，能够在相对安全的作战位置上实施高效而精准的火力覆盖，为前沿交战部队提供持续且强大的玛纳术法支援。"
  Mana_Laser_Battalion: "魔装营"
  Mana_Laser_Battalion_desc: "魔装营是高能魔导激光技术投入实战后形成的专业化部队。该单位在编制结构上沿用了魔导突破营的体系，但显著强化了对工业国家重型装甲单位的毁伤能力。同时，高能玛纳激光的运用使其具备对抗空中机动目标的能力，因此魔装营也承担重要的战区防空任务，成为一种兼具反装甲与防空职能的多用途前线作战力量。"
  mana_laser_support: "魔导激光支援连"
  mana_laser_support_desc: "魔导激光连是魔装营体系下的专职支援单位，直属于师级指挥体系，通常部署于二线阵地，在相对安全的作战位置上完成对战场高威胁目标的斩首与区域防空任务。"
  Arcane_Knights_Battalion: "玛纳骑士"
  Arcane_Knights_Battalion_desc: "正如历史上的军事贵族，在IRIS世界中，那些拥有卓越玛纳天赋之人也曾享有崇高地位，“玛纳骑士”便是其中之一。他们并非骑马作战的玛纳术士，而是一个阶级——玛纳国度中的军事贵族。然而，随着时代推进，结晶革命的浪潮逐渐席卷IRIS，这类贵族勋衔走向没落。唯有“玛纳骑士”这一称号，仍在战争的洗礼中保留下来。如今的玛纳骑士，已演变为受过专业训练、高度精锐化的玛纳战士。若说他们与过去的玛纳骑士尚有共同之处，大抵也只剩下“拥有玛纳天赋”这唯一一点了……"
  Flying_Mage: "飞行魔导营"
  Flying_Mage_desc: "一种实验性玛纳特种部队，该部队的战术运用尚处于验证阶段。依托玛纳飞行媒介与高纯度玛纳结晶协同运作，构成具备高度机动性与战术灵活性的空中单兵集群。理论上，该部队能够在地面单位难以展开的复杂地域执行高效作战任务，并凭借卓越的空中机动能力实现关键战略目标，是当之无愧的玛纳尖兵。"
  Witches_support: "机械化航空步兵支援连"
  Witches_support_desc: "机械化航空步兵，俗称为“魔女”，乃是天空的主人，没有她们做不到的事情。"
  Witches_Battalion: "机械化航空步兵营"
  Witches_Battalion_desc: "机械化航空步兵，俗称为“魔女”，乃是天空的主人，没有她们做不到的事情。"
  elephantry: "抽象"
  elephantry_desc: "俺寻思俺是坦克"
  mana_armored_airship_support: "魔导装甲空艇支援连"
  mana_armored_airship_support_desc: "这些翱翔于天际的战争巨兽无视了常规空气动力学法则，转而利用玛纳引擎所生成的反作用力场实现升空与推进。它融合了重装甲与毁灭性火力，既能从高空全域监控战场，又可随时实施精准火力支援。舰体上搭载的无数玛纳导具为其构筑起多重防护与效能保障。是集战略运输、战场侦察、制空作战与地面打击于一身的终极玛纳兵器。"
  stella_motar_support: "“星雨”臼炮支援连"
  stella_motar_support_desc: "由精英炎爆系术士和耐高温傀儡所操作的重型魔导火力支援部队，只需要几轮齐射便可以让敌人的防御工事陷入一片火海。因其发射的集束分裂弹头宛如流星雨般落入敌方阵地，故得名“星雨”。"
  magic_field_church_support: "移动圣所"
  magic_field_church_support_desc: "随军行动的可拆卸式圣所，为士兵提供心灵抚慰的同时还有战地牧师提供必要的救护，经过圣光玛纳术净化过的圣所在紧急时刻还能直接作为病房和手术室使用。"
  magic_compass_company: "奥术罗盘"
  magic_compass_company_desc: "随军行动的精密奥术罗盘，借助星辰之力的观星术士们可以通过罗盘感知战场上任何微小的态势变动，还能做到预报天气——乃至预知不久后的未来。而其中更加少数强者还能以罗盘为媒介，将一颗陨石从星空中引导至敌人的正上方。"
  Mana_Chariot_Battalion: "魔导战车营"
  Mana_Chariot_Battalion_desc: "历史最为悠久的玛纳作战兵种之一，依照根源律法，一辆战车的成员需包括一名驭手，一名高阶术士以及一名盾牌手，并与若干辅助部队共同作战。集中作战的重型战车将对敌方暴露在开放地域的部队造成毁灭性的杀伤，是进攻作战中的矛头。"
  Wolf_Rider_Battalion: "狼骑兵营"
  Wolf_Rider_Battalion_desc: "通过旷野系魔法所驯服和强化的座狼骑兵部队，有着比普通马骑兵更加强大的冲击力和震慑力，并能在在森林地形中最大限度发挥座狼的力量。"
  Mana_Wolf_Rider_Battalion: "狼骑兵术士营"
  Mana_Wolf_Rider_Battalion_desc: "骑乘着最强壮座狼的旷野系术士部队，具有非凡的机动能力和冲击力，尤其适合于林地地区的迂回突击作战。"
  Heavy_Sleigh_Battalion: "战争雪橇营"
  Heavy_Sleigh_Battalion_desc: "乘坐装甲雪橇在寸步难行的雪地中进行快速机动的步兵单位，特制的作战用雪橇还能为士兵提供额外火力支援和补给。当然，不会有人会蠢到在热带地区使用这种装备。"
  Mana_Heavy_Sleigh_Battalion: "奥术战争雪橇营"
  Mana_Heavy_Sleigh_Battalion_desc: "乘坐装甲雪橇在雪地中进行快速机动的冰雪术士单位，雪橇在玛纳术的作用下将拥有更快的速度和突破能力。"
  necromancer: "亡灵法师"
  necromancer_desc: "跨越生与死的界限往往被视为禁忌，然而专精这一领域的唤灵术士们却将其视为世界的运行基准。恭喜你死了，现在你将获得新生——永恒的新生。"
  Luminaraian_Sentinel: "巨树守卫"
  Luminaraian_Sentinel_desc: "身躯完全由高纯度玛纳极晶组成的巨大构装体，这些高耸入云的哨卫具有一定自主意识并会忠实地执行指令，是铃兰圣座御前和神圣根源之树的最后一道防线。作为纯粹的晶体，这些巨物本身也有发动远程打击玛纳术的能力。"
  Inscribed_Colossus: "碑文巨像"
  Inscribed_Colossus_desc: "由巨岩所构成的宏伟魔傀，浑身遍布玛纳术所刻蚀而成的奥术咒文，从而让这个看似违背物理法则的造物能够奇迹般地运转。它的出现往往会让战场上临时多出一座小山，以绝对的力量碾碎眼前的障碍"
  War_Treant: "战争巨树"
  War_Treant_desc: "被玛纳术士赋予了自主意志的苍天古树，它们会将怒火投向任何敢于侵犯森林的亵渎者，并将他们的扭曲造物夷为平地，让神圣的土地归还自然。它们的树皮足以抵挡小型弹药乃至炮弹，而他们的枝杈甚至能够劈开钢铁，虽然移动缓慢但势不可挡。"
  Osseous_Dragon: "骸骨龙"
  Osseous_Dragon_desc: "由唤灵术所召唤出的巨龙，虽然已然不具备生前的强大飞行能力但依旧可以快速移动并具可短暂滞空。它们通常会出现在不死者大军的最前方，在正式交战前便用其骇人面目让敌军魂飞魄散。"
  Rune_infantry: "符文重步兵"
  Rune_infantry_desc: "携带了奥术符文的精锐步兵单位，可以通过封装在符文中的玛纳术强化其作战能力，或是在阵前释放小规模的一次性玛纳术。"
  Clone_infantry: "人造人步兵"
  Clone_infantry_desc: "由炼金术所批量制造的短命人造人和少量军官所组成的步兵单位，能够执行一些简单的防御和守卫任务。虽然难堪大用，但数量无穷无尽。"
  Runic_Colossus: "符文机兵"
  Runic_Colossus_desc: "通过大量符文和玛纳极晶组装而成的巨大战争机器，拥有有史以来最为强大防御能力和完全由符文打造的厚重外装甲，几乎能够有效抵挡任何形式的攻击。"
  alchemist: "炼金术士"
  alchemist_desc: "专精炼金技术的新时代术士，其在战场上能够有效解决那些棘手的重甲单位，挥动法杖就能将坚固的装甲变为一滩无用的铁水。"
  runic_craftsman: "符文工匠"
  runic_craftsman_desc: "能够锻造、封装、维护各种玛纳和符文设备的专业工匠，能够为装备符文或盾牌的部队提供各种必要的维修保养以维持其战斗力。"
