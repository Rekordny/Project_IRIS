  striker_units_tech: "飞行脚"
  striker_units_equipment: "飞行脚"
  striker_units_equipment_1: "飞行脚"
  striker_units_equipment_desc: "飞行脚能够最大化地发挥航空魔女的力量，兼具速度与操作性，使其成为魔女所依仗的利器。"
  jet_striker_units_tech: "喷气式飞行脚"
  striker_units_equipment_2: "喷气式飞行脚"
  striker_units_equipment_2_desc: "随着喷气式技术的发展，这种前沿科技也将被运用到飞行脚上。新式喷气式飞行脚的载重能力和航速都远胜过往产品，只要魔力消耗控制得当，魔女们作战时便能如虎添翼。"

