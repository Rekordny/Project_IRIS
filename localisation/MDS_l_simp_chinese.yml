#事件
  mds.1: "蒲公英的怒吼，还是柏霖的钢音？"
  mds.1.t: "蒲公英的怒吼，还是柏霖的钢音？"
  mds.1.desc: "帕莉丝的审计官们最近在蒙德过得并不安稳。街道上，受我们资助的“乌斯拉尔民族阵线”正高举着铁十字旗帜，抗议圣铃兰教会对经济的干预。虽然这些骚乱大多是我们暗中导演的“舞台剧”，但在爱丽诺眼中，这却是蒙德即将脱离控制、倒向乌斯拉尔的危险信号。现在，一份措辞微妙的报告已经送到了帕莉丝：如果蒙德不能获得更多的行政自主权来平息“民愤”，那么为了维持秩序，我们可能不得不允许民族主义者进入内阁。"
  mds.1.a: "我们拭目以待"
  mds.2: "蒙德的动荡：失控的缓冲带"
  mds.2.t: "蒙德的动荡：失控的缓冲带"
  mds.2.desc: "来自蒙德的秘密报告令人不安。那里的民众似乎对长期的经济监管失去了耐心，乌斯拉尔民族主义者的呼声已经盖过了圣铃兰的祷告声。如果我们继续坚持高压统治，蒙德可能会直接爆发亲乌革命，彻底变成柏霖的附庸；但如果我们退让，蒙德的独立倾向将再也无法遏制。"
  mds.2.a: "为了稳定，给予他们所需的“自由”。"
  mds.2.b: "圣铃兰不接受威胁，加强边境管制！"
  mds.3: "狐狸的胜利"
  mds.3.t: "狐狸的胜利"
  mds.3.desc: "不出所料，帕莉丝那些优雅的女士们终究还是害怕机油的味道沾染她们的裙摆。她们签署了新的自治协议，撤回了部分审计官，并承诺不再干涉我们的内政。虽然她们在回信中反复强调这是“为了大局的仁慈”，但我们很清楚——这是蒙德用恐惧换来的战利品。"
  mds.3.a: "我们拥有了更多的力量，无论是对付爱丽诺，还是乌斯拉尔民族主义者"
  mds.4: "玩火自焚的边缘"
  mds.4.t: "玩火自焚的边缘"
  mds.4.desc: "我们的讹诈似乎踢到了钢板上。爱丽诺非但没有让步，反而指责我们“勾结外部势力”，并加强了对边境的锁闭。街头上的那些民族主义者现在真的开始愤怒了，而这种愤怒正逐渐脱离我们的掌控。既然和平的敲诈行不通，也许我们真的该去柏霖那边，找点更沉重的东西来防身了。"
  mds.4.a: "哼，聪明"
