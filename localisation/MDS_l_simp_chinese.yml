#决议
  MDS_Land_of_poetry_and_pastoral_songs: "诗与牧歌的国度"
  MDS_Land_of_poetry_and_pastoral_songs_desc: "群山和广袤的平原间，§C自由之风§!携着§G蒲公英§!的气息吹拂过§B果酒湖§!，为坐落于湖心岛上的§Y蒙德城§!送去§S风神巴巴托斯§!的祝福与恩泽。\n\n自从我们占领了§Y蒙德§!之后，蒙德的独立势力从来未曾减弱过，我们必须在她们§Y壮大§!之前彻底扑灭她们的§R抵抗§!。\n\n§O蒙德独立倾向§!为：§Y[?global.MDS_Independence_tendencies_var]§!\n§C蒙德民族解放运动§!§R激进度§!为：§Y[?global.MDS_National_liberation_movement_var]§!\n§L当她们的激进度达到§!§R100§!§L时，一场§!§R战争§!§L将不可避免。§!"

  MDS_whisper_cate: "风之低语"
  MDS_whisper_cate_desc: "\n\n\n\n\n\n£GFX_MDS_whisper_cate\n\n\n\n\n\n\n\n\n风之低语在阴影中回响。爱国者们秘密凝聚力量，暗中发展军工、搜集情报、动员民众。所有成果对外隐藏，只待自由到来的那一刻，化作守护城邦的锋芒。\n\n当前拥有的风之低语点数: §Y[?.MDS_whisper_point]§!\n当前拥有的隐匿工厂数: §Y[?.MDS_whisper_mic_nm]§! --- 已使用: §Y[?.MDS_whisper_mic_total]§!\n当前生产的步兵装备数: §Y[?.MDS_whisper_inf_nm|.0]§! --- 已分配的工厂数: §Y[?.MDS_whisper_inf_use]§!\n当前生产的支援装备数: §Y[?.MDS_whisper_sup_nm|.0]§! --- 已分配的工厂数: §Y[?.MDS_whisper_sup_use]§!\n当前生产的火炮数: §Y[?.MDS_whisper_art_nm|.0]§! --- 已分配的工厂数: §Y[?.MDS_whisper_art_use]§!\n当前生产的反坦克炮数: §Y[?.MDS_whisper_ant_nm|.0]§! --- 已分配的工厂数: §Y[?.MDS_whisper_ant_use]§!\n当前生产的防空炮数: §Y[?.MDS_whisper_ana_nm|.0]§! --- 已分配的工厂数: §Y[?.MDS_whisper_ana_use]§!\n当前生产的轻型坦克数: §Y[?.MDS_whisper_lit_nm|.0]§! --- 已分配的工厂数: §Y[?.MDS_whisper_lit_use]§!\n当前生产的卡车数: §Y[?.MDS_whisper_mot_nm|.0]§! --- 已分配的工厂数: §Y[?.MDS_whisper_mot_use]§!\n当前积攒的人力: §Y[?.MDS_whisper_man_nm|*]§!\n开战后训练速度加成: §Y[?.MDS_whisper_man_train].00%§!\n"
  MDS_whisper_more_than_0: "消耗§Y1个风之低语点数§!。"
  MDS_whisper_tec: "巡风探报"
  MDS_whisper_tec_inf_and_support: "从§Y[ELN.GetName]§!窃取到§Y步兵装备和支援装备§!科技加成。"
  MDS_whisper_tec_inf_and_support_improve: "从§Y[ELN.GetName]§!窃取到§Y步兵装备和支援装备§!科技加成，以及随机另外一种科技加成。"
  MDS_whisper_tec_art_and_tank: "从§Y[ELN.GetName]§!窃取到§Y火炮和装甲§!科技加成。"
  MDS_whisper_tec_art_and_tank_improve: "从§Y[ELN.GetName]§!窃取到§Y火炮和装甲§!科技加成，以及随机另外一种科技加成。"
  MDS_whisper_tec_ind: "从§Y[ELN.GetName]§!窃取到§Y工业和工程学§!科技加成。"
  MDS_whisper_tec_ind_improve: "从§Y[ELN.GetName]§!窃取到§Y工业和工程学§!科技加成，以及随机另外一种科技加成。"
  MDS_whisper_mic: "隐匠造甲"
  MDS_whisper_mic_tt: "获得§Y1§!个隐匿工厂。\n"
  MDS_whisper_mic_improve_tt: "获得§Y2§!个隐匿工厂。"
  MDS_whisper_man: "诗酒凝心"
  MDS_whisper_man_tt: "积攒的人力: §G+[?.MDS_whisper_man_gain|*]§!。\n开战后训练速度加成: §G+[?.MDS_whisper_man_train_gain].00%§!(上限为§Y100.00%§!)。"
  MDS_add_weapon_to_stockpile: "动用隐匿武器保卫国家"
  MDS_add_weapon_to_stockpile_tt: "添加隐匿武器装备的§Y50.0%§!至库存。"
  MDS_add_weapon_to_stockpile_tt2: "添加隐匿武器装备的§Y100.0%§!至库存。"
  MDS_add_weapon_to_stockpile_180: "冷却时间: §Y180§!天"
  MDS_add_weapon_to_stockpile_180_tt: "下次可执行时间: §Y[?.MDS_add_weapon_to_stockpile_180_date.GetDateString]§!"
  MDS_weapon_more_than_one: "已生产任何种类的武器装备数§Y > 0§!"
  MDS_add_manpower: "动员爱国者保卫国家"
  MDS_add_manpower_tt: "动员已积攒人力的§Y50.0%§!。"
  MDS_add_manpower_tt2: "动员已积攒人力的§Y100.0%§!。"
  MDS_add_manpower_180: "冷却时间: §Y180§!天"
  MDS_add_manpower_180_tt: "下次可执行时间: §Y[?.MDS_add_manpower_180_date.GetDateString]§!"
  MDS_manpower_more_than_one: "已积攒的人力§Y > 0§!"
