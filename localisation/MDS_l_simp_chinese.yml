  mds_news.1: "蒙德宣布终结爱丽诺代管，独立战争爆发"
  mds_news.1.t: "蒙德宣布终结爱丽诺代管，独立战争爆发"
  mds_news.1.desc.a: "今日清晨，蒙德议会正式宣布废除与爱丽诺的所有不平等条约，升起西风骑士团旗并宣告独立。长期以来，蒙德在爱丽诺的傀儡统治下秘密进行军备扩张，利用果酒湖底和晨曦酒庄的隐蔽工厂暗中组建军队，彻底撕毁了维持数十年的非军事化协议。\n\n随着爱丽诺驻军拒绝缴械，独立战争的硝烟已在边境重镇点燃，蒙德军队展现出的强悍战力令帕莉丝统帅部措手不及。这场突如其来的反叛不仅挑战了爱丽诺在大陆的霸权，更被怀疑背后有乌斯拉尔工业势力的暗中支持，欧罗巴脆弱的和平天平已在这一刻彻底倾覆。"
  mds_news.1.desc.b: "今日清晨，蒙德议会正式宣布废除与爱丽诺的所有不平等条约，升起西风骑士团旗并宣告独立。长期以来，蒙德在爱丽诺的傀儡统治下秘密进行军备扩张，利用果酒湖底和晨曦酒庄的隐蔽工厂暗中组建军队，彻底撕毁了维持数十年的非军事化协议。\n\n随着爱丽诺驻军拒绝缴械，独立战争的硝烟已在边境重镇点燃，蒙德军队展现出的强悍战力令帕莉丝统帅部措手不及，这场突如其来的反叛挑战了爱丽诺在大陆的霸权地位。"
  mds_news.1.a: "恭听狂风的呼啸！"
  mds_news.1.b: "爱丽诺连自己的狗都管不住了？"
  mds_news.1.c: "这是可耻的背叛！"
  mds_news.1.d: "令人关注"
  mds_news.1.e: "只能相信他们的判断了"
  mds_news.1.f: "最好不要殃及我们"

#界面简介
  MDS_GATHERING_STORM_DESC:  "蒙德坐落在乌斯拉尔与爱丽诺的边境线上，虽然这里有着浪漫的骑士文化和由民间选拔的统治体系，但它在记录里可是著名的“地缘火药桶”。作为欧罗巴最推崇自由的中立区，它在3066年不幸成为了世界大战的导火索，甚至因为内部乌斯拉尔民族统一主义者的接应而在战争中数度易手。想要在这些庞然大物的夹缝中守住这份自由，光靠醇香的蒲公英酒可不够，你得准备好迎接那场注定会降临的暴风雨才行。"
  IRIS_WS_MDS_desc: "**自由的诗篇：§R蒙德§!**\n\n在§R欧罗巴§!的版图中，§R蒙德§!是一抹独特的色彩。这片土地上的居民崇尚极致的自由，这种精神深深植根于他们的血液之中。为了反抗独裁，§R蒙德§!人曾经历过漫长的斗争，并最终建立了一套独特的统治体系——由民间选拔组建§R骑士团§!。在这里，骑士精神不仅仅是贵族的专利，更是每一个§R蒙德§!公民守护家园的誓言。\n\n§R蒙德§!人热爱生活，诗歌与美酒是他们灵魂的支柱。那享誉整个§R欧罗巴§!的蒲公英美酒，曾招待过无数远方的朋友。然而，这种包容与悠闲在残酷的地缘政治面前显得如此脆弱。作为§R二十年战争§!后划定的中立区，§R蒙德§!恰好位于§R爱丽诺共和国§!与§R乌斯拉尔帝国§!这两个巨人之间。\n\n如今，和平的幻象正在破灭。随着3058年§R瓦格纳二世§!在乌斯拉尔继位，激进的民族统一主义阴云再次笼罩了§R莱茵湖畔§!。§R蒙德§!城内，那些受到煽动的§R乌斯拉尔民族主义者§!们正蠢蠢欲动，而城外，§R乌斯拉尔第一近卫军团§!的铁蹄声已清晰可闻。\n\n§R爱丽诺§!的军队虽然就在边境对面，但他们仍抱有和平解决的幻想。作为自由城邦的守护者，你是选择在废墟中坚守那份古老的骑士誓言，还是在列强的夹缝中寻找一线生机？\n\n蒲公英随风飘散之时，§R蒙德§!的诗篇是否还能继续传唱？"

