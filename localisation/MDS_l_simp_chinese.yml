#决议
  MDS_Land_of_poetry_and_pastoral_songs: "诗与牧歌的国度"
  MDS_Land_of_poetry_and_pastoral_songs_desc: "群山和广袤的平原间，§C自由之风§!携着§G蒲公英§!的气息吹拂过§B果酒湖§!，为坐落于湖心岛上的§Y蒙德城§!送去§S风神巴巴托斯§!的祝福与恩泽。\n\n自从我们占领了§Y蒙德§!之后，蒙德的独立势力从来未曾减弱过，我们必须在她们§Y壮大§!之前彻底扑灭她们的§R抵抗§!。\n\n§O蒙德独立倾向§!为：§Y[?global.MDS_Independence_tendencies_var]§!\n§C蒙德民族解放运动§!§R激进度§!为：§Y[?global.MDS_National_liberation_movement_var]§!\n§L当她们的激进度达到§!§R100§!§L时，一场§!§R战争§!§L将不可避免。§!"

  MDS_whisper_cate: "风之低语"
  MDS_whisper_cate_desc: "\n\n\n\n\n\n£GFX_MDS_whisper_cate\n\n\n\n\n\n\n\n\n风之低语在阴影中回响。爱国者们秘密凝聚力量，暗中发展军工、搜集情报、动员民众。所有成果对外隐藏，只待自由到来的那一刻，化作守护城邦的锋芒。\n\n当前拥有的风之低语点数: §Y[?.MDS_whisper_point]§!\n当前拥有的隐匿工厂数: §Y[?.MDS_whisper_mic_nm]§! --- 已使用: §Y[?.MDS_whisper_mic_total]§!\n当前生产的步兵装备数: §Y[?.MDS_whisper_inf_nm|.0]§! --- 已分配的工厂数: §Y[?.MDS_whisper_inf_use]§!\n当前生产的支援装备数: §Y[?.MDS_whisper_sup_nm|.0]§! --- 已分配的工厂数: §Y[?.MDS_whisper_sup_use]§!\n当前生产的火炮数: §Y[?.MDS_whisper_art_nm|.0]§! --- 已分配的工厂数: §Y[?.MDS_whisper_art_use]§!\n当前生产的反坦克炮数: §Y[?.MDS_whisper_ant_nm|.0]§! --- 已分配的工厂数: §Y[?.MDS_whisper_ant_use]§!\n当前生产的防空炮数: §Y[?.MDS_whisper_ana_nm|.0]§! --- 已分配的工厂数: §Y[?.MDS_whisper_ana_use]§!\n当前生产的轻型坦克数: §Y[?.MDS_whisper_lit_nm|.0]§! --- 已分配的工厂数: §Y[?.MDS_whisper_lit_use]§!\n当前生产的卡车数: §Y[?.MDS_whisper_mot_nm|.0]§! --- 已分配的工厂数: §Y[?.MDS_whisper_mot_use]§!\n当前积攒的人力: §Y[?.MDS_whisper_man_nm|*]§!\n开战后训练速度加成: §Y[?.MDS_whisper_man_train].00%§!\n\n当前全国备战状态: [MDS_whisper_ready_loc],当前§Y[ELN.GetName]§!警惕度: [MDS_whisper_ELN_warn_loc]。"
