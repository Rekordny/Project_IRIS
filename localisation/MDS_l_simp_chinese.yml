#国策本地化
  MDS_focus_1: "风息之地"
  MDS_focus_1_desc: "曾经自由的风，如今被迫沉默。为了生存，我们暂时低头。"
  MDS_focus_his_1: "风息之誓"
  MDS_focus_his_1_desc: "为求苟存，我们低下头，任由爱丽诺支配蒙德的命运。"
  MDS_focus_his_2: "城邦之盾交出"
  MDS_focus_his_2_desc: "我们放弃捍卫自由的力量，将国门敞开，任由外人踏入。"
  MDS_focus_his_2_tt: "所有部队的指挥权将移交§Y[ELN.GetName]§!。"
  MDS_focus_his_3: "资源的供奉"
  MDS_focus_his_3_desc: "风车不再为国民转动，高炉只为战争机器燃烧。"
  MDS_focus_his_4: "西风填线师"
  MDS_focus_his_4_desc: "他们称我们为盟友，却只把我们的青年当做消耗品。"
  MDS_focus_his_5: "舆论的枷锁"
  MDS_focus_his_5_desc: "诗歌不再歌颂自由，酒馆不再谈论勇气，风已彻底沉默。"
  MDS_focus_his_6: "工业区监管"
  MDS_focus_his_6_desc: "我们仅剩的工业，也成为大国战争机器的一部分。"
  MDS_focus_his_6_tt: "§Y$MDS_puppet_modifier$§!追加效果:\n贡献给宗主国的民用工厂: §R+45.00%§!\n贡献给宗主国的军用工厂: §R+45.00%§!\n地区最大工厂数: §G+20%§!\n建设速度: §G+10%§!"
  MDS_focus_his_7: "边境让渡"
  MDS_focus_his_7_desc: "以退让换安全，可安全从未降临，只换来更深的深渊。"
  MDS_focus_his_8: "无选择的战争"
  MDS_focus_his_8_desc: "我们没有宣战的权力，却有送死的义务。"
  MDS_focus_his_9: "最后的利用价值"
  MDS_focus_his_9_desc: "当我们不再有用，便被推到最前线，耗尽最后一滴血。"
  MDS_focus_alt_1: "暂敛羽翼"
  MDS_focus_alt_1_desc: "表面低头顺从，暗中积蓄力量。真正的自由，从来不在阳光下，而在暗流之中。"
  MDS_focus_alt_2: "酒馆密语"
  MDS_focus_alt_2_desc: "以酒馆与诗歌为掩护，爱国者们秘密聚集，重新点燃对自由与祖国的信念。"
  MDS_focus_alt_2_tt: "决议§Y$MDS_whisper_man$§!的效果提升: §G+50%§!"
  MDS_focus_alt_3: "旧骑士的遗志"
  MDS_focus_alt_3_desc: "召回散落四方的旧骑士，重建属于蒙德利亚的防卫力量。守护城邦的剑，不会永远折断。"
  MDS_focus_alt_3_tt: "在首都获得§Y两支精锐步兵师§!。\n部分§Y西风骑士团§!、§Y西风教会§!和§Y冒险家协会§!的角色将变得§Y可用§!。"
  MDS_focus_alt_4: "隐匠之工"
  MDS_focus_alt_4_desc: "在森林与丘陵深处，建立不被大国察觉的秘密军工，让武器在阴影中诞生。"
  MDS_focus_alt_4_tt: "决议§Y$MDS_whisper_mic$§!提供的隐匿工厂生产效率提升: §G+50%§!"
  MDS_focus_alt_5: "暗流涌动"
  MDS_focus_alt_5_desc: "清除政府内部的亲外妥协派，夺回国家意志。傀儡的枷锁，即将被我们亲手打碎。"
  MDS_focus_alt_5_tt: "§Y$MDS_Jean_Gunnhildr$§!成为副领导人，其效果为\n - $MODIFIER_ARMY_MORALE_FACTOR$:§G +10.0%§!\n - $MODIFIER_ARMY_SPEED_FACTOR$:§G +10.0%§!\n - $MODIFIER_ATTRITION$:§G -8.0%§!\n - $MODIFIER_JUSTIFY_WAR_GOAL_TIME$:§R +20.0%§!\n - $MODIFIER_COMPLIANCE_GAIN_ADD$:§G +0.05%§!"
  MDS_focus_alt_6: "听凭风引"
  MDS_focus_alt_6_desc: "正式宣告解除一切附庸关系，蒙德不再是任何人的附属。我们自由了！"
  MDS_focus_alt_7: "四风守护"
  MDS_focus_alt_7_desc: "请期待后续完整版国策树。"
  MDS_focus_alt_8: "西风之鹰"
  MDS_focus_alt_8_desc: "请期待后续完整版国策树。"
  MDS_focus_alt_8_tt: "请期待后续完整版国策树。"
  MDS_focus_alt_9: "北风之狼"
  MDS_focus_alt_9_desc: "请期待后续完整版国策树。"
  MDS_focus_alt_10: "南风之狮"
  MDS_focus_alt_10_desc: "请期待后续完整版国策树。"
  MDS_focus_alt_11: "东风之龙"
  MDS_focus_alt_11_desc: "请期待后续完整版国策树。"
  MDS_focus_alt_12: "自由的脊梁"
  MDS_focus_alt_12_desc: "工业完全自主，经济彻底独立。一个国家真正的自由，从不再仰人鼻息开始。"
  MDS_focus_alt_13: "城邦守备队"
  MDS_focus_alt_13_desc: "组建专职守护国土的守备军队，用纪律与信念，筑起城邦新的屏障。"
  MDS_focus_alt_14: "坚墙之盾"
  MDS_focus_alt_14_desc: "将边境与森林堡垒化，以地形为盾，以工事为墙，让祖国坚不可摧。"
  MDS_focus_alt_15: "游骑兵战术"
  MDS_focus_alt_15_desc: "依托森林与丘陵，发展机动、游击、防御反击的本土战术，让入侵者寸步难行。"
  MDS_focus_alt_16: "风狼装甲"
  MDS_focus_alt_16_desc: "自研专属快速轻甲战车，如风一般迅捷，如狼一般锐利，为骑士团插上钢铁之翼。"
  MDS_focus_alt_17: "西风骑士团"
  MDS_focus_alt_17_desc: "重组新时代的西风骑士团，以精锐装甲为锋，成为自由最锋利的剑与最坚固的盾。"
  MDS_focus_alt_18: "风中自立"
  MDS_focus_alt_18_desc: "彻底斩断大国施加的一切影响，在强权环伺之中，站稳属于自己的一席之地。"
  MDS_focus_alt_19: "中立之誓"
  MDS_focus_alt_19_desc: "宣布永久武装中立，以实力捍卫和平，让任何觊觎者都不敢轻易踏足。"
  MDS_focus_alt_20: "山林壁垒"
  MDS_focus_alt_20_desc: "以国土地形为天然防线，以全民意志为钢铁壁垒，本土即是永不陷落的要塞。"
  MDS_focus_alt_21: "自由之旗"
  MDS_focus_alt_21_desc: "统一国民意志，高举自由之旗，每一个公民都愿为这片土地奉献一切。"
  MDS_focus_alt_22: "风，永不熄灭"
  MDS_focus_alt_22_desc: "曾经沉默的风，如今席卷天地。蒙德以弱小之躯，站上世界舞台，成为不可侵犯的自由中立强国。风，永不熄灭！"
  MDS_focus_alt_23: "林间驿道"
  MDS_focus_alt_23_desc: "在森林与丘陵间铺设简易通路，让物资与人员能够隐秘流动，为自由的血脉埋下脉络。"
  MDS_focus_dip_0: "两强之间"
  MDS_focus_dip_0_desc: "在乌斯拉尔的钢铁与爱丽诺的圣光之间走钢丝，利用两国的敌对将自己变成双方都无法忽视的“缓冲支点”，通过这种微妙的平衡来索取双份好处。在这场巨人的博弈里，蒙德不当棋子，而是要当那张让双方都不得不坐稳的棋盘。"
  MDS_focus_dip_1: "借风破枷"
  MDS_focus_dip_1_desc: "既然二十年战争的枷锁已沉重太久，而柏霖的工业齿轮正向我们释放善意，那这股“西风”便是不容错过的契机。通过暗中深化与乌斯拉尔的“特殊友谊”，我们将借由对方的技术与投资，悄然腐蚀那些束缚发展的陈旧条款。当蒙德的自由意志借到了乌斯拉尔的钢铁之力，曾经的枷锁便不再是禁锢，而是通往真正独立之路上被风吹散的尘埃。"
  MDS_focus_dip_2: "隐秘商道"
  MDS_focus_dip_2_desc: "既然明面上的货运总是逃不开爱丽诺审计团那挑剔的目光，那我们就让浓郁的蒲公英酒香去掩盖那些‘沉重货物’的机油味吧。在圣铃兰视线之外的隐秘山道上，来自乌斯拉尔的优质钢材与军需零件正通过非官方渠道源源不断地运入秘密仓库。这不只是为了绕过那道名为‘中立’的枷锁，更是要用柏霖的工业齿轮为我们的自由意志锻造出一副坚固的内衬——毕竟，只有当诗琴背后藏着足以自卫的火枪时，我们的自由之歌才能唱得更响亮、更底气十足。"
  MDS_focus_dip_3: "虔敬之誓"
  MDS_focus_dip_4: "守护的权利"
  MDS_focus_dip_5: "荆夫古港"
  MDS_focus_dip_6: "巡礼驰援"
  MDS_focus_dip_6_tt: "我们将与友好的国家签署共同防卫协议。"
  MDS_focus_dip_6_tt1: "我们将与§Y[BGT.GetNameWithFlag]§!签署共同防卫协议。"
  MDS_focus_dip_6_tt2: "我们将与§Y[SCK.GetNameWithFlag]§!签署共同防卫协议。"
  MDS_focus_dip_6_tt3: "§Y[BGT.GetNameWithFlag]§!将与§Y[SCK.GetNameWithFlag]§!签署共同防卫协议。"
  MDS_focus_dip_7: "风龙旧墟"
  MDS_focus_dip_9: "引风窥隙"
  MDS_focus_dip_9_desc: "既然圣铃兰的审计官们总是对所谓的‘钢铁威胁’疑神疑鬼，那我们索性就为她们编织一场真实的噩梦。通过散布关于‘柏霖秘密援助’的流言，并让境内那些受雇的民族主义者在街头高喊回归帝国的口号，我们要让帕莉丝意识到：蒙德的平静并非理所当然。如果爱丽诺不肯在自治权与贸易限制上做出实质性的‘安抚’，那么这块缓冲区随时可能在莫须有的外部推力下倒向瓦格纳二世。这是一场利用恐惧进行的政治讹诈，但在爱丽诺眼中，一个因贫穷而激进化的蒙德，远比一个昂贵的、高度自治的蒙德要可怕得多。"
  MDS_focus_dip_9_tt: "如果§Y[ELN.GetNameWithFlag]§!同意我们的要求，我们的自治度等级将变为§Y$autonomy_dominion$§!。\n\n"
  MDS_focus_dip_11: "弱国之首"
  MDS_focus_dip_12: "与凶为盟"
  MDS_focus_dip_12_desc: "既然爱丽诺所谓的“代管”不过是给蒙德套上了华丽的枷锁，那我们就没必要在圣铃兰的祭坛前继续扮演顺从的祭品。当乌斯拉尔的钢铁洪流再次向东奔涌，我们要做的不是在这场两个巨人的碰撞中粉身碎骨，而是与那个被称为“凶徒”的强邻达成一份生存契约。只要柏霖的炮火承诺避开我们的城墙，蒙德就将反戈一击，在爱丽诺的后方燃起独立的硝烟。以“与凶为盟”的恶名，换取蒙德彻底脱离监护、重获主权的机会，这笔账，我们算得很清楚~"
  MDS_focus_dip_12_tt1: "当§Y[USR.GetNameWithFlag]§!对§Y[ELN.GetNameWithFlag]§!宣战时，我们将发起独立战争，并加入§Y[USR.GetNameWithFlag]§!的阵营。"
  MDS_focus_dip_12_tt2: "当§Y[USR.GetNameWithFlag]§!对§Y[ELN.GetNameWithFlag]§!宣战时，我们将发起独立战争，并加入§Y[USR.GetFactionName]§!。"
  MDS_focus_dip_14: "风花迎客"
  MDS_focus_dip_15: "果酒留香"
  MDS_focus_dip_16: "巡守的义务"
  MDS_focus_dip_17: "海防协议"
  MDS_focus_dip_18: "独眼小宝"

