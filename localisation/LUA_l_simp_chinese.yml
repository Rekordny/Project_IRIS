 LUA.11.t: "信件·终"
 LUA.11.desc: "另一组信件的最后一页，但是前面的页面已遗失\n在——已编辑——身上发现的信件\n无日期\n\n愿意谈论此事的人越来越少，这意味着研究这份记录需要格外小心。也意味着我的酬劳得加倍。\n\n绅士、情人和战士——比利如此介绍自己，随后又耽搁了故事，转头问路过的陪酒女要不要花钱跟他上床。她赶紧走开，尽可能避免眼神接触。\n\n“他们想拉我入伙，就是那马出事之后。我当时就坐那边那张桌子，他们从那个门走进来的。全场一下子死寂，除了我跟那个正咬我耳朵的娘们。我平时很警觉的你知道，但那小妞儿实在太会撩！”他肆无忌惮的笑声没人附和。“不，我第一眼瞅见的是两把老威明格步枪指着我的脸：一把是短管的，上面绑着把豁了口的刀，另一把装着血迹斑斑的长刺刀。”\n\n这个细节让我心头一动，因为我收集的其他故事里也有吻合之处。或许这个蠢货的话还真有点可信度。\n\n“于是我照常又点了一杯酒，这是我的权利，顺便打量他们。听人吹得神乎其神，其实也就那样。”他嘴里发出一声带着魅力的轻笑，但我听过太多故事了，也听过这个男人发自内心的笑声就在刚才。那声轻笑，是带着鬼气的。\n\n“他们跟我说，要么跟他们走，死人或活人都行，然后……你也看见了，我没死。实际上，有人给我递上了刚点的酒。我终于挪开视线，好把那杯美酒送到嘴边。我一仰脖干了，拔枪的速度快过他们眨眼，开枪的速度快过他们反应。”\n\n他编了个精彩的故事，但又一次被勾搭另一个打工姑娘的企图打断了。她用肘部撞了他一下，动作熟练得恰到好处，看起来像是意外，况且夜已深，他也注意不到了。我原以为看着托马斯被对兄弟俩的记忆弄得涕泪横流已经够难受了，但看着比利编织一个从容不迫、驾轻就熟的故事，只为了掩藏同样毁灭性的恐惧，更让我反胃三倍。\n\n研究员注：比利和托马斯描绘的同一拨人，画面截然不同。托马斯透露了许多关于兄弟俩的事，而比利似乎只想更多地展现他自己。"
