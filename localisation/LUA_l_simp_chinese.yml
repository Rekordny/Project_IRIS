#事件
 LUA.1.t: "一张泛黄的旧报纸"
 LUA.1.desc: "自治领议会成员——墨菲·J·福斯特，就最近关于流行病影响路易斯安那深处少数不受欢迎人群的猜测发表了罕见的声明。我们注意到,他很少对这样的闲聊发表评论,然而,正如他在即将出版的声明中承认的那样,围绕这个话题存在着一种不寻常的歇斯底里，毫无疑问，无政府主义者或民粹主义者煽动了这些，在明年大选前夕向民众播下恐惧的种子。\n\n“有不少报道称，有一种传染病，或者说是瘟疫在溪泽深处的居民中蔓延。我把这些报道称为耸人听闻的胡猜。只有那些信仰不坚定的人才会受这些流言左右。荒野刁民患上我们上等人从不担心的怪病，又不是什么稀奇事。把这种事说成是一种“急性传染病”实属无稽之谈，归根结底还是因为有些人不了解那些贱民的自然状态。情况就是这样，我不会听从那些要求关闭静水港口的呼声。善良而虔诚的朋友们请收下我的保证，真没有什么可担心的。”\n\n企业家亨瑞克·格拉夫就曾抱怨:“在我的工厂,有些工人把子虚乌有的疯病当作旷工的理由。如果放任这种无理取闹的情绪在这些没上进心的工人中蔓延那我得说，怠惰才是正在爆发的传染病!一个被谣言吓得不敢工作的工人,骨子里不过是好逸恶劳的无耻之徒!”"
 LUA.1.a: "自那时起路易斯安那便化作地狱……"
 LUA.2.t: "一封沾满泥污的信件·其一"
 LUA.2.desc: "我是约翰·海沃德·亨特，我会死于今晚。这是我第99次写下这段话。\n\n多数人不愿接受“人终有一死”这一事实。他们尝试不去想它，因为那是最阴郁的话题。\n\n但我知道我可能会死在这路易斯安那的沼泽里。这到处都是疯狂的怪物。我以前一直想来静水城，可如今我却会死在这里。\n\n我们都清楚今晚凶多吉少。所有人都有这样的感觉，以至于今晚的誓词如此简洁。\n\n在你刚进入协会，参加第一次狩猎时，就会发现猎人和猎物之间没有太大的区别。\n\n我没有任何东西可以留给我的女儿。我一无所有……"
 LUA.2.a: "除了知道一个可怕的真相……"
 LUA.3.t: "一封沾满泥污的信件·其二"
 LUA.3.desc: "我知道我会死得很难看。我也未曾奢望体面的死去。我只愿我的牺牲能挽救我的朋友们。\n\n两个月前，我们失去了枪炮诗人辛安。那晚他预感到了自己的宿命。他已跌入万劫不复的深渊，愿大地之母保佑他的灵魂。\n\n他来自遥远的大陆。我们中的大多数也来自别处。斯楠曾是一名乌斯拉尔军人，他们被称为负罪者。\n\n他是如此虔诚，却被如此称呼，让人不解。他曾向我解释，因为他们认为自己受到了诅咒。\n\n若你必将堕入地狱，你便毫无拘束。不受良心拷问，没有半点犹豫，你陷入杀戮，无畏地狱的罪罚。\n\n在猎人的一生中没有悔恨。我们都是负罪者。我们陷入罪孽，失去性命……"
 LUA.3.a: "这样做是为了保全其余人"
 LUA.4.t: "一封沾满泥污的信件·其三"
 LUA.4.desc: "在猎人的一生中，信任是昂贵的，背叛是廉价的。如果你要选择相信一个人，好好掂量一下。\n\n你的性命是你唯一真正拥有的东西。在利益面前，挚友与死敌的界限是那么模糊。\n\n最阴险的伤害莫过于背面插刀。我很幸运，我有一个为我而死的兄弟。\n\n我的女儿，我唯一的愿望是，倘若你长大后选择做和我一样的行当，你一定要记住……希望你能找到一个愿为你负罪，为你而死的人，这是我唯一的愿望。\n\n以手足兄弟的名义，共饮黄泉。"
 LUA.4.a: "这一杯敬猎者，这一杯敬被猎者"
 LUA.5.t: "信件·其一"
 LUA.5.desc: "在——已编辑——身上发现的信件\n无日期\n1/6\n\n今天给你打听到点东西。趁我还没忘掉细节，赶紧给你写下来，不过得下周才能寄出去。昨晚我和托马斯扎营，我故意没怎么吭声。有些人就爱听自己瞎咧咧。不用搭腔，沉默就行。所以咱俩围着火堆坐着，他就开始叨叨了。把兄弟几个那事儿全抖出来了。\n\n“咱以前可不兴三人一队去打猎，你知道吗，”他说。“那都是托了那哥儿几个的福。”咱们那第三个队友早睡死过去了。\n\n“哪几个兄弟？”我问他，其实心里门清。\n\n“你没听过这故事？”他顿了顿，朝火里啐了口唾沫。坐舒坦了，开始讲故事。压根没等我答话就又开了腔。\n\n“以前一直都是两人。一份契约，两个猎人。我也不知道为啥，反正都这么干。你也可以单干，当然，要是活腻歪了的话。现在也行。但通常都是俩人。就一个能信得过的，要真能信得过，你背后就多了双眼睛。为啥这样，说法多了去了。什么两人誓言啦，镜子啦，什么诅咒啦，还有对双胞胎的故事。得嘞。我分不清真假，反正就是没人那么干。结果来了这么仨，根本不鸟这规矩。直接开始三人一队开干。”\n\n他住了嘴，盯着火，不作声，眼神飘远了。“刚开始还行。干成了好几票。也结了不少梁子。人都觉着不公平，可多数人还是迷信那个‘三’字，不敢学。怕遭报应。后来看，还真怕对了。不管那哥儿几个招来了啥，他们自个儿扛了雷，打那以后，咱就能三人一队了。不过最后他们也离疯不远了。完蛋前，其中一个买了匹马，见鬼的还漆成绿的。说是能转运。”\n\n他顿住，摇着头，像在回想。"
 LUA.5.a: "..."
 LUA.6.t: "信件·其二"
 LUA.6.desc: "在——已编辑——身上发现的信件\n无日期\n2/6\n\n故事到这儿，我一直没吭声。那匹绿马的事儿，谁没听过。扎眼得像头死猪。那马居然没事儿，我跟你说了这儿其他马啥德性了吧？半死不活，哼哼唧唧，一叫唤就把那些梦魇玩意儿招你身边。没准真是魔法呢，谁知道。哈！哦，你知道我不是那意思。这世道是邪性，可没啥魔法。要真有，咱也不至于这么惨。\n\n托马斯讲得正来劲儿。那张熊脸跟帽子似得扣他脑袋上。我真想揍他。但没揍，反而让他再多讲讲那几个人，好让他继续。\n\n他说，“那哥儿仨，脾气秉性天差地别。有马的那个，枪法准，爱用把老式的军剩威明格活门步枪。能把牧师的‘马甲’给打下来。高个子那个，是条好猎手。故事讲得好，也不贪杯。要让我妈跟他走我可不敢，但就猎手而言，在咱这群人里算好的了。”\n\n他顿了顿，抱起膝盖上的酒瓶灌了一大口。看来也没多清醒。一滴都没让我。我等得不耐烦，不过他很快又讲上了。\n\n“老三是个赌徒。有回打牌赢了我十块钱，他那俩兄弟就光看着笑。他不缺钱，可还是收下了。不过那都是事儿还没糟透的时候。到最后，没一个人笑得出来，没错。连那匹绿马的事也笑不出来了。"
 LUA.6.a: "..."
 LUA.7.t: "信件·其三"
 LUA.7.desc: "在——已编辑——身上发现的信件\n无日期\n3/6\n\n“那匹该死的绿马，等它肠子绕着自己脖子的时候，可一点都不好笑了。绿漆，配着红血——活像魔鬼的圣诞树。惨不忍睹，它主人的尸首就绑在它背上，跟剩下的肠子缠一块儿。说不准他俩咋死的。不像是人干的，可也不像沼泽里那些玩意儿对付猎人的手法。我知道是因为我自个儿找着他的。”\n\n托马斯停了，又猛灌一通，只喃喃自语。我用靴尖捅了他一下，才把他拉回来。他脸上可没了刚讲故事那高兴劲儿。他眼里的神色让我信了他。那见鬼的眼神，装不出来。\n\n然后他说，“那马就像个皮袋子，别处倒没啥伤。人跟被连枷打过似的。衣服撕烂大半，浑身青紫淤血，密密麻麻全是小口子。脸还认得出来，但没剩多少了。四肢歪扭着。我跟搭档在林边找着他，赶紧喊来另俩兄弟。他俩没啥大反应，就对视了老半天，点点头，打发我们去拿锹。就地埋了。人和马。他们挺恼火他那支威明格步枪不见了，要是我兄弟脸没了，我才更恼火呢。"
 LUA.7.a: "..."
 LUA.8.t: "信件·其四"
 LUA.8.desc: "在——已编辑——身上发现的信件\n无日期\n4/6\n\n他把熊皮帽子拉得更低，快遮住脸了，好像这能挡住回忆。我们默默坐了会儿。我当他睡着了，正想也睡，他突然压低嗓子念叨起来。\n\n“照亮阴影，前路虽暗，照亮阴影，照亮阴影。” 我觉得他嘟囔的大概是这个。还有别的——听不清了。许是某种祈祷。许是某种诅咒。我最后从他手里抢过酒瓶，想喝一口，这一抢倒把他惊醒了。真他妈是个嗜酒的混蛋。\n\n“那俩剩下的继续狩猎，”他说，“好像啥事都没发生。他们总带着第三个人，补那个兄弟的缺。不过那第三个，多半活不长。他们换了不少搭档，但赏金攒了一堆，那俩看着就跟杀不死似的。后来没多少人敢靠近他们。都觉得他们被诅咒了，也不知道这诅咒会不会染给自己。但也有人说，那誓言破了。有了牺牲，现在可以三人一队了。说不准。要我说啊，是后来才这样的。要我说啊，不光是弟弟死了才可能，是因为他们的搭档总得死，这才可能。”\n\n他清了清嗓子。“他们那眼神越来越不对。野了。危险了。不太像人了。你想啊，咱们在沼泽里见惯了那些东西，照理说猎人不会轻易觉得哪儿都有怪物。可恰恰相反。见了沼泽里那些玩意儿，你看哪儿都觉得有。”\n\n研究员注：托马斯·布里奇斯以爱讲夸张故事闻名，大多基于亲身经历。山里待着，除了扯闲篇也没别的事。但这则《三兄弟》更像寓言或讽喻。可能发生在大多数人开始三人狩猎的时期。"
 LUA.8.a: "..."
 LUA.9.t: "信件·其五"
 LUA.9.desc: "在——已编辑——身上发现的信件\n无日期\n5/6\n\n他眼神狂乱，越说越快。“我不该跟他们掺和，我知道，现在知道，当时也知道，可我走投无路了，然后我家里那边传来消息，牧场烧了，洛莉和珍妮丝去见上帝了，打那以后我就觉得，我干啥都无所谓了，还不如跟魔鬼做笔交易，只要有酒喝。能让我忘掉就行。”\n\n我问他到底扯什么鬼，什么事让他后悔成这样，比所有事都后悔？我见过他面不改色干掉十几个猎人，完事儿还问晚饭吃啥。他冷静，做事利落，脸上没一点情绪。现在却在我眼前崩溃。大概是告解室就这样吧。我不羡慕那些神父的差事。\n\n“我给他们哥儿俩干活了！不是跟他们去打猎——不然我也没法在这儿跟你说话，他们的搭档没一个活下来的，懂吗？——但我给他们干别的活。我才不管有没有诅咒，也不管他们看着越来越邪性。别人说啥我都不在乎。他们给的赏金高得离谱，况且我家人也没了。沼泽里见的那些是不干净，可那俩干的事更脏。”\n\n我凑近了，点着头。盼着他能稳住，说清楚咱们听到的传闻是不是真的。等他终于抬头开口，我差点没认出他，他脸上全是绝望和懊悔。\n\n我们那睡着的搭档突然不打鼾了，叫了一声，哼了哼，翻个身。我在想，要能钻他梦里看看，会瞅见啥。\n\n研究员注：布里奇斯似乎与那兄弟俩关系密切，随叫随到。全然不像那个粗犷的山里汉子，此刻显得如此脆弱。这真的是布里奇斯吗？还是被沼泽诅咒瘟疫侵蚀后的另一个人格？"
 LUA.9.a: "..."
 LUA.10.t: "信件·其六"
 LUA.10.desc: "在——已编辑——身上发现的信件\n无日期\n6/6\n\n结果咱都错了，他们不是互相残杀。好多事咱都搞错了。他跟我说，“他们兄弟自个儿干的，对那弟弟和那马。那匹该死的绿马。” 然后他真哭了。\n\n费老劲劝，又灌了两瓶酒，才把剩下的套出来。他胡言乱语一阵，突然就清醒了，跟刚才哭的那人走了，换了个别人似的。我不敢说眼前坐的还是同一个人。跟我一起打猎的确实是同一个人，但肯定不是刚才为一匹死马哭的那个人。他一股脑儿全倒出来了，话赶话，中间不带喘气的。\n\n“他们没明说，但我帮他们害了其他人。每一个搭档！每一个！说他们想打破誓言。但根本说不通。他们肯定不止是想三人狩猎那么简单，不然不会对自己弟弟和那些人下那种手，可他们从没告诉我到底想要啥。一次比一次狠。我觉着他们根本不是人，不可能是人。帮他们干完那些事，我都不知道自个儿还算不算人了。最糟的是，我他妈是自愿的。”\n\n按托马斯说的，事情是这样的。那俩兄弟让他干的事儿越来越邪乎，他一时也没在意。他们有酒供着，酒能让他忘事。后来就出了你跟我说的威明格步枪和镇长那档子事。\n\n有天他去他们房间，满屋子堆满了残肢断臂——摞到天花板了！——纸牌扔得到处都是，罗杰斯那醉鬼也死在里头，那俩兄弟就坐那儿聊天。托马斯跟罗杰斯八成有点交情。压垮人的往往是小事，但其实只是压在一大堆烂事上的最后一根稻草。可当时他自己也醉得够呛，没立刻跑掉。就站那儿琢磨，是不是酒里下了药，出幻觉了。站那儿琢磨，是不是自己疯了。说那晚的事记不太清了，但天亮他就去了静水城。\n\n他说他觉得那俩还在狩猎——要是三人誓言还在的话，那肯定还在——但他的话我不全信。我觉得这根本解释不了为啥三人队突然就能组起来了，反正故事就是这样。没准你能从中找到点答案，只要你肯下功夫琢磨。\n\n研究员注：布里奇斯把自己写进故事里，也许恰恰证明了故事的真实性。他像个吓坏的旁观者，不知所措。这不像一个声称曾涉足火山口湖（深约1900盎格利亚尺）之底的人。"
